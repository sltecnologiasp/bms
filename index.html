<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>DEBUG BMS</title>
</head>
<body style="background:#000;color:#0f0;font-family:monospace;padding:10px;font-size:14px">
<h3>DEBUG SMART BMS</h3>
<div id="log">1. Página carregou<br></div>
<input id="code" placeholder="SL77777777" maxlength="10" style="width:100%;padding:10px;background:#000;color:#0f0;border:1px solid #0f0;margin:10px 0">
<button onclick="testar()" style="width:100%;padding:15px;background:#0f0;color:#000;border:none;font-weight:bold">TESTAR LOGIN</button>

<script>
const log = (msg) => { document.getElementById('log').innerHTML += msg + '<br>'; };

window.onerror = function(msg, url, line) {
  log('ERRO JS: ' + msg);
  return true;
};

log('2. JS rodando');

async function testar() {
  const code = document.getElementById('code').value || 'SL77777777';
  log('3. Testando login com: ' + code);
  
  try {
    const r = await fetch('/api/bms?action=login', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({code: code})
    });
    
    log('4. Status HTTP: ' + r.status);
    const text = await r.text();
    log('5. Resposta bruta: ' + text.substring(0, 200));
    
    const d = JSON.parse(text);
    if (d.ok) {
      log('6. LOGIN OK! Token: ' + d.token.substring(0, 20) + '...');
      log('7. Dados BMS: ' + d.bms.code + ' SOC:' + d.bms.soc);
    } else {
      log('6. ERRO API: ' + d.error);
    }
  } catch (e) {
    log('ERRO FETCH: ' + e.message);
  }
}

// Testa automático ao abrir
testar();
</script>
</body>
</html>
