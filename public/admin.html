<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Admin BMS</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a0f;color:#fff;font-family:system-ui;padding:0;text-align:center}
h1{text-align:center;font-size:42px;font-weight:900;padding:30px 20px;background:linear-gradient(90deg,#00ffff,#0080ff);-webkit-background-clip:text;-webkit-text-fill-color:transparent;text-shadow:0 0 30px rgba(0,255,255,.3)}
.card{background:rgba(255,255,255,.03);border:1px solid rgba(0,255,255,.3);border-radius:16px;padding:30px;margin:16px;text-align:center;box-shadow:0 0 20px rgba(0,255,255,.1),inset 0 0 20px rgba(0,255,255,.05)}
.card-cadastro{max-width:600px;margin:16px auto 32px auto}
input,button,select{width:100%;max-width:600px;padding:18px;margin:12px auto;border-radius:12px;border:1px solid rgba(0,255,255,.3);background:rgba(0,0,0,.4);color:#fff;font-size:18px;text-align:center;display:block;box-shadow:0 0 15px rgba(0,255,255,.1)}
button{background:linear-gradient(90deg,#0080ff,#00ffff);cursor:pointer;font-weight:700;border:none;font-family:system-ui;letter-spacing:0;box-shadow:0 0 25px rgba(0,255,255,.4)}
button.del{background:rgba(255,68,68,.1);border:1px solid rgba(255,68,68,.4);padding:10px;margin-top:12px;box-shadow:0 0 15px rgba(255,68,68,.2)}
button.logout{background:rgba(255,68,68,.1);border:1px solid rgba(255,68,68,.4);max-width:500px;margin:60px auto 40px;box-shadow:0 0 20px rgba(255,68,68,.2)}
button.view{background:rgba(0,255,255,.1);border:1px solid rgba(0,255,255,.4);padding:10px;margin-top:12px;box-shadow:0 0 15px rgba(0,255,255,.2)}
button.tab{background:rgba(0,255,255,.05);border:1px solid rgba(0,255,255,.2);padding:14px 24px;margin:0 8px;width:auto;display:inline-block}
button.tab.active{background:linear-gradient(90deg,#0080ff,#00ffff);border:none}
button.edit{background:rgba(255,170,0,.1);border:1px solid rgba(255,170,0,.4);padding:10px;margin-top:12px;box-shadow:0 0 15px rgba(255,170,0,.2)}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(350px,1fr));gap:16px;padding:0 16px}
.grid.card{margin:0;border-radius:16px}
.status{display:inline-block;padding:6px 16px;border-radius:12px;font-size:13px;font-weight:700}
.on{background:rgba(0,255,136,.15);color:#00ff88;border:1px solid rgba(0,255,136,.4);box-shadow:0 0 15px rgba(0,255,136,.3)}
.off{background:rgba(255,68,68,.15);color:#ff4444;border:1px solid rgba(255,68,68,.4);box-shadow:0 0 15px rgba(255,68,68,.3)}
.label{opacity:.7;font-size:13px;text-transform:uppercase;text-align:center;letter-spacing:2px;margin-bottom:8px}
.cells{display:grid;grid-template-columns:repeat(auto-fill,minmax(85px,1fr));gap:10px;margin-top:16px;justify-content:center}
.cell{background:rgba(0,0,0,.4);border:1px solid rgba(0,255,255,.2);border-radius:12px;padding:12px;text-align:center;box-shadow:0 0 10px rgba(0,255,255,.1)}
.cell-num{opacity:.5;font-size:10px;text-align:center}
.cell-val{font-weight:700;font-size:14px;margin-top:4px;text-align:center}
.cell.ok{border-color:rgba(0,255,136,.5);background:rgba(0,255,136,.08);box-shadow:0 0 15px rgba(0,255,136,.2)}
.cell.warn{border-color:rgba(255,170,0,.5);background:rgba(255,170,0,.08);box-shadow:0 0 15px rgba(255,170,0,.2)}
.cell.crit{border-color:rgba(255,68,68,.5);background:rgba(255,68,68,.08);box-shadow:0 0 15px rgba(255,68,68,.2)}
.modal{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.95);z-index:999;overflow-y:auto;padding:20px}
.modal.active{display:block}
.modal-content{max-width:1200px;margin:40px auto;background:#0a0a0f;border:1px solid rgba(0,255,255,.3);border-radius:20px;padding:30px;text-align:center;box-shadow:0 0 40px rgba(0,255,255,.2)}
.modal-close{float:right;background:rgba(255,68,68,.1);border:1px solid rgba(255,68,68,.4);color:#fff;padding:10px 20px;border-radius:8px;cursor:pointer;box-shadow:0 0 15px rgba(255,68,68,.2)}
#login,#painel{position:relative;z-index:1;width:100%;min-height:100dvh;padding:20px}
.tela-ativa{display:flex!important;flex-direction:column;justify-content:center;align-items:center}
#login.card{border-radius:20px;margin:0 auto;max-width:500px;width:100%}
.data-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin:12px 0}
.data-item{text-align:center}
.data-item.label{margin-bottom:4px;font-size:11px}
.data-item.value{font-size:24px;font-weight:700;text-shadow:0 0 15px currentColor}
.bms-card.offline{opacity:.4;border-color:rgba(255,68,68,.2)}
.bms-card{transition:.2s}
.user-card{background:rgba(0,255,255,.05);border:1px solid rgba(0,255,255,.3);border-radius:12px;padding:16px;margin:8px 0;text-align:left;cursor:pointer}
.user-card:hover{background:rgba(0,255,255,.1)}
.tabs{text-align:center;margin:20px 0}
.hidden{display:none!important}
</style>
</head>
<body>
<div id="login" class="tela-ativa">
  <h1>BMS SMART</h1>
  <div class="card">
    <div class="label">Acesso Administrativo</div>
    <input id="user" placeholder="Usuário" autocomplete="username">
    <input id="password" type="password" placeholder="Senha" autocomplete="current-password">
    <button onclick="adminLogin()">Entrar no Painel</button>
    <p id="loginError" style="color:#ff4444;margin-top:12px;display:none;text-align:center"></p>
  </div>
</div>

<div id="painel" class="hidden">
  <h1>BMS SMART</h1>

  <div class="tabs">
    <button class="tab active" onclick="showTab('bms')">Dispositivos</button>
    <button class="tab" onclick="showTab('users')">Clientes</button>
  </div>

  <div id="tab-bms">
    <div class="card card-cadastro">
      <div class="label">Cadastrar BMS</div>
      <input id="code" placeholder="SL82576655" maxlength="10">
      <input id="nome" placeholder="Nome do Cliente">
      <button onclick="cad()">Cadastrar BMS</button>
      <p id="msg" style="text-align:center;margin-top:8px"></p>
    </div>
    <div id="lista" class="grid"></div>
  </div>

  <div id="tab-users" class="hidden">
    <div class="card card-cadastro">
      <div class="label">Vincular BMS a Cliente</div>
      <select id="userSelect"></select>
      <input id="vincularCode" placeholder="SL82576655" maxlength="10">
      <input id="vincularNome" placeholder="Nome da BMS (ex: Casa)">
      <button onclick="vincularBMS()">Vincular BMS</button>
      <p id="vincularMsg" style="text-align:center;margin-top:8px"></p>
    </div>
    <div id="usersList" class="card card-cadastro" style="text-align:left"></div>
  </div>

  <button class="logout" onclick="adminLogout()">Sair do Painel Admin</button>
</div>

<div id="modal" class="modal">
  <div class="modal-content">
    <button class="modal-close" onclick="closeModal()">Fechar</button>
    <h2 id="modalTitle" style="text-align:center;margin-bottom:20px"></h2>
    <div id="modalCells" class="cells" style="margin-top:20px"></div>
  </div>
</div>

<script>
const API = '/api/bms';
let adminToken = sessionStorage.getItem('admin_token');
let bmsList = [];
let usersList = [];
let updateInterval;

if(adminToken === 'admin_ok') showPainel();

function showTab(tab){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelector(`.tab[onclick="showTab('${tab}')"]`).classList.add('active');
  document.getElementById('tab-bms').classList.add('hidden');
  document.getElementById('tab-users').classList.add('hidden');
  document.getElementById(`tab-${tab}`).classList.remove('hidden');
  if(tab==='users') loadUsers();
}

async function adminLogin(){
  const user = document.getElementById('user').value;
  const password = document.getElementById('password').value;
  const errorEl = document.getElementById('loginError');
  errorEl.style.display='none';
  const r = await fetch(API+'?action=admin_login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({user,password})});
  const d = await r.json();
  if(d.ok){
    adminToken = d.token;
    sessionStorage.setItem('admin_token', adminToken);
    showPainel();
  }else{
    errorEl.textContent = d.error;
    errorEl.style.display='block';
  }
}

function showPainel(){
  document.getElementById('login').classList.remove('tela-ativa');
  document.getElementById('login').classList.add('hidden');
  document.getElementById('painel').classList.remove('hidden');
  document.getElementById('painel').classList.add('tela-ativa');
  listar();
  updateInterval = setInterval(listar, 5000);
}

function adminLogout(){
  clearInterval(updateInterval);
  sessionStorage.removeItem('admin_token');
  location.reload();
}

function authHeaders(){
  return {'Content-Type':'application/json','Authorization':'Bearer '+adminToken};
}

document.getElementById('code').oninput = e => {
  if(!e.target.value.startsWith('SL')) e.target.value = 'SL';
  e.target.value = 'SL' + e.target.value.slice(2).replace(/[^0-9]/g,'').slice(0,8);
};
document.getElementById('vincularCode').oninput = e => {
  if(!e.target.value.startsWith('SL')) e.target.value = 'SL';
  e.target.value = 'SL' + e.target.value.slice(2).replace(/[^0-9]/g,'').slice(0,8);
};

async function cad(){
  const code = document.getElementById('code').value;
  const nome = document.getElementById('nome').value;
  const r = await fetch(API+'?action=cadastrar',{method:'POST',headers:authHeaders(),body:JSON.stringify({code,nome})});
  const d = await r.json();
  document.getElementById('msg').textContent = d.ok?'Cadastrada!':d.error;
  document.getElementById('msg').style.color = d.ok?'#00ff88':'#ff4444';
  if(d.ok){document.getElementById('code').value='';document.getElementById('nome').value='';listar();}
}

async function del(code){
  if(!confirm(`Deletar ${code}?`))return;
  await fetch(API+`?action=deletar&code=${code}`,{method:'DELETE',headers:authHeaders()});
  listar();
}

function viewCells(code){
  const bms = bmsList.find(b => b.code === code);
  if(!bms ||!bms.cells) return;
  document.getElementById('modalTitle').textContent = `${bms.code} - ${bms.cells.length} Células`;
  document.getElementById('modalCells').innerHTML = bms.cells.map((v,i)=>{
    const val = parseFloat(v);
    let cls = 'ok';
    if(val < 3.2 || val > 4.2) cls = 'crit';
    else if(val < 3.4 || val > 4.15) cls = 'warn';
    return `<div class="cell ${cls}"><div class="cell-num">Célula ${i+1}</div><div class="cell-val">${val.toFixed(3)}V</div></div>`;
  }).join('');
  document.getElementById('modal').classList.add('active');
}

function closeModal(){
  document.getElementById('modal').classList.remove('active');
}

async function listar(){
  try{
    const r = await fetch(API+'?action=listar',{headers:authHeaders()});
    if(r.status===401){adminLogout();return;}
    const d = await r.json();
    bmsList = d;
    document.getElementById('lista').innerHTML = d.map(b=>{
      const isOnline = b.online && (Date.now() - new Date(b.updated_at).getTime() < 10000);
      const cardClass = isOnline? '' : 'offline bms-card';
      const cellsCount = b.cells? b.cells.length : 0;
      const cellsHtml = cellsCount > 0?
        `<button class="view" onclick="viewCells('${b.code}')">Ver ${cellsCount} Células</button>` :
        '<div style="opacity:.4;font-size:13px;margin-top:12px;text-align:center">Sem dados de células</div>';
      return `
      <div class="card ${cardClass}">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
          <div style="text-align:left"><b style="font-size:18px">${b.code}</b><div style="opacity:.6;font-size:13px;margin-top:4px">${b.nome||''}</div></div>
          <span class="status ${isOnline?'on':'off'}">${isOnline?'Online':'Offline'}</span>
        </div>
        <div class="data-row">
          <div class="data-item"><div class="label">SOC</div><div class="value" style="color:#00ff88">${isOnline? (b.soc?.toFixed(0)||0)+'%' : '--'}</div></div>
          <div class="data-item"><div class="label">Tensão</div><div class="value" style="color:#00ffff">${isOnline? (b.voltage?.toFixed(2)||0)+'V' : '--'}</div></div>
        </div>
        <div class="data-row">
          <div class="data-item"><div class="label">Corrente</div><div class="value" style="color:#ffaa00">${isOnline? (b.current?.toFixed(1)||0)+'A' : '--'}</div></div>
          <div class="data-item"><div class="label">Temperatura</div><div class="value" style="color:#ff4444">${isOnline? (b.temp?.toFixed(1)||0)+'°C' : '--'}</div></div>
        </div>
        ${cellsHtml}
        <button class="del" onclick="del('${b.code}')">Excluir</button>
      </div>
    `}).join('') || '<div class="card" style="text-align:center;opacity:.4;padding:60px 20px">Nenhuma BMS cadastrada</div>';
  }catch(e){console.error(e);}
}

async function loadUsers(){
  try{
    const r = await fetch(API+'?action=listar_users',{headers:authHeaders()});
    if(r.status===401){adminLogout();return;}
    usersList = await r.json();
    const select = document.getElementById('userSelect');
    select.innerHTML = '<option value="">Selecione um cliente</option>' +
      usersList.map(u => `<option value="${u.id}">${u.nome} - ${u.email} (${u.total_bms} BMS)</option>`).join('');
    const list = document.getElementById('usersList');
    list.innerHTML = '<div class="label" style="margin-bottom:16px">Clientes Cadastrados</div>' +
      usersList.map(u => `
        <div class="user-card" onclick="verBMSUsuario(${u.id},'${u.nome}')">
          <div style="display:flex;justify-content:space-between;align-items:center">
            <div>
              <div style="font-weight:700;font-size:16px">${u.nome}</div>
              <div style="opacity:.6;font-size:13px;margin-top:4px">${u.email}</div>
            </div>
            <div style="text-align:right">
              <div style="font-size:20px;font-weight:800;color:#00ffff">${u.total_bms}</div>
              <div style="opacity:.6;font-size:11px">BMS</div>
            </div>
          </div>
        </div>
      `).join('') || '<div style="opacity:.4;text-align:center;padding:40px">Nenhum cliente cadastrado</div>';
  }catch(e){console.error(e);}
}

async function vincularBMS(){
  const user_id = document.getElementById('userSelect').value;
  const code = document.getElementById('vincularCode').value;
  const nome = document.getElementById('vincularNome').value;
  const msg = document.getElementById('vincularMsg');
  if(!user_id){msg.textContent='Selecione um cliente';msg.className='error';msg.style.display='block';return}
  if(!code||code.length!==10){msg.textContent='Código inválido';msg.className='error';msg.style.display='block';return}
  if(!nome){msg.textContent='Dê um nome';msg.className='error';msg.style.display='block';return}
  try{
    const r = await fetch(API+'?action=vincular_bms',{method:'POST',headers:authHeaders(),body:JSON.stringify({user_id:parseInt(user_id),code,nome})});
    const d = await r.json();
    if(d.ok){msg.textContent='BMS vinculada!';msg.className='success';msg.style.display='block';document.getElementById('vincularCode').value='';document.getElementById('vincularNome').value='';setTimeout(()=>msg.style.display='none',2000);loadUsers()}
    else{msg.textContent=d.error||'Erro';msg.className='error';msg.style.display='block'}
  }catch(e){msg.textContent='Erro de conexão';msg.className='error';msg.style.display='block'}
}

async function verBMSUsuario(userId, nome){
  const r = await fetch(API+`?action=user_bms_admin&user_id=${userId}`,{headers:authHeaders()});
  const bms = await r.json();
  if(bms.length === 0){
    alert(`${nome}\n\nNenhuma BMS vinculada`);
    return;
  }
  const lista = bms.map((b,i)=>`${i+1}. ${b.code} - ${b.nome}`).join('\n');
  const opcao = prompt(`${nome}\n\nBMS vinculadas: ${bms.length}\n\n${lista}\n\nDigite o número da BMS para EDITAR/DESVINCULAR ou deixe vazio para cancelar:`);
  if(opcao &&!isNaN(opcao)){
    const idx = parseInt(opcao) - 1;
    if(bms[idx]){
      const acao = confirm(`BMS: ${bms[idx].code} - ${bms[idx].nome}\n\nOK = Editar nome\nCancelar = Desvincular`);
      if(acao){
        editarNomeBMS(userId, bms[idx].code, bms[idx].nome);
      }else{
        if(confirm(`Desvincular ${bms[idx].code} - ${bms[idx].nome} de ${nome}?`)){
          await desvincularBMS(userId, bms[idx].code);
        }
      }
    }
  }
}

async function editarNomeBMS(userId, code, nomeAtual){
  const novoNome = prompt(`Editar nome da BMS ${code}:`, nomeAtual);
  if(novoNome && novoNome!== nomeAtual){
    try{
      const r = await fetch(API+'?action=editar_nome_bms',{method:'PUT',headers:authHeaders(),body:JSON.stringify({user_id:userId,code,nome:novoNome})});
      const d = await r.json();
      if(d.ok){
        alert('Nome atualizado!');
        loadUsers();
      }else{
        alert('Erro ao atualizar nome');
      }
    }catch(e){
      alert('Erro de conexão');
    }
  }
}

async function desvincularBMS(userId, code){
  try{
    const r = await fetch(API+`?action=desvincular_bms&user_id=${userId}&code=${code}`,{
      method:'DELETE',
      headers:authHeaders()
    });
    const d = await r.json();
    if(d.ok){
      alert('BMS desvinculada com sucesso!');
      loadUsers();
    }else{
      alert('Erro ao desvincular');
    }
  }catch(e){
    alert('Erro de conexão');
  }
}
</script>
</body>
</html>
