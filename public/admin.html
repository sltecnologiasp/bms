<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Admin BMS</title>
<link href="https://fonts.googleapis.com/css2=family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#f4f6f9;
  --card-bg:rgba(255, 255, 255, 0.9);
  --card-border:rgba(0, 180, 216, 0.15);
  --text-main:#0f172a;
  --text-muted:#64748b;
  --input-bg:#ffffff;
  --input-border:#cbd5e1;
  --input-text:#0f172a;
  --input-placeholder:#94a3b8;
  --gauge-empty:#e2e8f0;
  --cell-bg:#f8fafc;
  --cell-border:#e2e8f0;
  --neon-glow: 0 0 12px rgba(0, 180, 216, 0.12);
  --cyan:#00b4d8;
  --blue:#0077b6;
  --green:#2ec4b6;
  --red:#e71d36;
  --orange:#ff9f1c;
}

[data-theme="dark"] {
  --bg: #05070d;
  --card-bg: rgba(13, 20, 35, 0.65);
  --card-border: rgba(0, 255, 255, .15);
  --text-main: #ffffff;
  --text-muted: #6b7c96;
  --input-bg: rgba(13, 20, 35, 0.8);
  --input-border: rgba(0, 255, 255, .25);
  --input-text: #ffffff;
  --input-placeholder: #6b7c96;
  --gauge-empty: #1a2332;
  --cell-bg: rgba(13, 20, 35, 0.8);
  --cell-border: rgba(0, 255, 255, .15);
}

body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text-main);min-height:100vh;width:100%;overflow-x:hidden}

#login,#painel,#clientesPage,#dashAdmin{
  position:relative;
  z-index:1;
  width:100%;
  max-width:1100px;
  margin:0 auto;
  min-height:100vh;
  padding:24px 12px;
  display:none;
  flex-direction:column;
  align-items:center;
  justify-content:center;
}
#login{display:flex}
#painel.active,#clientesPage.active,#dashAdmin.active{display:flex}

#painel, #clientesPage, #dashAdmin {
  height: auto;
  margin: auto auto;
}

#dashAdmin.active {
  gap: 5px !important;
  justify-content: flex-start !important;
}

.title{font-size:clamp(32px,7vw,54px);font-weight:900;margin-bottom:4px;letter-spacing:2px;background:linear-gradient(90deg,var(--blue),var(--cyan));-webkit-background-clip:text;-webkit-text-fill-color:transparent;text-align:center;width:100%}
.user-info{color:var(--text-muted);font-size:14px;text-align:center;margin-bottom:16px;font-weight:500;width:100%}

.card{
  background:var(--card-bg);
  border:1px solid var(--card-border);
  border-radius:20px;
  padding:20px;
  width:100%;
  margin-bottom:16px;
  box-shadow:var(--neon-glow);
}

input, select {
  width:100%;
  padding:12px;
  border-radius:8px;
  border:1px solid var(--input-border);
  background:var(--input-bg);
  color:var(--input-text);
  font-family:'Inter',sans-serif;
  font-size:14px;
}
input::placeholder{color:var(--input-placeholder)}

button {
  padding:12px 20px;
  background:var(--cyan);
  color:#fff;
  border:none;
  border-radius:8px;
  font-weight:600;
  cursor:pointer;
  font-family:'Inter',sans-serif;
  transition:all 0.2s;
}
button:hover{opacity:0.9;transform:translateY(-1px)}
button:active{transform:translateY(0)}

.btn-green{background:var(--green)}
.btn-red{background:var(--red)}
.btn-orange{background:var(--orange)}
</style>
</head>
<body>

<!-- TELA DE LOGIN ORIGINAL -->
<div id="login">
  <div class="card" style="max-width:400px">
    <h1 class="title">ADMIN BMS</h1>
    <p class="user-info">Acesso restrito</p>
    <div style="display:flex;flex-direction:column;gap:12px">
      <input type="text" id="loginUser" placeholder="Usuário">
      <input type="password" id="loginPass" placeholder="Senha">
      <button onclick="fazerLoginTemp()">Entrar</button>
    </div>
  </div>
</div>

<!-- PAINEL PRINCIPAL ORIGINAL -->
<div id="painel">
  <h1 class="title">PAINEL ADMIN</h1>
  <p class="user-info" id="userInfo">Carregando...</p>
  
  <button onclick="logout()" class="btn-red" style="margin-bottom:20px">Sair</button>

  <!-- NOVO: CARD GERENCIAR USUÁRIOS -->
  <div class="card" id="gerenciarUsuarios">
    <h3 style="margin-bottom:4px">Gerenciar Usuários</h3>
    <p style="color:var(--text-muted);font-size:13px;margin-bottom:16px">Crie usuários padrão ou administradores</p>
    
    <div style="display:flex;flex-direction:column;gap:12px">
      <input id="novoNome" type="text" placeholder="Nome completo">
      <input id="novoEmail" type="email" placeholder="E-mail">
      <input id="novaSenha" type="password" placeholder="Senha">
      
      <select id="novaRole">
        <option value="user">Usuário Padrão - acessa só index.html</option>
        <option value="admin">Administrador - acessa painel admin</option>
      </select>
      
      <button onclick="criarUsuario()" class="btn-green">Criar Usuário</button>
    </div>

    <div style="margin-top:24px">
      <h4 style="margin-bottom:12px">Usuários Cadastrados</h4>
      <div id="listaUsuarios">
        <p style="color:var(--text-muted)">Carregando...</p>
      </div>
    </div>
  </div>

  <!-- SEU CONTEÚDO ORIGINAL DO PAINEL CONTINUA AQUI -->
  <!-- Cole seus outros cards/divs originais abaixo -->

</div>

<!-- SUAS OUTRAS PÁGINAS ORIGINAIS -->
<div id="clientesPage"></div>
<div id="dashAdmin"></div>

<script>
// ==========================================
// LOGIN TEMPORÁRIO - TROCAR QUANDO API PRONTA
// ==========================================
function fazerLoginTemp() {
  const user = document.getElementById('loginUser').value;
  const pass = document.getElementById('loginPass').value;
  
  if (user === 'admin' && pass === '123') {
    document.getElementById('login').style.display = 'none';
    document.getElementById('painel').classList.add('active');
    document.getElementById('userInfo').textContent = 'Logado como: Admin';
    renderizarUsuarios();
  } else {
    alert('Use admin / 123 por enquanto');
  }
}

function logout() {
  localStorage.removeItem('bms_token');
  location.reload();
}

// ==========================================
// GERENCIAMENTO DE USUÁRIOS - VERSÃO FAKE
// TROCAR POR FETCH QUANDO API TIVER PRONTA
// ==========================================
let usuariosFake = [
  {id: 1, nome: 'Admin Principal', email: 'admin@bms.com', role: 'admin'},
  {id: 2, nome: 'João Cliente', email: 'joao@email.com', role: 'user'}
];

function renderizarUsuarios() {
  const div = document.getElementById('listaUsuarios');
  if (usuariosFake.length === 0) {
    div.innerHTML = '<p style="color:var(--text-muted)">Nenhum usuário cadastrado</p>';
    return;
  }
  
  div.innerHTML = usuariosFake.map(u => `
    <div style="display:flex;justify-content:space-between;align-items:center;padding:12px;background:var(--cell-bg);border:1px solid var(--cell-border);border-radius:8px;margin-bottom:8px">
      <div style="flex:1">
        <strong style="font-size:15px">${u.nome}</strong><br>
        <span style="font-size:13px;color:var(--text-muted)">${u.email}</span><br>
        <span style="font-size:11px;padding:3px 8px;border-radius:4px;background:${u.role === 'admin' ? 'var(--orange)' : 'var(--blue)'};color:#fff;display:inline-block;margin-top:4px">
          ${u.role === 'admin' ? 'Administrador' : 'Usuário Padrão'}
        </span>
      </div>
      <button onclick="deletarUsuario(${u.id})" class="btn-red" style="padding:8px 14px;font-size:13px">
        Excluir
      </button>
    </div>
  `).join('');
}

function criarUsuario() {
  const nome = document.getElementById('novoNome').value.trim();
  const email = document.getElementById('novoEmail').value.trim();
  const senha = document.getElementById('novaSenha').value;
  const role = document.getElementById('novaRole').value;
  
  if (!nome || !email || !senha) {
    alert('Preenche todos os campos');
    return;
  }
  
  if (!email.includes('@')) {
    alert('E-mail inválido');
    return;
  }
  
  const novoId = usuariosFake.length > 0 ? Math.max(...usuariosFake.map(u => u.id)) + 1 : 1;
  usuariosFake.push({id: novoId, nome, email, role});
  
  document.getElementById('novoNome').value = '';
  document.getElementById('novoEmail').value = '';
  document.getElementById('novaSenha').value = '';
  document.getElementById('novaRole').value = 'user';
  
  renderizarUsuarios();
  alert('Usuário criado! Quando a API tiver pronta, vai salvar no banco de verdade.');
}

function deletarUsuario(id) {
  if (!confirm('Tem certeza que quer excluir este usuário?')) return;
  usuariosFake = usuariosFake.filter(u => u.id !== id);
  renderizarUsuarios();
}

// ==========================================
// SEU CÓDIGO ORIGINAL CONTINUA AQUI
// ==========================================
document.addEventListener('DOMContentLoaded', () => {
  // Não faz nada por enquanto, espera login
});
</script>

</body>
</html>
