<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">

<title>Admin BMS</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
-webkit-tap-highlight-color:transparent
}

:root{
--bg:#05070d;
--cyan:#00ffff;
--blue:#0080ff;
--green:#00ff88;
--red:#ff4444;
--orange:#ffaa00
}

body{
font-family:'Inter',sans-serif;
background:var(--bg);
color:#fff;
min-height:100vh;
width:100%;
overflow-x:hidden
}

#login,
#painel,
#clientesPage{
position:relative;
z-index:1;
width:100%;
min-height:100vh;
padding:8px
}

#login{
display:flex;
flex-direction:column;
justify-content:center;
align-items:center
}

#painel,
#clientesPage{
display:none;
flex-direction:column;
align-items:center;
padding-top:12px
}

.title{
font-size:clamp(32px,8vw,74px);
font-weight:900;
margin-bottom:16px;
letter-spacing:3px;
background:linear-gradient(90deg,var(--cyan),var(--blue));
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
text-align:center;
width:100%
}

.card{
background:rgba(10,15,25,.92);
border:1px solid rgba(0,255,255,.12);
border-radius:16px;
padding:12px;
width:100%;
margin-bottom:12px
}

#login .card{
max-width:520px
}

.card-cadastro{
margin:0 0 20px 0;
width:100%;
max-width:520px
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(160px,1fr));
gap:12px;
width:100%
}

#lista .card{
aspect-ratio:1/1;
justify-content:space-between;
cursor:pointer;
padding:14px;
transition:.2s;
display:flex;
flex-direction:column
}

#lista .card:hover{
border-color:rgba(0,255,255,.3);
box-shadow:0 0 30px rgba(0,255,255,.15)
}

.label{
font-size:10px;
letter-spacing:1.5px;
opacity:.6;
text-transform:uppercase;
text-align:center
}

.status{
display:inline-flex;
align-items:center;
gap:10px;
padding:10px 20px;
border-radius:999px;
font-weight:700
}

.on{
background:rgba(0,255,136,.12);
color:var(--green);
border:1px solid rgba(0,255,136,.3)
}

.off{
background:rgba(255,68,68,.12);
color:var(--red);
border:1px solid rgba(255,68,68,.3)
}

.badge{
display:inline-block;
padding:4px 12px;
border-radius:8px;
font-size:11px;
font-weight:700;
margin-top:8px
}

.badge-green{
background:rgba(0,255,136,.15);
color:#00ff88;
border:1px solid rgba(0,255,136,.4)
}

.badge-orange{
background:rgba(255,170,0,.15);
color:#ffaa00;
border:1px solid rgba(255,170,0,.4)
}

.card-code{
font-size:15px;
font-weight:700;
word-break:break-all;
margin:8px 0;
text-align:center
}

.card-top{
flex:1;
display:flex;
flex-direction:column;
justify-content:space-between
}

.value{
font-size:30px;
font-weight:800;
text-align:center
}

input,
button{
width:100%;
padding:18px;
border-radius:18px;
border:none;
outline:none;
margin-top:16px;
font-size:18px
}

input{
background:rgba(0,0,0,.5);
color:#fff;
font-family:monospace;
letter-spacing:2px;
border:1px solid rgba(0,255,255,.2)
}

button{
background:linear-gradient(90deg,var(--blue),var(--cyan));
color:#fff;
font-weight:700;
cursor:pointer
}

.btn-sec{
background:transparent;
border:1px solid rgba(0,255,255,.3);
color:var(--cyan)
}

.btn-clientes{
background:transparent;
border:1px solid rgba(0,255,136,.3);
color:var(--green)
}

button.del{
background:rgba(255,68,68,.1);
border:1px solid rgba(255,68,68,.4)
}

button.logout{
margin-top:24px;
background:rgba(255,68,68,.08);
border:1px solid rgba(255,68,68,.2)
}

button.voltar{
background:rgba(0,255,136,.1);
border:1px solid rgba(0,255,136,.4);
max-width:520px;
margin:40px auto
}

.hidden{
display:none!important
}

.erro{
background:rgba(255,0,0,.1);
border:2px solid #ff4444;
border-radius:12px;
padding:16px;
margin-top:16px;
color:#ff4444;
font-size:14px
}

.user-info{
color:#888;
font-size:14px;
text-align:center;
margin-bottom:20px
}

.modal{
display:none;
position:fixed;
top:0;
left:0;
right:0;
bottom:0;
background:rgba(0,0,0,.95);
z-index:999;
overflow-y:auto;
padding:8px
}

.modal.active{
display:block
}

.modal-content{
max-width:520px;
margin:20px auto
}

.modal-close{
width:100%;
background:rgba(255,68,68,.1);
border:1px solid rgba(255,68,68,.4);
color:#fff;
padding:18px;
border-radius:18px;
cursor:pointer;
margin-bottom:16px
}
</style>
</head>

<body>

<!-- LOGIN -->

<div id="login">

<div class="title">SMART BMS</div>

<div class="card">

<div class="label">Usuário</div>

<input
id="user"
placeholder="administrador"
autocomplete="username"
value="administrador">

<div class="label" style="margin-top:16px">Senha</div>

<input
id="password"
type="password"
placeholder="••••••••"
autocomplete="current-password">

<button onclick="adminLogin()">
ENTRAR NO PAINEL
</button>

<div id="loginError" class="erro hidden"></div>

</div>

</div>

<!-- PAINEL -->

<div id="painel">

<div class="title" style="font-size:32px;margin-bottom:8px">
SMART BMS
</div>

<div class="user-info">
Painel Administrativo
</div>

<div class="card card-cadastro">

<div class="label">
Cadastrar BMS no Sistema
</div>

<input id="code" placeholder="SL000000" maxlength="14">

<button class="btn-clientes" onclick="cad()">
CADASTRAR BMS MASTER
</button>

<button class="btn-sec" onclick="gerarECadastrar()">
GERAR CÓDIGO ALEATÓRIO
</button>

<button class="btn-clientes" onclick="mostrarClientes()">
VER CLIENTES CADASTRADOS
</button>

<p id="msg" style="text-align:center;margin-top:8px;font-size:14px"></p>

</div>

<div class="card">

<div class="label">
Todas as BMS do Sistema
</div>

<div id="lista" class="grid"></div>

</div>

<button class="logout" onclick="adminLogout()">
SAIR DO PAINEL ADMIN
</button>

</div>

<!-- CLIENTES -->

<div id="clientesPage">

<div class="title" style="font-size:32px;margin-bottom:8px">
SMART BMS
</div>

<div class="user-info">
Clientes Cadastrados
</div>

<div id="listaUsers" class="grid"></div>

<button class="voltar" onclick="voltarPainel()">
VOLTAR AO PAINEL
</button>

</div>

<!-- MODAL BMS -->

<div id="modalBms" class="modal">

<div class="modal-content">

<button class="modal-close" onclick="closeBmsModal()">
Fechar
</button>

<div id="modalBmsContent"></div>

</div>

</div>

<!-- MODAL EDITAR -->

<div id="modalEditUser" class="modal">

<div class="modal-content">

<button class="modal-close" onclick="closeEditUser()">
Fechar
</button>

<h2 style="text-align:center;margin-bottom:20px">
Editar Cliente
</h2>

<input id="editUserId" type="hidden">

<input id="editUserNome" placeholder="Nome">

<input id="editUserEmail" placeholder="Email">

<button onclick="salvarUser()">
SALVAR
</button>

<p id="editMsg" style="text-align:center;margin-top:8px;font-size:14px"></p>

</div>

</div>

<script>

const API = '/api/bms';

let adminToken = sessionStorage.getItem('admin_token');

let bmsList = [];

if(adminToken === 'admin_ok'){
showPainel();
}

function isOnline(updated_at){
if(!updated_at) return false;

const diff = Date.now() - new Date(updated_at).getTime();

return diff > 0 && diff < 5000;
}

async function adminLogin(){

const user = document.getElementById('user').value;

const password = document.getElementById('password').value;

const errorEl = document.getElementById('loginError');

errorEl.classList.add('hidden');

try{

const r = await fetch(
API + '?action=login_admin',
{
method:'POST',
headers:{
'Content-Type':'application/json'
},
body:JSON.stringify({
user,
password
})
}
);

const d = await r.json();

if(d.ok){

adminToken = d.token;

sessionStorage.setItem(
'admin_token',
adminToken
);

showPainel();

}else{

errorEl.textContent = d.error || 'Login inválido';

errorEl.classList.remove('hidden');

}

}catch(e){

errorEl.textContent = 'Erro: ' + e.message;

errorEl.classList.remove('hidden');

}

}

function showPainel(){

document.getElementById('login').style.display = 'none';

document.getElementById('clientesPage').style.display = 'none';

document.getElementById('painel').style.display = 'flex';

carregarTudo();

}

function mostrarClientes(){

document.getElementById('painel').style.display = 'none';

document.getElementById('clientesPage').style.display = 'flex';

listarUsers();

}

function voltarPainel(){

document.getElementById('clientesPage').style.display = 'none';

document.getElementById('painel').style.display = 'flex';

}

function adminLogout(){

sessionStorage.removeItem('admin_token');

location.reload();

}

function authHeaders(){

return {
'Content-Type':'application/json',
'Authorization':'Bearer ' + adminToken
};

}

document.getElementById('code').oninput = e => {

if(!e.target.value.startsWith('SL')){
e.target.value = 'SL';
}

e.target.value =
'SL' +
e.target.value
.slice(2)
.replace(/[^0-9]/g,'')
.slice(0,12);

};

function gerarCodigoAleatorio(){

const numeros = Math.floor(
Math.random() * 1000000000000
).toString().padStart(12,'0');

return 'SL' + numeros;

}

async function gerarECadastrar(){

const code = gerarCodigoAleatorio();

document.getElementById('code').value = code;

await cad();

}

async function cad(){

const code = document.getElementById('code').value;

const r = await fetch(
API + '?action=admin_add_master',
{
method:'POST',
headers:authHeaders(),
body:JSON.stringify({code})
}
);

const d = await r.json();

document.getElementById('msg').textContent =
d.ok ? 'Cadastrada no sistema!' : d.error;

document.getElementById('msg').style.color =
d.ok ? '#00ff88' : '#ff4444';

if(d.ok){

document.getElementById('code').value='';

carregarTudo();

}

}

async function listarUsers(){

const r = await fetch(
API + '?action=all_users',
{
headers:authHeaders()
}
);

if(r.status === 401){

adminLogout();

return;

}

const d = await r.json();

document.getElementById('listaUsers').innerHTML =
d.map(u => `
<div class="card">

<b>${u.nome}</b>

<div style="opacity:.6;margin-top:8px">
${u.email}
</div>

<div class="value" style="color:#00ffff;margin-top:12px">
${u.bms_count}
</div>

</div>
`).join('');

}

async function listarBms(){

const r = await fetch(
API + '?action=admin_list_master',
{
headers:authHeaders()
}
);

const d = await r.json();

bmsList = d;

document.getElementById('lista').innerHTML =
bmsList.map(b => {

const online = isOnline(b.updated_at);

return `
<div class="card">

<div class="card-top">

<div style="text-align:center">

<span class="status ${online ? 'on':'off'}">
${online ? 'Online':'Offline'}
</span>

</div>

<div class="card-code">
${b.code}
</div>

</div>

<button class="del">
EXCLUIR
</button>

</div>
`;

}).join('');

}

async function carregarTudo(){

await Promise.all([
listarUsers(),
listarBms()
]);

}

function closeBmsModal(){

document.getElementById('modalBms')
.classList.remove('active');

}

function closeEditUser(){

document.getElementById('modalEditUser')
.classList.remove('active');

}

setInterval(() => {

if(
adminToken &&
document.getElementById('painel').style.display === 'flex'
){
carregarTudo();
}

},5000);

</script>

</body>
</html>
