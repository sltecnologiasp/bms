<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Admin BMS</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{--bg:#05070d;--cyan:#00ffff;--blue:#0080ff;--green:#00ff88;--red:#ff4444;--orange:#ffaa00}
body{font-family:'Inter',sans-serif;background:var(--bg);color:#fff;min-height:100vh;width:100%;overflow-x:hidden}

/* Containers principais com alinhamento vertical centralizado */
#login,#painel,#clientesPage{
  position:relative;
  z-index:1;
  width:100%;
  min-height:100vh;
  padding:24px 12px;
  display:none;
  flex-direction:column;
  align-items:center;
  justify-content:center;
}
#login{display:flex}
#painel.active,#clientesPage.active{display:flex}

#painel, #clientesPage {
  height: auto;
  margin: auto 0;
}

.title{font-size:clamp(32px,7vw,54px);font-weight:900;margin-bottom:4px;letter-spacing:2px;background:linear-gradient(90deg,var(--cyan),var(--blue));-webkit-background-clip:text;-webkit-text-fill-color:transparent;text-align:center;width:100%}
.user-info{color:#6b7c96;font-size:14px;text-align:center;margin-bottom:16px;font-weight:500}

/* Padronização dos Blocos (Cards) para 12px de respiro */
.card{
  background:rgba(13,20,35,0.65);
  border:1px solid rgba(0,255,255,.08);
  border-radius:20px;
  padding:20px;
  width:100%;
  margin-top: 0 !important;
  margin-bottom: 12px !important;
  box-shadow:0 8px 32px rgba(0,0,0,0.4);
}
#login .card, .card-cadastro { max-width:440px }
#painel .card, #clientesPage .card { max-width:520px }

/* Inputs e Seletores unificados */
input,button{width:100%;padding:16px;border-radius:14px;border:none;outline:none;font-size:16px;transition:all 0.2s ease}
input{background:rgba(0,0,0,.4);color:#fff;border:1px solid rgba(255,255,255,.08);text-align:center;font-family:monospace;letter-spacing:1px}
input:focus{border-color:rgba(0,255,255,0.4);background:rgba(0,0,0,.6)}
input::placeholder{color:rgba(255,255,255,.25)}

.label{font-size:11px;letter-spacing:1px;opacity:.5;text-transform:uppercase;text-align:center;width:100%;margin-bottom:6px;font-weight:600}

/* Tipografia de Botões do Sistema */
button{background:linear-gradient(90deg,var(--blue),var(--cyan));color:#fff;font-weight:700;cursor:pointer;margin-top:12px;box-shadow:0 4px 20px rgba(0,128,255,0.25)}
button:active{transform:scale(0.98)}
.btn-sec{background:transparent;border:1px solid rgba(0,255,255,.25);color:var(--cyan);box-shadow:none}
.btn-clientes{background:transparent;border:1px solid rgba(0,255,136,.3);color:var(--green);box-shadow:none}

button.del{background:rgba(255,68,68,.08);border:1px solid rgba(255,68,68,.2);color:var(--red);font-size:13px;padding:12px;box-shadow:none}
button.del:hover{background:rgba(255,68,68,.15)}
button.edit{background:rgba(255,170,0,.08);border:1px solid rgba(255,170,0,.2);color:var(--orange);font-size:13px;padding:12px;margin-top:auto;box-shadow:none}
button.view{background:rgba(0,255,255,.08);border:1px solid rgba(0,255,255,.2);color:var(--cyan);padding:14px;margin-top:12px;box-shadow:none}
button.voltar{background:transparent;border:1px solid rgba(0,255,136,.25);color:var(--green);max-width:520px;margin-top:8px;box-shadow:none}
button.logout{margin-top:4px;background:transparent;border:1px solid rgba(255,68,68,.2);color:var(--red);max-width:440px;box-shadow:none}

/* Ajuste das Grades Adaptáveis (Removido aspect-ratio travado) */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:12px;width:100%;margin-top:8px}
#painel .grid { grid-template-columns:repeat(auto-fill,minmax(145px,1fr)) }

/* Customização interna dos itens das listas */
#lista .card, #listaUsers .card {
  background:rgba(255,255,255,0.02);
  border:1px solid rgba(255,255,255,0.05);
  border-radius:16px;
  padding:16px;
  margin:0 !important;
  display:flex;
  flex-direction:column;
  justify-content:space-between;
  min-height:160px;
  cursor:pointer;
}
#listaUsers .card { cursor:default; min-height:180px; max-width:100% }
#lista .card:hover{border-color:rgba(0,255,255,.2);background:rgba(0,255,255,0.02)}

.card-empty{grid-column:1/-1;min-height:180px;display:flex;align-items:center;justify-content:center;opacity:0.4;font-size:14px}

/* Status e Badges unificados */
.status{display:inline-flex;align-items:center;justify-content:center;gap:6px;font-size:12px;font-weight:600}
.status::before{content:'';width:8px;height:8px;border-radius:50%;display:inline-block}
.status.on{color:var(--green)}.status.on::before{background:var(--green);box-shadow:0 0 8px var(--green)}
.status.off{color:var(--red)}.status.off::before{background:var(--red);box-shadow:0 0 8px var(--red)}

.badge{display:inline-block;padding:4px 10px;border-radius:8px;font-size:11px;font-weight:700;margin-top:8px;text-align:center}
.badge-green{background:rgba(0,255,136,.08);color:#00ff88;border:1px solid rgba(0,255,136,.15)}
.badge-orange{background:rgba(255,170,0,.08);color:#ffaa00;border:1px solid rgba(255,170,0,.15)}

.card-code{font-size:14px;font-weight:700;font-family:monospace;color:#fff;margin:12px 0;text-align:center;letter-spacing:0.5px}
.card-top{display:flex;flex-direction:column;justify-content:flex-start;width:100%}

/* Grid de Células nos Modais */
.cells{display:grid;grid-template-columns:repeat(auto-fill,minmax(85px,1fr));gap:12px;margin-top:16px;width:100%}
.cell{background:rgba(0,0,0,.3);border-radius:12px;padding:10px 6px;border:1px solid rgba(255,255,255,.04);display:flex;flex-direction:column;align-items:center;justify-content:center}
.cell-num{font-size:11px;opacity:.4;margin-bottom:2px}
.cell-val{font-size:15px;font-weight:700;font-variant-numeric:tabular-nums}
.cell.ok{border-color:rgba(0,255,136,.2)}
.cell.warn{border-color:rgba(255,170,0,.2)}
.cell.crit{border-color:rgba(255,68,68,.2)}

/* Modais Modernizados com Blur de fundo */
.modal{display:none;position:fixed;inset:0;background:rgba(3,5,10,0.85);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);z-index:999;overflow-y:auto;padding:20px}
.modal.active{display:flex;align-items:center;justify-content:center}
.modal-content{width:100%;max-width:520px;background:rgba(13,20,35,0.95);border:1px solid rgba(0,255,255,.15);border-radius:24px;padding:24px;position:relative;box-shadow:0 20px 50px rgba(0,0,0,0.6)}
.modal-content.small{max-width:400px}
.modal-close{position:absolute;top:16px;right:16px;background:rgba(255,68,68,.1);border:1px solid rgba(255,68,68,.2);color:var(--red);padding:6px 12px;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;margin-top:0}

.data-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:12px}
.data-item{text-align:center;background:rgba(0,0,0,0.2);padding:10px;border-radius:12px;border:1px solid rgba(255,255,255,0.02)}
.data-item .value{font-size:24px;font-weight:800;margin-top:4px}
.btn-group{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:12px;width:100%}
.btn-group button{margin-top:0}

.value { font-variant-numeric: tabular-nums; }
.erro{background:rgba(255,68,68,.1);border:1px solid var(--red);border-radius:12px;padding:14px;margin-top:16px;color:var(--red);font-size:14px}

@media(max-width:440px){
  #painel .grid { grid-template-columns:repeat(2,1fr) }
  .btn-group { grid-template-columns:1fr }
}
</style>
</head>
<body>

<div id="login">
  <div class="title">SMART BMS</div>
  <div class="user-info">Acesso Restrito</div>
  <div class="card">
    <div class="label">Usuário</div>
    <input id="user" placeholder="administrador" autocomplete="username" value="administrador">
    <div class="label" style="margin-top:16px">Senha</div>
    <input id="password" type="password" placeholder="••••••••" autocomplete="current-password">
    <button onclick="adminLogin()">ENTRAR NO PAINEL</button>
    <div id="loginError" class="erro hidden"></div>
  </div>
</div>

<div id="painel">
  <div class="title" style="font-size:clamp(28px,6vw,32px);margin-bottom:4px">SMART BMS</div>
  <div class="user-info">Painel Administrativo</div>

  <div class="card card-cadastro">
    <div class="label">Cadastrar BMS no Sistema</div>
    <input id="code" placeholder="SL000000000000" maxlength="14" style="margin-top:8px">
    <button class="btn-clientes" onclick="cad()">CADASTRAR BMS MASTER</button>
    <button class="btn-sec" onclick="gerarECadastrar()">GERAR CÓDIGO ALEATÓRIO</button>
    <button class="btn-clientes" style="margin-top:24px" onclick="mostrarClientes()">VER CLIENTES CADASTRADOS</button>
    <p id="msg" style="text-align:center;margin-top:12px;font-size:14px;font-weight:600"></p>
  </div>

  <div class="card" style="background:transparent;border:none;box-shadow:none;padding:0">
    <div class="label">Todas as BMS do Sistema</div>
    <div id="lista" class="grid"></div>
  </div>
  
  <button class="logout" onclick="adminLogout()">SAIR DO PAINEL ADMIN</button>
</div>

<div id="clientesPage">
  <div class="title" style="font-size:clamp(28px,6vw,32px);margin-bottom:4px">SMART BMS</div>
  <div class="user-info">Clientes Cadastrados</div>
  
  <div class="card" style="background:transparent;border:none;box-shadow:none;padding:0">
    <div id="listaUsers" class="grid" style="grid-template-columns:1fr"></div>
  </div>
  
  <button class="voltar" onclick="voltarPainel()">← VOLTAR AO PAINEL</button>
</div>
<div id="modalBms" class="modal">
  <div class="modal-content">
    <button class="modal-close" onclick="closeBmsModal()">FECHAR</button>
    <h2 id="modalBmsTitle" style="text-align:center;margin-bottom:16px;font-size:22px;font-weight:900;color:var(--cyan)"></h2>
    <div id="modalBmsContent"></div>
  </div>
</div>

<div id="modalCells" class="modal">
  <div class="modal-content">
    <button class="modal-close" onclick="closeModal()">FECHAR</button>
    <h2 id="modalTitle" style="text-align:center;margin-bottom:8px;font-size:20px;font-weight:900;color:var(--cyan)"></h2>
    <div id="modalCellsContent" class="cells"></div>
  </div>
</div>

<div id="modalEditUser" class="modal">
  <div class="modal-content small">
    <button class="modal-close" onclick="closeEditUser()">FECHAR</button>
    <h2 style="text-align:center;margin-bottom:16px;font-size:20px;font-weight:900">Editar Cliente</h2>
    <input id="editUserId" type="hidden">
    <div class="label">Nome do Cliente</div>
    <input id="editUserNome" placeholder="Nome">
    <div class="label" style="margin-top:12px">E-mail de Acesso</div>
    <input id="editUserEmail" placeholder="Email">
    <button onclick="salvarUser()">SALVAR ALTERAÇÕES</button>
    <p id="editMsg" style="text-align:center;margin-top:12px;font-size:14px;font-weight:600"></p>
  </div>
</div>

<script>
const API = '/api/bms';
let adminToken = sessionStorage.getItem('admin_token');
let bmsList = [];

if(adminToken === 'admin_ok') showPainel();

async function adminLogin(){
  const user = document.getElementById('user').value;
  const password = document.getElementById('password').value;
  const errorEl = document.getElementById('loginError');
  errorEl.classList.add('hidden');

  const r = await fetch(API+'?action=login_admin',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({user,password})});
  const d = await r.json();
  if(d.ok){
    adminToken = d.token;
    sessionStorage.setItem('admin_token', adminToken);
    showPainel();
  }else{
    errorEl.textContent = d.error;
    errorEl.classList.remove('hidden');
  }
}

function showPainel(){
  document.getElementById('login').style.display = 'none';
  document.getElementById('clientesPage').style.display = 'none';
  document.getElementById('painel').classList.add('active');
  document.getElementById('painel').style.display = 'flex';
  carregarTudo();
}

function mostrarClientes(){
  document.getElementById('painel').classList.remove('active');
  document.getElementById('painel').style.display = 'none';
  document.getElementById('clientesPage').classList.add('active');
  document.getElementById('clientesPage').style.display = 'flex';
  listarUsers();
}

function voltarPainel(){
  document.getElementById('clientesPage').classList.remove('active');
  document.getElementById('clientesPage').style.display = 'none';
  document.getElementById('painel').classList.add('active');
  document.getElementById('painel').style.display = 'flex';
}

function adminLogout(){
  sessionStorage.removeItem('admin_token');
  location.reload();
}

function authHeaders(){
  return {'Content-Type':'application/json','Authorization':'Bearer '+adminToken};
}

document.getElementById('code').oninput = e => {
  if(!e.target.value.startsWith('SL')) e.target.value = 'SL';
  e.target.value = 'SL' + e.target.value.slice(2).replace(/[^0-9]/g,'').slice(0,12);
};

function gerarCodigoAleatorio(){
  const numeros = Math.floor(Math.random() * 1000000000000).toString().padStart(12, '0');
  return 'SL' + numeros;
}

async function gerarECadastrar(){
  const code = gerarCodigoAleatorio();
  document.getElementById('code').value = code;
  await cad();
}

async function cad(){
  const code = document.getElementById('code').value;
  const r = await fetch(API+'?action=admin_add_master',{method:'POST',headers:authHeaders(),body:JSON.stringify({code})});
  const d = await r.json();
  document.getElementById('msg').textContent = d.ok?'Cadastrada no sistema!':d.error;
  document.getElementById('msg').style.color = d.ok?'#00ff88':'#ff4444';
  if(d.ok){document.getElementById('code').value='';carregarTudo();}
}

async function del(code){
  event.stopPropagation();
  if(!confirm(`Deletar ${code} do sistema?`))return;
  await fetch(API+`?action=deletar&code=${code}`,{method:'DELETE',headers:authHeaders()});
  carregarTudo();
}

function viewBmsDetails(code){
  const bms = bmsList.find(b => b.code === code);
  if(!bms) return;
  
  const online = bms.updated_at && (Date.now() - new Date(bms.updated_at).getTime() < 10000);
  const cellsCount = bms.cells? bms.cells.length : 0;
  const cellsHtml = cellsCount > 0?
    `<button class="view" onclick="viewCells('${bms.code}')">Ver Células (${cellsCount})</button>` :
    '<div style="opacity:.4;font-size:13px;margin:12px 0;text-align:center">Sem dados de células</div>';
  
  document.getElementById('modalBmsTitle').textContent = bms.code;
  document.getElementById('modalBmsContent').innerHTML = `
    <div style="text-align:center;margin-bottom:16px">
      <span class="status ${online?'on':'off'}">${online?'Online':'Offline'}</span>
      <div style="margin-top:8px">${bms.user_id?`<span class="badge badge-orange">Vinculada: ${bms.dono_nome||bms.dono_email}</span>`:`<span class="badge badge-green">Disponível</span>`}</div>
    </div>
    <div class="data-row">
      <div class="data-item">
        <div class="label">SOC</div>
        <div class="value" style="color:#00ff88">${bms.soc?.toFixed(0)||0}%</div>
      </div>
      <div class="data-item">
        <div class="label">Tensão</div>
        <div class="value" style="color:#00ffff">${bms.voltage?.toFixed(2)||0}V</div>
      </div>
    </div>
    <div class="data-row">
      <div class="data-item">
        <div class="label">Corrente</div>
        <div class="value" style="color:#ffaa00">${bms.current?.toFixed(1)||0}A</div>
      </div>
      <div class="data-item">
        <div class="label">Temperatura</div>
        <div class="value" style="color:#ff4444">${bms.temp?.toFixed(1)||0}°C</div>
      </div>
    </div>
    ${cellsHtml}
  `;
  document.getElementById('modalBms').classList.add('active');
}

function closeBmsModal(){
  document.getElementById('modalBms').classList.remove('active');
}

function viewCells(code){
  const bms = bmsList.find(b => b.code === code);
  if(!bms ||!bms.cells || bms.cells.length === 0) return;
  document.getElementById('modalTitle').textContent = `Células (${bms.cells.length})`;
  document.getElementById('modalCellsContent').innerHTML = bms.cells.map((v,i)=>{
    const val = parseFloat(v);
    let cls = 'ok';
    if(val < 3.2 || val > 4.2) cls = 'crit';
    else if(val < 3.4 || val > 4.15) cls = 'warn';
    return `<div class="cell ${cls}"><div class="cell-num">C${i+1}</div><div class="cell-val">${val.toFixed(3)}</div></div>`;
  }).join('');
  document.getElementById('modalCells').classList.add('active');
}

function closeModal(){
  document.getElementById('modalCells').classList.remove('active');
}

function editarUser(id, nome, email){
  document.getElementById('editUserId').value = id;
  document.getElementById('editUserNome').value = nome;
  document.getElementById('editUserEmail').value = email;
  document.getElementById('editMsg').textContent = '';
  document.getElementById('modalEditUser').classList.add('active');
}

function closeEditUser(){
  document.getElementById('modalEditUser').classList.remove('active');
}

async function salvarUser(){
  const id = document.getElementById('editUserId').value;
  const nome = document.getElementById('editUserNome').value;
  const email = document.getElementById('editUserEmail').value;
  const msg = document.getElementById('editMsg');

  const r = await fetch(API+'?action=edit_user',{method:'POST',headers:authHeaders(),body:JSON.stringify({id:parseInt(id),nome,email})});
  const d = await r.json();
  if(d.ok){
    msg.textContent = 'Salvo!';
    msg.style.color = '#00ff88';
    setTimeout(()=>{closeEditUser();listarUsers();},1000);
  }else{
    msg.textContent = d.error;
    msg.style.color = '#ff4444';
  }
}

async function deletarUser(id, nome){
  if(!confirm(`Deletar cliente ${nome}? Todas as BMS dele serão removidas.`))return;
  await fetch(API+`?action=delete_user&id=${id}`,{method:'DELETE',headers:authHeaders()});
  listarUsers();
}

async function carregarTudo(){
  await Promise.all([listarUsers(), listarBms()]);
}

async function listarUsers(){
  const r = await fetch(API+'?action=all_users',{headers:authHeaders()});
  if(r.status===401){adminLogout();return;}
  const d = await r.json();
  document.getElementById('listaUsers').innerHTML = d.map(u=>`
    <div class="card">
      <div class="card-top">
        <div style="text-align:left;margin-bottom:12px">
          <b style="font-size:18px;color:#fff">${u.nome}</b>
          <div style="opacity:.5;font-size:13px;margin-top:4px;word-break:break-all;font-family:monospace">${u.email}</div>
          <div style="opacity:.4;font-size:11px;margin-top:4px">Cadastro: ${new Date(u.created_at).toLocaleDateString('pt-BR')}</div>
        </div>
        <div class="data-item" style="text-align:left;display:flex;justify-content:space-between;align-items:center;padding:8px 12px">
          <div class="label" style="text-align:left;margin:0">BMS Atreladas</div>
          <div class="value" style="color:#00ffff;font-size:20px;margin:0">${u.bms_count}</div>
        </div>
      </div>
      <div class="btn-group">
        <button class="edit" onclick="editarUser(${u.id},'${u.nome}','${u.email}')">EDITAR</button>
        <button class="del" onclick="deletarUser(${u.id},'${u.nome}')">EXCLUIR</button>
      </div>
    </div>
  `).join('') || '<div class="card card-empty"><div>Nenhum cliente cadastrado</div></div>';
}

async function listarBms(){
  const r = await fetch(API+'?action=admin_list_master',{headers:authHeaders()});
  const d = await r.json();
  
  bmsList = d.sort((a,b) => {
    const aOnline = a.updated_at && (Date.now() - new Date(a.updated_at).getTime() < 10000);
    const bOnline = b.updated_at && (Date.now() - new Date(b.updated_at).getTime() < 10000);
    
    if (aOnline && !bOnline) return -1;
    if (!aOnline && bOnline) return 1;
    
    const aTime = a.updated_at ? new Date(a.updated_at).getTime() : 0;
    const bTime = b.updated_at ? new Date(b.updated_at).getTime() : 0;
    return bTime - aTime;
  });
  
  document.getElementById('lista').innerHTML = bmsList.map(b=>{
    const online = b.updated_at && (Date.now() - new Date(b.updated_at).getTime() < 10000);
    const dono = b.user_id? `<span class="badge badge-orange">Vinculada</span>` : `<span class="badge badge-green">Disponível</span>`;
    return `
    <div class="card" onclick="viewBmsDetails('${b.code}')">
      <div class="card-top">
        <div style="text-align:center">
          <span class="status ${online?'on':'off'}">${online?'Online':'Offline'}</span>
        </div>
        <div class="card-code">${b.code}</div>
        <div style="text-align:center">${dono}</div>
      </div>
      <button class="del" onclick="del('${b.code}')">EXCLUIR</button>
    </div>
  `}).join('') || '<div class="card card-empty"><div>Nenhuma BMS cadastrada no sistema</div></div>';
}
setInterval(()=>{if(adminToken && document.getElementById('painel').classList.contains('active'))carregarTudo()},5000);
</script>
</body>
</html>
