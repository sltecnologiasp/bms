<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Admin - SMART BMS</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a0f;color:#fff;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui;padding:12px;overflow-x:hidden}
h1{text-align:center;font-size:24px;font-weight:800;padding:16px 0;background:linear-gradient(90deg,#ff4444,#ff8800);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.container{max-width:600px;margin:0 auto}
.card{background:rgba(15,15,25,.7);backdrop-filter:blur(10px);border:1px solid rgba(255,68,68,.25);border-radius:20px;padding:18px;margin-bottom:12px;box-shadow:0 8px 32px rgba(0,0,0,.4)}
input,button,select{width:100%;padding:14px;margin:8px 0;border-radius:14px;border:1px solid rgba(255,68,68,.3);background:rgba(0,0,0,.4);color:#fff;font-size:15px}
button{background:linear-gradient(90deg,#ff4444,#ff8800);cursor:pointer;font-weight:700;border:none;box-shadow:0 0 30px rgba(255,68,68,.3)}
.label{opacity:.6;font-size:11px;text-transform:uppercase;letter-spacing:1.5px;margin-bottom:8px}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.bms-item{background:rgba(0,0,0,.4);border:1px solid rgba(255,68,68,.15);border-radius:12px;padding:12px;margin:8px 0;display:flex;justify-content:space-between;align-items:center}
.bms-code{font-weight:700;font-size:14px}
.bms-status{font-size:11px;padding:4px 10px;border-radius:100px}
.online{background:rgba(0,255,136,.15);color:#00ff88}
.offline{background:rgba(255,68,68,.15);color:#ff4444}
.del{background:rgba(255,68,68,.2);border:1px solid rgba(255,68,68,.4);padding:6px 12px;font-size:12px;width:auto;margin:0}
.sim{background:rgba(0,255,136,.08);border:1px solid rgba(0,255,136,.3)}
.sim-btn{background:linear-gradient(90deg,#00ff88,#00cc6a);box-shadow:0 0 20px rgba(0,255,136,.3)}
.logout{background:rgba(255,68,68,.1);border:1px solid rgba(255,68,68,.3);margin-top:20px}
.hidden{display:none}
</style>
</head>
<body>
<div id="login">
  <div class="container">
    <h1>ADMIN BMS</h1>
    <div class="card">
      <div class="label">Senha Admin</div>
      <input id="pass" type="password" placeholder="Senha">
      <button onclick="login()">Entrar</button>
      <p id="error" style="color:#ff4444;margin-top:12px;display:none"></p>
    </div>
  </div>
</div>
<div id="dash" class="hidden">
  <div class="container">
    <h1>ADMIN BMS</h1>
    
    <div class="card">
      <div class="label">Cadastrar Novo BMS</div>
      <input id="newCode" placeholder="SL82576655" maxlength="10">
      <button onclick="addBms()">Cadastrar BMS</button>
      <div id="addMsg" style="opacity:.6;font-size:12px;margin-top:8px"></div>
    </div>

    <div class="card">
      <div class="label">BMS Cadastrados</div>
      <div id="bmsList"></div>
    </div>

    <div class="card sim">
      <div class="label">SIMULADOR ESP32</div>
      <select id="simSelect"></select>
      <div class="grid-2">
        <input id="simSoc" type="number" placeholder="SOC %" value="85">
        <input id="simVolt" type="number" placeholder="Tensão V" value="53.2" step="0.1">
        <input id="simCurr" type="number" placeholder="Corrente A" value="-2.5" step="0.1">
        <input id="simTemp" type="number" placeholder="Temp °C" value="28.5" step="0.1">
      </div>
      <button class="sim-btn" onclick="simulate()">Enviar Dados Teste</button>
      <div id="simMsg" style="opacity:.6;font-size:12px;margin-top:8px"></div>
    </div>

    <button class="logout" onclick="logout()">Sair</button>
  </div>
</div>
<script>
const API = '/api/admin';
let token = sessionStorage.getItem('admin_token');
let bmsList = [];
if(token) loadDash();

document.getElementById('newCode').oninput = e => {
  if(!e.target.value.startsWith('SL')) e.target.value = 'SL';
  e.target.value = 'SL' + e.target.value.slice(2).replace(/[^0-9]/g,'').slice(0,8);
};

async function login(){
  const pass = document.getElementById('pass').value;
  const errorEl = document.getElementById('error');
  errorEl.style.display='none';
  try{
    const r = await fetch(API+'?action=login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({pass})});
    const d = await r.json();
    if(d.ok){
      token = d.token;
      sessionStorage.setItem('admin_token', token);
      loadDash();
    }else{
      errorEl.textContent = d.error;
      errorEl.style.display = 'block';
    }
  }catch(e){
    errorEl.textContent = 'Erro de conexão';
    errorEl.style.display = 'block';
  }
}

function loadDash(){
  document.getElementById('login').classList.add('hidden');
  document.getElementById('dash').classList.remove('hidden');
  loadBms();
}

function logout(){
  sessionStorage.removeItem('admin_token');
  location.reload();
}

async function loadBms(){
  try{
    const r = await fetch(API+'?action=list',{headers:{'Authorization':'Bearer '+token}});
    if(r.status===401){logout();return;}
    const d = await r.json();
    bmsList = d.bms || [];
    renderBms();
    updateSimSelect();
  }catch(e){console.error(e)}
}

function renderBms(){
  const el = document.getElementById('bmsList');
  if(!bmsList.length){
    el.innerHTML = '<div style="opacity:.4;text-align:center;padding:20px">Nenhum BMS cadastrado</div>';
    return;
  }
  el.innerHTML = bmsList.map(b=>`
    <div class="bms-item">
      <div>
        <div class="bms-code">${b.code}</div>
        <div class="bms-status ${b.online?'online':'offline'}">${b.online?'● Online':'● Offline'}</div>
      </div>
      <button class="del" onclick="delBms('${b.code}')">Excluir</button>
    </div>
  `).join('');
}

async function addBms(){
  const code = document.getElementById('newCode').value;
  const msg = document.getElementById('addMsg');
  if(code.length !== 10){
    msg.textContent = 'Código deve ter 10 caracteres';
    return;
  }
  try{
    const r = await fetch(API+'?action=add',{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+token},body:JSON.stringify({code})});
    const d = await r.json();
    if(d.ok){
      msg.textContent = 'BMS cadastrado!';
      document.getElementById('newCode').value = '';
      loadBms();
      setTimeout(()=>msg.textContent='',2000);
    }else{
      msg.textContent = 'Erro: '+d.error;
    }
  }catch(e){
    msg.textContent = 'Erro de conexão';
  }
}

async function delBms(code){
  if(!confirm('Excluir '+code+'?')) return;
  try{
    const r = await fetch(API+'?action=del',{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+token},body:JSON.stringify({code})});
    const d = await r.json();
    if(d.ok) loadBms();
  }catch(e){alert('Erro ao excluir')}
}

function updateSimSelect(){
  const sel = document.getElementById('simSelect');
  sel.innerHTML = bmsList.map(b=>`<option value="${b.code}">${b.code}</option>`).join('');
}

async function simulate(){
  const btn = document.querySelector('.sim-btn');
  const msg = document.getElementById('simMsg');
  const code = document.getElementById('simSelect').value;
  if(!code){
    msg.textContent = 'Selecione um BMS';
    return;
  }
  btn.disabled = true;
  btn.textContent = 'Enviando...';
  try{
    const data = {
      code: code,
      soc: parseFloat(document.getElementById('simSoc').value),
      voltage: parseFloat(document.getElementById('simVolt').value),
      current: parseFloat(document.getElementById('simCurr').value),
      temp: parseFloat(document.getElementById('simTemp').value),
      cells: Array(16).fill(0).map(()=>3.5 + Math.random()*0.7)
    };
    const r = await fetch('/api/bms?action=update',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(data)});
    const d = await r.json();
    if(d.ok){
      msg.textContent = 'Dados enviados para '+code;
      setTimeout(()=>msg.textContent='',2000);
    }else msg.textContent = 'Erro: '+d.error;
  }catch(e){
    msg.textContent = 'Erro de conexão';
  }
  btn.disabled = false;
  btn.textContent = 'Enviar Dados Teste';
}
</script>
</body>
</html>
