<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Admin BMS</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a0f;color:#fff;font-family:system-ui;padding:0;text-align:center}
h1{text-align:center;font-size:42px;font-weight:900;padding:30px 20px;background:linear-gradient(90deg,#00ffff,#0080ff);-webkit-background-clip:text;-webkit-text-fill-color:transparent;text-shadow:0 0 30px rgba(0,255,255,.3)}
.card{background:rgba(255,255,255,.03);border:1px solid rgba(0,255,255,.3);border-radius:16px;padding:30px;margin:16px;text-align:center;box-shadow:0 0 20px rgba(0,255,255,.1),inset 0 0 20px rgba(0,255,255,.05)}
.card-cadastro{max-width:600px;margin:16px auto 32px auto}
input,button{width:100%;max-width:600px;padding:18px;margin:12px auto;border-radius:12px;border:1px solid rgba(0,255,255,.3);background:rgba(0,0,0,.4);color:#fff;font-size:18px;text-align:center;display:block;box-shadow:0 0 15px rgba(0,255,255,.1)}
button{background:linear-gradient(90deg,#0080ff,#00ffff);cursor:pointer;font-weight:700;border:none;font-family:system-ui;letter-spacing:0;box-shadow:0 0 25px rgba(0,255,255,.4)}
button.btn-secondary{background:rgba(255,170,0,.1);border:1px solid rgba(255,170,0,.4);box-shadow:0 0 15px rgba(255,170,0,.2)}
button.del{background:rgba(255,68,68,.1);border:1px solid rgba(255,68,68,.4);padding:10px;margin-top:12px;box-shadow:0 0 15px rgba(255,68,68,.2)}
button.edit{background:rgba(255,170,0,.1);border:1px solid rgba(255,170,0,.4);padding:10px;margin-top:12px;box-shadow:0 0 15px rgba(255,170,0,.2)}
button.logout{background:rgba(255,68,68,.1);border:1px solid rgba(255,68,68,.4);max-width:500px;margin:60px auto 40px;box-shadow:0 0 20px rgba(255,68,68,.2)}
button.view{background:rgba(0,255,255,.1);border:1px solid rgba(0,255,255,.4);padding:10px;margin-top:12px;box-shadow:0 0 15px rgba(0,255,255,.2)}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(min(100%,320px),1fr));gap:16px;padding:0 16px;max-width:1600px;margin:0 auto}
.grid .card{margin:0;border-radius:16px}
.status{display:inline-block;padding:6px 16px;border-radius:12px;font-size:13px;font-weight:700}
.on{background:rgba(0,255,136,.15);color:#00ff88;border:1px solid rgba(0,255,136,.4);box-shadow:0 0 15px rgba(0,255,136,.3)}
.off{background:rgba(255,68,68,.15);color:#ff4444;border:1px solid rgba(255,68,68,.4);box-shadow:0 0 15px rgba(255,68,68,.3)}
.label{opacity:.7;font-size:13px;text-transform:uppercase;text-align:center;letter-spacing:2px;margin-bottom:8px}
.cells{display:grid;grid-template-columns:repeat(auto-fill,minmax(85px,1fr));gap:10px;margin-top:16px;justify-content:center}
.cell{background:rgba(0,0,0,.4);border:1px solid rgba(0,255,255,.2);border-radius:12px;padding:12px;text-align:center;box-shadow:0 0 10px rgba(0,255,255,.1)}
.cell-num{opacity:.5;font-size:10px;text-align:center}
.cell-val{font-weight:700;font-size:14px;margin-top:4px;text-align:center}
.cell.ok{border-color:rgba(0,255,136,.5);background:rgba(0,255,136,.08);box-shadow:0 0 15px rgba(0,255,136,.2)}
.cell.warn{border-color:rgba(255,170,0,.5);background:rgba(255,170,0,.08);box-shadow:0 0 15px rgba(255,170,0,.2)}
.cell.crit{border-color:rgba(255,68,68,.5);background:rgba(255,68,68,.08);box-shadow:0 0 15px rgba(255,68,68,.2)}
.modal{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.95);z-index:999;overflow-y:auto;padding:20px}
.modal.active{display:block}
.modal-content{max-width:1200px;margin:40px auto;background:#0a0a0f;border:1px solid rgba(0,255,255,.3);border-radius:20px;padding:30px;text-align:center;box-shadow:0 0 40px rgba(0,255,255,.2)}
.modal-content.small{max-width:500px}
.modal-close{float:right;background:rgba(255,68,68,.1);border:1px solid rgba(255,68,68,.4);color:#fff;padding:10px 20px;border-radius:8px;cursor:pointer;box-shadow:0 0 15px rgba(255,68,68,.2)}
#login,#painel{position:relative;z-index:1;width:100%;min-height:100dvh;padding:20px}
.tela-ativa{display:flex!important;flex-direction:column;justify-content:center;align-items:center}
#login .card{border-radius:20px;margin:0 auto;max-width:500px;width:100%}
.data-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin:12px 0}
.data-item{text-align:center}
.data-item .label{margin-bottom:4px;font-size:11px}
.data-item .value{font-size:24px;font-weight:700;text-shadow:0 0 15px currentColor}
.btn-group{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:12px}
.section-title{font-size:24px;font-weight:900;margin:40px 0 20px;color:#00ffff;text-shadow:0 0 20px rgba(0,255,255,.4)}
.hidden{display:none!important}
.badge{display:inline-block;padding:4px 12px;border-radius:8px;font-size:11px;font-weight:700;margin-top:8px}
.badge-green{background:rgba(0,255,136,.15);color:#00ff88;border:1px solid rgba(0,255,136,.4)}
.badge-orange{background:rgba(255,170,0,.15);color:#ffaa00;border:1px solid rgba(255,170,0,.4)}

@media(max-width:768px){
  .grid{grid-template-columns:1fr;padding:0 12px}
  .card{margin:12px 0;padding:20px}
  h1{font-size:32px;padding:20px 15px}
  .section-title{font-size:20px;margin:30px 0 15px}
  input,button{font-size:16px;padding:16px}
}
</style>
</head>
<body>
<div id="login" class="tela-ativa">
  <h1>BMS SMART</h1>
  <div class="card">
    <div class="label">Acesso Administrativo</div>
    <input id="user" placeholder="Usuário" autocomplete="username" value="administrador">
    <input id="password" type="password" placeholder="Senha" autocomplete="current-password">
    <button onclick="adminLogin()">Entrar no Painel</button>
    <p id="loginError" style="color:#ff4444;margin-top:12px;display:none;text-align:center"></p>
  </div>
</div>
<div id="painel" class="hidden">
  <h1>BMS SMART</h1>
  
  <div class="section-title">Clientes Cadastrados</div>
  <div id="listaUsers" class="grid"></div>
  
  <div class="section-title">Todas as BMS do Sistema</div>
  <div class="card card-cadastro">
    <div class="label">Cadastrar BMS no Sistema</div>
    <input id="code" placeholder="SL000000000000" maxlength="14">
    <button onclick="cad()">Cadastrar BMS Master</button>
    <button class="btn-secondary" onclick="gerarECadastrar()">Gerar Código Aleatório</button>
    <p id="msg" style="text-align:center;margin-top:8px"></p>
  </div>
  <div id="lista" class="grid"></div>
  
  <button class="logout" onclick="adminLogout()">Sair do Painel Admin</button>
</div>

<div id="modal" class="modal">
  <div class="modal-content">
    <button class="modal-close" onclick="closeModal()">Fechar</button>
    <h2 id="modalTitle" style="text-align:center;margin-bottom:20px"></h2>
    <div id="modalCells" class="cells" style="margin-top:20px"></div>
  </div>
</div>

<div id="modalEditUser" class="modal">
  <div class="modal-content small">
    <button class="modal-close" onclick="closeEditUser()">Fechar</button>
    <h2 style="text-align:center;margin-bottom:20px">Editar Cliente</h2>
    <input id="editUserId" type="hidden">
    <input id="editUserNome" placeholder="Nome">
    <input id="editUserEmail" placeholder="Email">
    <button onclick="salvarUser()">Salvar</button>
    <p id="editMsg" style="text-align:center;margin-top:8px"></p>
  </div>
</div>

<script>
const API = '/api/bms';
let adminToken = sessionStorage.getItem('admin_token');
let bmsList = [];

if(adminToken === 'admin_ok') showPainel();

async function adminLogin(){
  const user = document.getElementById('user').value;
  const password = document.getElementById('password').value;
  const errorEl = document.getElementById('loginError');
  errorEl.style.display='none';
  
  const r = await fetch(API+'?action=login_admin',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({user,password})});
  const d = await r.json();
  if(d.ok){
    adminToken = d.token;
    sessionStorage.setItem('admin_token', adminToken);
    showPainel();
  }else{
    errorEl.textContent = d.error;
    errorEl.style.display='block';
  }
}

function showPainel(){
  document.getElementById('login').classList.remove('tela-ativa');
  document.getElementById('login').classList.add('hidden');
  document.getElementById('painel').classList.remove('hidden');
  document.getElementById('painel').classList.add('tela-ativa');
  carregarTudo();
}

function adminLogout(){
  sessionStorage.removeItem('admin_token');
  location.reload();
}

function authHeaders(){
  return {'Content-Type':'application/json','Authorization':'Bearer '+adminToken};
}

document.getElementById('code').oninput = e => {
  if(!e.target.value.startsWith('SL')) e.target.value = 'SL';
  e.target.value = 'SL' + e.target.value.slice(2).replace(/[^0-9]/g,'').slice(0,12);
};

function gerarCodigoAleatorio(){
  const numeros = Math.floor(Math.random() * 1000000000000).toString().padStart(12, '0');
  return 'SL' + numeros;
}

async function gerarECadastrar(){
  const code = gerarCodigoAleatorio();
  document.getElementById('code').value = code;
  await cad();
}

async function cad(){
  const code = document.getElementById('code').value;
  const r = await fetch(API+'?action=admin_add_master',{method:'POST',headers:authHeaders(),body:JSON.stringify({code})});
  const d = await r.json();
  document.getElementById('msg').textContent = d.ok?'Cadastrada no sistema!':d.error;
  document.getElementById('msg').style.color = d.ok?'#00ff88':'#ff4444';
  if(d.ok){document.getElementById('code').value='';carregarTudo();}
}

async function del(code){
  if(!confirm(`Deletar ${code} do sistema?`))return;
  await fetch(API+`?action=deletar&code=${code}`,{method:'DELETE',headers:authHeaders()});
  carregarTudo();
}

function viewCells(code){
  const bms = bmsList.find(b => b.code === code);
  if(!bms ||!bms.cells || bms.cells.length === 0) return;
  document.getElementById('modalTitle').textContent = `${bms.code} - ${bms.cells.length} Células`;
  document.getElementById('modalCells').innerHTML = bms.cells.map((v,i)=>{
    const val = parseFloat(v);
    let cls = 'ok';
    if(val < 3.2 || val > 4.2) cls = 'crit';
    else if(val < 3.4 || val > 4.15) cls = 'warn';
    return `<div class="cell ${cls}"><div class="cell-num">Célula ${i+1}</div><div class="cell-val">${val.toFixed(3)}V</div></div>`;
  }).join('');
  document.getElementById('modal').classList.add('active');
}

function closeModal(){
  document.getElementById('modal').classList.remove('active');
}

function editarUser(id, nome, email){
  document.getElementById('editUserId').value = id;
  document.getElementById('editUserNome').value = nome;
  document.getElementById('editUserEmail').value = email;
  document.getElementById('editMsg').textContent = '';
  document.getElementById('modalEditUser').classList.add('active');
}

function closeEditUser(){
  document.getElementById('modalEditUser').classList.remove('active');
}

async function salvarUser(){
  const id = document.getElementById('editUserId').value;
  const nome = document.getElementById('editUserNome').value;
  const email = document.getElementById('editUserEmail').value;
  const msg = document.getElementById('editMsg');
  
  const r = await fetch(API+'?action=edit_user',{method:'POST',headers:authHeaders(),body:JSON.stringify({id:parseInt(id),nome,email})});
  const d = await r.json();
  if(d.ok){
    msg.textContent = 'Salvo!';
    msg.style.color = '#00ff88';
    setTimeout(()=>{closeEditUser();carregarTudo();},1000);
  }else{
    msg.textContent = d.error;
    msg.style.color = '#ff4444';
  }
}

async function deletarUser(id, nome){
  if(!confirm(`Deletar cliente ${nome}? Todas as BMS dele serão removidas.`))return;
  await fetch(API+`?action=delete_user&id=${id}`,{method:'DELETE',headers:authHeaders()});
  carregarTudo();
}

async function carregarTudo(){
  await Promise.all([listarUsers(), listarBms()]);
}

async function listarUsers(){
  const r = await fetch(API+'?action=all_users',{headers:authHeaders()});
  if(r.status===401){adminLogout();return;}
  const d = await r.json();
  document.getElementById('listaUsers').innerHTML = d.map(u=>`
    <div class="card">
      <div style="text-align:left;margin-bottom:16px">
        <b style="font-size:18px">${u.nome}</b>
        <div style="opacity:.6;font-size:13px;margin-top:4px">${u.email}</div>
        <div style="opacity:.6;font-size:11px;margin-top:4px">Cadastro: ${new Date(u.created_at).toLocaleDateString('pt-BR')}</div>
      </div>
      <div class="data-item">
        <div class="label">BMS Cadastradas</div>
        <div class="value" style="color:#00ffff">${u.bms_count}</div>
      </div>
      <div class="btn-group">
        <button class="edit" onclick="editarUser(${u.id},'${u.nome}','${u.email}')">Editar</button>
        <button class="del" onclick="deletarUser(${u.id},'${u.nome}')">Excluir</button>
      </div>
    </div>
  `).join('') || '<div class="card" style="text-align:center;opacity:.4;padding:60px 20px">Nenhum cliente cadastrado</div>';
}

async function listarBms(){
  const r = await fetch(API+'?action=admin_list_master',{headers:authHeaders()});
  const d = await r.json();
  bmsList = d;
  document.getElementById('lista').innerHTML = d.map(b=>{
    const online = b.online&&(Date.now()-new Date(b.updated_at).getTime()<10000);
    const cellsCount = b.cells? b.cells.length : 0;
    const cellsHtml = cellsCount > 0? 
      `<button class="view" onclick="viewCells('${b.code}')">Ver ${cellsCount} Células</button>` : 
      '<div style="opacity:.4;font-size:13px;margin-top:12px;text-align:center">Sem dados de células</div>';
    const dono = b.user_id? `<span class="badge badge-orange">Vinculada: ${b.dono_nome||b.dono_email}</span>` : `<span class="badge badge-green">Disponível</span>`;
    return `
    <div class="card">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
        <div style="text-align:left"><b style="font-size:18px">${b.code}</b></div>
        <span class="status ${online?'on':'off'}">${online?'Online':'Offline'}</span>
      </div>
      <div style="text-align:center;margin-bottom:12px">${dono}</div>
      <div class="data-row">
        <div class="data-item">
          <div class="label">SOC</div>
          <div class="value" style="color:#00ff88">${b.soc?.toFixed(0)||0}%</div>
        </div>
        <div class="data-item">
          <div class="label">Tensão</div>
          <div class="value" style="color:#00ffff">${b.voltage?.toFixed(2)||0}V</div>
        </div>
      </div>
      <div class="data-row">
        <div class="data-item">
          <div class="label">Corrente</div>
          <div class="value" style="color:#ffaa00">${b.current?.toFixed(1)||0}A</div>
        </div>
        <div class="data-item">
          <div class="label">Temperatura</div>
          <div class="value" style="color:#ff4444">${b.temp?.toFixed(1)||0}°C</div>
        </div>
      </div>
      ${cellsHtml}
      <button class="del" onclick="del('${b.code}')">Excluir do Sistema</button>
    </div>
  `}).join('') || '<div class="card" style="text-align:center;opacity:.4;padding:60px 20px">Nenhuma BMS cadastrada no sistema</div>';
}
setInterval(()=>{if(adminToken)carregarTudo()},5000);
</script>
</body>
</html>
