<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>BMS SMART - Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#05070d;--cyan:#00ffff;--blue:#0080ff;--green:#00ff88;--red:#ff4444;--orange:#ffaa00}
body{font-family:'Inter',sans-serif;background:var(--bg);color:#fff;min-height:100vh;padding:20px}
body::before{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,rgba(255,255,255,.03) 0 1px,transparent 1px 40px),repeating-linear-gradient(90deg,rgba(255,255,255,.03) 0 1px,transparent 1px 40px);opacity:.4;pointer-events:none;z-index:0}
.tela{position:relative;z-index:1;width:100%;min-height:100vh;display:flex;flex-direction:column;justify-content:center;align-items:center}
.title{font-size:clamp(42px,8vw,74px);font-weight:900;margin-bottom:16px;letter-spacing:3px;background:linear-gradient(90deg,var(--cyan),var(--blue));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.card{background:rgba(10,15,25,.92);border:1px solid rgba(0,255,255,.12);border-radius:16px;padding:24px;width:100%;max-width:500px;box-shadow:0 4px 20px rgba(0,0,0,.4)}
.card-wide{max-width:1200px}
.label{font-size:11px;letter-spacing:1.5px;opacity:.6;text-transform:uppercase;margin-bottom:8px;text-align:center}
input,button{width:100%;padding:18px;border-radius:18px;border:none;outline:none;margin-top:12px;font-size:16px}
input{background:rgba(0,0,0,.5);color:#fff;border:1px solid rgba(0,255,255,.2)}
input:focus{border-color:var(--cyan);box-shadow:0 0 15px rgba(0,255,255,.2)}
button{background:linear-gradient(90deg,var(--blue),var(--cyan));color:#fff;font-weight:700;cursor:pointer;box-shadow:0 4px 20px rgba(0,255,255,.25)}
button.danger{background:rgba(255,68,68,.1);border:1px solid rgba(255,68,68,.3);box-shadow:none}
.error{color:#ff4444;margin-top:12px;text-align:center;font-size:14px}
.success{color:#00ff88;margin-top:12px;text-align:center;font-size:14px}
.hidden{display:none!important}
.header{display:flex;justify-content:space-between;align-items:center;margin-bottom:24px}
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:16px;margin-bottom:24px}
.stat-card{background:rgba(0,0,0,.4);border:1px solid rgba(0,255,255,.2);border-radius:12px;padding:20px;text-align:center}
.stat-value{font-size:36px;font-weight:900;color:var(--cyan);margin-top:8px}
.stat-label{font-size:12px;opacity:.6;text-transform:uppercase;letter-spacing:1px}
table{width:100%;margin-top:20px;border-collapse:collapse;font-size:14px}
th{padding:12px 8px;text-align:left;font-size:11px;letter-spacing:1px;opacity:.6;text-transform:uppercase;border-bottom:1px solid rgba(0,255,255,.2)}
td{padding:12px 8px;border-bottom:1px solid rgba(255,255,255,.05)}
tr:hover{background:rgba(0,255,255,.05)}
.status{display:inline-flex;align-items:center;gap:6px;padding:6px 12px;border-radius:999px;font-weight:700;font-size:12px}
.status.on{background:rgba(0,255,136,.12);color:var(--green);border:1px solid rgba(0,255,136,.3)}
.status.off{background:rgba(255,68,68,.12);color:var(--red);border:1px solid rgba(255,68,68,.3)}
.section-title{font-size:20px;font-weight:700;margin:32px 0 16px;color:var(--cyan)}
</style>
</head>
<body>

<div id="login" class="tela">
  <div class="title">BMS SMART</div>
  <div class="card">
    <div class="label">Acesso Administrativo</div>
    <input id="user" placeholder="Usuário" value="administrador">
    <input id="pass" type="password" placeholder="Senha">
    <button onclick="login()">Entrar no Painel</button>
    <p id="msg" style="display:none;"></p>
  </div>
</div>

<div id="painel" class="tela hidden" style="justify-content:flex-start;padding-top:40px">
  <div class="card card-wide">
    <div class="header">
      <div class="title" style="font-size:32px;margin:0">ADMIN</div>
      <button class="danger" style="width:auto;padding:10px 20px" onclick="sair()">Sair</button>
    </div>

    <div class="stats">
      <div class="stat-card">
        <div class="stat-label">Clientes</div>
        <div class="stat-value" id="totalUsers">0</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">BMS Cadastradas</div>
        <div class="stat-value" id="totalBms">0</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">BMS Online</div>
        <div class="stat-value" id="totalOnline" style="color:var(--green)">0</div>
      </div>
    </div>

    <div class="section-title">Clientes Cadastrados</div>
    <table id="tabelaUsers">
      <tr><th>Nome</th><th>Email</th><th>BMS</th><th>Cadastro</th></tr>
      <tr><td colspan="4" style="text-align:center;opacity:.4">Carregando...</td></tr>
    </table>

    <div class="section-title">Todas as BMS</div>
    <table id="tabelaBms">
      <tr><th>Código</th><th>Nome</th><th>Status</th><th>SOC</th><th>Tensão</th><th>Atualizado</th></tr>
      <tr><td colspan="6" style="text-align:center;opacity:.4">Carregando...</td></tr>
    </table>
  </div>
</div>

<script>
const API = '/api/bms';
let token = localStorage.getItem('admin_token');

if(token) showPainel();

async function login(){
  const user = document.getElementById('user').value;
  const password = document.getElementById('pass').value;
  const msg = document.getElementById('msg');
  msg.style.display = 'none';
  
  try{
    const r = await fetch(API+'?action=login_admin',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({user,password})
    });
    const d = await r.json();
    if(d.ok){
      token = d.token;
      localStorage.setItem('admin_token', token);
      showPainel();
    } else {
      msg.textContent = d.error||'Erro';
      msg.className = 'error';
      msg.style.display = 'block';
    }
  }catch(e){
    msg.textContent = 'Erro de conexão';
    msg.className = 'error';
    msg.style.display = 'block';
  }
}

function showPainel(){
  document.getElementById('login').classList.add('hidden');
  document.getElementById('painel').classList.remove('hidden');
  loadData();
  setInterval(loadData, 10000);
}

async function loadData(){
  await Promise.all([loadUsers(), loadBms()]);
}

async function loadUsers(){
  try{
    const r = await fetch(API+'?action=all_users',{headers:{'Authorization':'Bearer '+token}});
    if(r.status===401){sair();return}
    const d = await r.json();
    document.getElementById('totalUsers').textContent = d.length;
    const t = document.getElementById('tabelaUsers');
    if(d.length===0){t.innerHTML='<tr><th>Nome</th><th>Email</th><th>BMS</th><th>Cadastro</th></tr><tr><td colspan="4" style="text-align:center;opacity:.4">Nenhum cliente</td></tr>';return}
    t.innerHTML = '<tr><th>Nome</th><th>Email</th><th>BMS</th><th>Cadastro</th></tr>' + 
      d.map(u=>`<tr><td>${u.nome}</td><td>${u.email}</td><td>${u.bms_count}</td><td>${new Date(u.created_at).toLocaleDateString('pt-BR')}</td></tr>`).join('');
  }catch(e){console.error(e)}
}

async function loadBms(){
  try{
    const r = await fetch(API+'?action=all_bms',{headers:{'Authorization':'Bearer '+token}});
    const d = await r.json();
    document.getElementById('totalBms').textContent = d.length;
    const online = d.filter(b=>b.online&&(Date.now()-new Date(b.updated_at).getTime()<10000)).length;
    document.getElementById('totalOnline').textContent = online;
    const t = document.getElementById('tabelaBms');
    if(d.length===0){t.innerHTML='<tr><th>Código</th><th>Nome</th><th>Status</th><th>SOC</th><th>Tensão</th><th>Atualizado</th></tr><tr><td colspan="6" style="text-align:center;opacity:.4">Nenhuma BMS</td></tr>';return}
    t.innerHTML = '<tr><th>Código</th><th>Nome</th><th>Status</th><th>SOC</th><th>Tensão</th><th>Atualizado</th></tr>' + 
      d.map(b=>{
        const on = b.online&&(Date.now()-new Date(b.updated_at).getTime()<10000);
        const ago = Math.floor((Date.now()-new Date(b.updated_at).getTime())/1000);
        const tempo = ago<60?ago+'s':ago<3600?Math.floor(ago/60)+'min':Math.floor(ago/3600)+'h';
        return `<tr>
          <td style="font-family:monospace">${b.code}</td>
          <td>${b.nome||'Sem nome'}</td>
          <td><span class="status ${on?'on':'off'}">${on?'Online':'Offline'}</span></td>
          <td>${b.soc?.toFixed(1)||0}%</td>
          <td>${b.voltage?.toFixed(2)||0}V</td>
          <td style="opacity:.6">${tempo} atrás</td>
        </tr>`
      }).join('');
  }catch(e){console.error(e)}
}

function sair(){
  localStorage.removeItem('admin_token');
  token=null;
  location.reload();
}
</script>
</body>
</html>
