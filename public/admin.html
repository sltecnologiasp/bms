<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>BMS SMART - Admin</title>
<style>
body{background:#05070d;color:#fff;font-family:system-ui;padding:20px}
.card{background:rgba(255,255,255,.05);border:1px solid #00ffff;padding:20px;border-radius:12px;max-width:500px;margin:20px auto}
input,button{width:100%;padding:16px;margin:8px 0;border-radius:8px;border:1px solid #00ffff;background:#000;color:#fff;font-size:16px}
button{background:#00ffff;color:#000;font-weight:700}
.title{font-size:32px;font-weight:900;text-align:center;margin-bottom:20px;color:#00ffff}
#debug{background:#000;border:1px solid #00ff00;padding:12px;margin-top:12px;font-size:12px;white-space:pre-wrap;word-break:break-all}
.error{color:#ff4444;margin-top:8px;text-align:center}
.hidden{display:none}
table{width:100%;margin-top:20px;border-collapse:collapse}
td,th{padding:8px;border-bottom:1px solid rgba(0,255,255,.2);text-align:left;font-size:14px}
</style>
</head>
<body>

<div id="login" class="card">
  <div class="title">BMS SMART</div>
  <div style="font-size:11px;opacity:.6;text-align:center;margin-bottom:16px">ACESSO ADMINISTRATIVO</div>
  <input id="user" placeholder="Usuário" value="administrador">
  <input id="pass" type="password" placeholder="Senha" value="426240637">
  <button onclick="login()">Entrar no Painel</button>
  <div id="msg"></div>
</div>

<div id="painel" class="card hidden" style="max-width:1000px">
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px">
    <div class="title" style="margin:0">ADMIN</div>
    <button onclick="sair()" style="width:auto;padding:8px 16px;background:#ff4444">Sair</button>
  </div>
  <h3>Clientes Cadastrados</h3>
  <table id="tabelaUsers"><tr><td>Carregando...</td></tr></table>
  <h3 style="margin-top:30px">Todas as BMS</h3>
  <table id="tabelaBms"><tr><td>Carregando...</td></tr></table>
</div>

<div id="debug">Console: Aguardando...</div>

<script>
const API = '/api/bms';
let token = localStorage.getItem('admin_token');

function log(t){
  const d = document.getElementById('debug');
  d.textContent += '\n' + (typeof t === 'string' ? t : JSON.stringify(t));
}

log('JS carregado. Token: ' + (token ? 'SIM' : 'NÃO'));

if(token) showPainel();

async function login(){
  const user = document.getElementById('user').value;
  const password = document.getElementById('pass').value;
  const msg = document.getElementById('msg');
  msg.innerHTML = '';
  
  log('Tentando login admin: ' + user);
  
  try{
    const r = await fetch(API+'?action=login_admin',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({user,password})
    });
    log('Status: ' + r.status);
    const d = await r.json();
    log('Resposta: ' + JSON.stringify(d));
    
    if(d.ok){
      token = d.token;
      localStorage.setItem('admin_token', token);
      msg.innerHTML = '<div style="color:#00ff88">Logado!</div>';
      setTimeout(showPainel, 500);
    } else {
      msg.innerHTML = '<div class="error">'+(d.error||'Erro')+'</div>';
    }
  }catch(e){
    log('ERRO: ' + e.message);
    msg.innerHTML = '<div class="error">Erro: '+e.message+'</div>';
  }
}

function showPainel(){
  document.getElementById('login').classList.add('hidden');
  document.getElementById('painel').classList.remove('hidden');
  loadUsers();
  loadBms();
}

async function loadUsers(){
  log('Carregando users...');
  try{
    const r = await fetch(API+'?action=all_users',{headers:{'Authorization':'Bearer '+token}});
    log('Users status: ' + r.status);
    if(r.status===401){sair();return}
    const d = await r.json();
    log('Users: ' + d.length);
    const t = document.getElementById('tabelaUsers');
    if(d.length===0){t.innerHTML='<tr><td>Nenhum cliente</td></tr>';return}
    t.innerHTML = '<tr><th>Nome</th><th>Email</th><th>BMS</th><th>Cadastro</th></tr>' + 
      d.map(u=>`<tr><td>${u.nome}</td><td>${u.email}</td><td>${u.bms_count}</td><td>${new Date(u.created_at).toLocaleDateString()}</td></tr>`).join('');
  }catch(e){log('Erro users: ' + e.message)}
}

async function loadBms(){
  log('Carregando BMS...');
  try{
    const r = await fetch(API+'?action=all_bms',{headers:{'Authorization':'Bearer '+token}});
    log('BMS status: ' + r.status);
    const d = await r.json();
    log('BMS: ' + d.length);
    const t = document.getElementById('tabelaBms');
    if(d.length===0){t.innerHTML='<tr><td>Nenhuma BMS</td></tr>';return}
    t.innerHTML = '<tr><th>Código</th><th>Nome</th><th>Status</th><th>SOC</th><th>Tensão</th></tr>' + 
      d.map(b=>{
        const on = b.online&&(Date.now()-new Date(b.updated_at).getTime()<10000);
        return `<tr><td>${b.code}</td><td>${b.nome}</td><td style="color:${on?'#00ff88':'#ff4444'}">${on?'Online':'Offline'}</td><td>${b.soc||0}%</td><td>${b.voltage||0}V</td></tr>`
      }).join('');
  }catch(e){log('Erro BMS: ' + e.message)}
}

function sair(){
  localStorage.removeItem('admin_token');
  token=null;
  location.reload();
}
</script>
</body>
</html>
