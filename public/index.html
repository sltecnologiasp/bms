<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>SMART BMS</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box}

:root{
--bg:#05070d;
--cyan:#00ffff;
--blue:#0080ff;
--green:#00ff88;
--red:#ff4444;
--orange:#ffaa00
}

body{
font-family:'Inter',sans-serif;
background:var(--bg);
color:#fff;
min-height:100vh;
width:100%;
overflow-x:hidden
}

#dash{
width:100%;
min-height:100vh;
padding:8px
}

.card{
background:rgba(10,15,25,.92);
border:1px solid rgba(0,255,255,.12);
border-radius:16px;
padding:12px;
width:100%;
margin-bottom:6px
}

.gauge-wrap{
width:100%
}

.gauge-card{
padding:20px 20px 30px;
min-height:280px
}

.gauge{
width:min(240px,60vw);
height:min(240px,60vw);
margin:auto;
border-radius:50%;
background:conic-gradient(#00ff88 0deg,#00ffff 180deg,rgba(255,255,255,.08) 180deg);
position:relative;
box-shadow:0 0 30px rgba(0,255,255,.15)
}

.gauge::before{
content:'';
position:absolute;
inset:18px;
border-radius:50%;
background:#05070d
}

.gauge-inner{
position:absolute;
inset:0;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
z-index:2
}

.gauge-value{
font-size:clamp(36px,10vw,58px);
font-weight:900;
color:#00ff88
}

.gauge-label{
opacity:.6;
letter-spacing:2px;
font-size:12px
}

.bar-wrap{
margin-top:20px
}

.bar-label{
display:flex;
justify-content:space-between;
margin-bottom:8px;
font-size:14px;
opacity:.7
}

.bar{
height:16px;
background:rgba(255,255,255,.06);
border-radius:999px;
overflow:hidden
}

.bar-fill{
height:100%;
width:0%;
border-radius:999px;
background:linear-gradient(90deg,#00ff88,#00ffff);
transition:width.8s ease
}

.label{
font-size:10px;
letter-spacing:1.5px;
opacity:.6;
text-transform:uppercase;
text-align:center
}

.status{
display:inline-flex;
align-items:center;
justify-content:center;
padding:14px 26px;
border-radius:999px;
font-weight:700;
width:160px
}

.on{
background:rgba(0,255,136,.12);
color:var(--green);
border:1px solid rgba(0,255,136,.3)
}

.off{
background:rgba(255,68,68,.12);
color:var(--red);
border:1px solid rgba(255,68,68,.3)
}

.status-wrap{
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
margin-top:14px
}

.bms-code{
font-size:22px;
font-weight:700;
margin-top:12px;
letter-spacing:1.5px;
text-align:center
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(140px,1fr));
gap:6px;
width:100%
}

.grid .card{
height:110px;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center
}

.value{
font-size:30px;
font-weight:800;
margin-top:8px
}

.diff{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:6px;
margin-top:18px
}

.diff-item{
padding:12px 8px;
border-radius:14px;
background:rgba(255,255,255,.03);
text-align:center
}

.diff-item span{
display:block;
margin-top:6px;
font-size:22px;
font-weight:800
}

.cells{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(85px,1fr));
gap:10px;
margin-top:20px
}

.cell{
background:rgba(0,0,0,.4);
border-radius:18px;
padding:14px;
border:1px solid rgba(255,255,255,.05);
text-align:center
}

.cell.ok{
border-color:rgba(0,255,136,.25)
}

.cell.warn{
border-color:rgba(255,170,0,.25)
}

.cell.crit{
border-color:rgba(255,68,68,.25)
}

.cell-num{
font-size:11px;
opacity:.5;
margin-bottom:6px
}

.cell-val{
font-size:20px;
font-weight:700
}

@media(max-width:520px){
.grid{
grid-template-columns:repeat(2,1fr)
}

.diff{
grid-template-columns:repeat(2,1fr)
}
}
</style>
</head>

<body>

<div id="dash">

<div class="gauge-wrap">
<div class="card gauge-card">

<div class="gauge" id="socGauge">
<div class="gauge-inner">
<div class="gauge-value" id="socValor">0%</div>
<div class="gauge-label">STATE OF CHARGE</div>
</div>
</div>

<div class="bar-wrap">
<div class="bar-label">
<span>Bateria</span>
<span id="socBarTxt">0%</span>
</div>

<div class="bar">
<div class="bar-fill" id="socBar"></div>
</div>
</div>

</div>
</div>

<div class="card">

<div class="label">Status</div>

<div class="status-wrap">
<span id="status" class="status off">Offline</span>
<div class="bms-code" id="bms-titulo">SL000000000000</div>
</div>

</div>

<div class="grid">

<div class="card">
<div class="label">SOC</div>
<div class="value" id="soc" style="color:#00ff88">0%</div>
</div>

<div class="card">
<div class="label">Tensão</div>
<div class="value" id="volt" style="color:#00ffff">0V</div>
</div>

<div class="card">
<div class="label">Corrente</div>
<div class="value" id="corr" style="color:#ffaa00">0A</div>
</div>

<div class="card">
<div class="label">Temperatura</div>
<div class="value" id="temp" style="color:#ff4444">0°C</div>
</div>

</div>

<div class="card">

<div class="label">Células - Tensão Individual</div>

<div class="diff">

<div class="diff-item">
Min
<div><span id="celMin" style="color:#00ff88">0.00V</span></div>
</div>

<div class="diff-item">
Max
<div><span id="celMax" style="color:#ffaa00">0.00V</span></div>
</div>

<div class="diff-item">
Diferença
<div><span id="celDif" style="color:#ff4444">0.00V</span></div>
</div>

<div class="diff-item">
Total
<div><span id="celTot" style="color:#00ffff">0</span></div>
</div>

</div>

<div id="celulas" class="cells"></div>

</div>

</div>

<script>

function limparDashboard(){

document.getElementById('soc').textContent='0%';
document.getElementById('volt').textContent='0V';
document.getElementById('corr').textContent='0A';
document.getElementById('temp').textContent='0°C';

document.getElementById('celMin').textContent='0.00V';
document.getElementById('celMax').textContent='0.00V';
document.getElementById('celDif').textContent='0.00V';
document.getElementById('celTot').textContent='0';

document.getElementById('celulas').innerHTML=
'<div style="grid-column:1/-1;opacity:.4;padding:20px;text-align:center">ESP32 Offline</div>';

atualizarGauge(0);
}

function atualizarGauge(soc){

var gauge=document.getElementById('socGauge');
var valor=document.getElementById('socValor');
var bar=document.getElementById('socBar');
var txt=document.getElementById('socBarTxt');

var deg=soc*3.6;

valor.textContent=soc+'%';
txt.textContent=soc+'%';

bar.style.width=soc+'%';

gauge.style.background=
'conic-gradient(#00ff88 0deg,#00ffff '+deg+'deg,rgba(255,255,255,.08) '+deg+'deg)';
}

function renderCelulas(cels){

if(!cels||cels.length===0){

document.getElementById('celulas').innerHTML=
'<div style="grid-column:1/-1;opacity:.4;padding:20px;text-align:center">Sem dados das células</div>';

return;
}

var vals=[];

for(var i=0;i<cels.length;i++){

var v=parseFloat(cels[i]);

if(v>0) vals.push(v);
}

if(vals.length===0) return;

var min=Math.min.apply(null,vals);
var max=Math.max.apply(null,vals);
var dif=max-min;

document.getElementById('celMin').textContent=min.toFixed(3)+'V';
document.getElementById('celMax').textContent=max.toFixed(3)+'V';
document.getElementById('celDif').textContent=dif.toFixed(3)+'V';
document.getElementById('celTot').textContent=cels.length;

var html='';

for(var i=0;i<cels.length;i++){

var val=parseFloat(cels[i]);

var cls='ok';

if(val<3.2||val>4.2) cls='crit';
else if(val<3.4||val>4.15) cls='warn';

html+='<div class="cell '+cls+'">';
html+='<div class="cell-num">C'+(i+1)+'</div>';
html+='<div class="cell-val">'+val.toFixed(3)+'V</div>';
html+='</div>';
}

document.getElementById('celulas').innerHTML=html;
}

function atualizar(){

fetch('/api/bms?action=data&code=SL000000000000')

.then(r=>r.json())

.then(function(d){

var st=document.getElementById('status');

if(!d.online){

st.textContent='Offline';
st.className='status off';

limparDashboard();

return;
}

document.getElementById('soc').textContent=
(d.soc?d.soc.toFixed(0):0)+'%';

document.getElementById('volt').textContent=
(d.voltage?d.voltage.toFixed(2):0)+'V';

document.getElementById('corr').textContent=
(d.current?d.current.toFixed(1):0)+'A';

document.getElementById('temp').textContent=
(d.temp?d.temp.toFixed(1):0)+'°C';

st.textContent='Online';
st.className='status on';

renderCelulas(d.cells);

atualizarGauge(parseInt(d.soc||0));
})

.catch(function(){

var st=document.getElementById('status');

st.textContent='Offline';
st.className='status off';

limparDashboard();
});
}

setInterval(atualizar,3000);

atualizar();

</script>

</body>
</html>
