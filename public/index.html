<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">

<title>SMART BMS</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
-webkit-tap-highlight-color:transparent;
}

:root{
--bg:#05070d;
--cyan:#00ffff;
--blue:#0080ff;
--green:#00ff88;
--red:#ff4444;
--orange:#ffaa00;
}

body{
font-family:'Inter',sans-serif;
background:
radial-gradient(circle at top,#071426 0%,#04070d 45%,#02040a 100%);
color:#fff;
min-height:100vh;
width:100%;
overflow-x:hidden;
}

#login,
#dash,
#lista,
#cadastro{
position:relative;
z-index:1;
width:100%;
min-height:100vh;
display:flex;
flex-direction:column;
align-items:center;
padding:12px;
}

#dash,
#lista{
justify-content:flex-start;
padding-top:16px;
}

#login,
#cadastro{
justify-content:center;
}

.title{
font-size:clamp(40px,9vw,74px);
font-weight:900;
margin-bottom:18px;
letter-spacing:4px;
background:linear-gradient(90deg,#00ffff,#0080ff,#00ffff);
background-size:200% auto;
animation:shine 4s linear infinite;
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
text-align:center;
width:100%;
filter:drop-shadow(0 0 20px rgba(0,255,255,.35));
}

@keyframes shine{
0%{background-position:0% center}
100%{background-position:200% center}
}

.card{
background:
linear-gradient(180deg,rgba(8,18,35,.96),rgba(5,10,20,.96));
border:1px solid rgba(0,255,255,.18);
border-radius:24px;
padding:16px;
width:100%;
margin-bottom:12px;
box-shadow:
0 0 25px rgba(0,255,255,.06),
inset 0 0 30px rgba(0,180,255,.03);
backdrop-filter:blur(10px);
}

.label{
font-size:11px;
letter-spacing:2px;
opacity:.7;
text-transform:uppercase;
text-align:center;
margin-bottom:10px;
}

input,
button{
width:100%;
padding:18px;
border-radius:20px;
border:none;
outline:none;
margin-top:14px;
font-size:18px;
font-weight:700;
}

input{
background:rgba(0,0,0,.45);
color:#fff;
font-family:monospace;
letter-spacing:2px;
border:1px solid rgba(0,255,255,.22);
box-shadow:inset 0 0 18px rgba(0,255,255,.04);
}

input::placeholder{
color:rgba(255,255,255,.35);
}

button{
background:linear-gradient(90deg,#007bff,#00e5ff);
color:#fff;
cursor:pointer;
box-shadow:
0 0 30px rgba(0,180,255,.25),
inset 0 0 10px rgba(255,255,255,.08);
transition:.25s;
}

button:hover{
transform:translateY(-1px);
filter:brightness(1.08);
}

.btn-sec{
background:transparent;
border:1px solid rgba(0,255,255,.3);
color:var(--cyan);
}

.logout{
margin-top:28px;
background:linear-gradient(180deg,#2a0012,#1a000a);
border:1px solid rgba(255,0,80,.22);
box-shadow:
0 0 30px rgba(255,0,80,.12),
inset 0 0 20px rgba(255,0,80,.04);
font-size:20px;
font-weight:900;
letter-spacing:1px;
}

.hidden{
display:none!important;
}

.user-info{
color:#c6f7ff;
font-size:16px;
text-align:center;
margin-bottom:20px;
opacity:.9;
}

.link-cadastro{
margin-top:20px;
text-align:center;
color:#fff;
cursor:pointer;
opacity:.85;
}

.link-cadastro span{
color:#00ffff;
text-decoration:underline;
}

.erro{
background:rgba(255,0,0,.12);
border:1px solid rgba(255,80,80,.45);
border-radius:18px;
padding:16px;
margin-top:16px;
color:#ff6666;
font-size:14px;
}

.bms-list{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(260px,1fr));
gap:10px;
margin-top:20px;
width:100%;
}

.bms-item{
background:
linear-gradient(180deg,rgba(0,255,255,.06),rgba(0,120,255,.04));
border:1px solid rgba(0,255,255,.25);
border-radius:26px;
padding:22px;
text-align:center;
display:flex;
flex-direction:column;
align-items:center;
gap:10px;
transition:.25s;
box-shadow:
0 0 30px rgba(0,255,255,.08),
inset 0 0 20px rgba(0,255,255,.03);
}

.bms-item:hover{
transform:translateY(-2px);
border-color:rgba(0,255,255,.55);
box-shadow:
0 0 40px rgba(0,255,255,.18),
0 0 80px rgba(0,120,255,.08);
}

.bms-item h3{
color:#00ffff;
font-size:30px;
font-weight:900;
text-shadow:0 0 18px rgba(0,255,255,.8);
letter-spacing:1px;
}

.bms-item p{
color:#d7faff;
font-size:14px;
opacity:.92;
}

.status{
display:inline-flex;
align-items:center;
justify-content:center;
padding:12px 22px;
border-radius:999px;
font-weight:800;
font-size:14px;
letter-spacing:1px;
min-width:150px;
}

.on{
background:rgba(0,255,136,.15);
color:#00ff88;
border:1px solid rgba(0,255,136,.45);
box-shadow:
0 0 25px rgba(0,255,136,.25),
inset 0 0 15px rgba(0,255,136,.1);
}

.off{
background:rgba(255,60,60,.12);
color:#ff5555;
border:1px solid rgba(255,80,80,.35);
box-shadow:
0 0 25px rgba(255,0,0,.12),
inset 0 0 15px rgba(255,0,0,.05);
}

.bms-item button{
width:100%;
border-radius:18px;
padding:18px;
font-size:16px;
margin-top:8px;
}

.bms-item button.del{
background:linear-gradient(180deg,#2a1620,#1b1017);
border:1px solid rgba(255,70,70,.25);
color:#fff;
box-shadow:
0 0 20px rgba(255,0,0,.08),
inset 0 0 10px rgba(255,0,0,.04);
}

@media(max-width:520px){

.bms-list{
grid-template-columns:1fr;
}

.card{
padding:14px;
}

}

</style>
</head>

<body>

<div id="login">

<div class="title">SMART BMS</div>

<div class="card">

<div class="label">E-mail</div>
<input id="email" type="email" placeholder="seu@email.com">

<div class="label" style="margin-top:16px">Senha</div>
<input id="senha" type="password" placeholder="••••••••">

<button onclick="login()">ENTRAR</button>

<p class="link-cadastro" onclick="mostrarCadastro()">
Ainda não tem conta?
<span>Cadastre-se</span>
</p>

<div id="erro" class="erro hidden"></div>

</div>
</div>

<div id="cadastro" class="hidden">

<div class="title">SMART BMS</div>

<div class="card">

<div class="label">Nome</div>
<input id="cad-nome" placeholder="Seu nome">

<div class="label" style="margin-top:16px">E-mail</div>
<input id="cad-email" type="email" placeholder="seu@email.com">

<div class="label" style="margin-top:16px">Senha</div>
<input id="cad-senha" type="password" placeholder="••••••••">

<button onclick="cadastrar()">CADASTRAR</button>

<button class="btn-sec" onclick="mostrarLogin()">VOLTAR</button>

<div id="erro-cad" class="erro hidden"></div>

</div>
</div>

<div id="lista" class="hidden">

<div class="title" style="font-size:clamp(30px,7vw,42px)">SMART BMS</div>

<div class="user-info">
Olá, <span id="user-nome">Usuário</span>
</div>

<div class="card">

<div class="label">Adicionar BMS</div>

<input id="bms-code" placeholder="SL000000000000" maxlength="14">

<input id="bms-nome" placeholder="Nome da BMS">

<button onclick="addBms()">ADICIONAR BMS</button>

</div>

<div class="card">

<div class="label">Minhas BMS</div>

<div id="bms-list" class="bms-list"></div>

</div>

<button class="logout" onclick="sair()">SAIR</button>

</div>

<script>

var API = '/api/bms';

var TOKEN = localStorage.getItem('bms_token');

var USER = null;

try{
USER = JSON.parse(localStorage.getItem('bms_user') || 'null');
}catch(e){}

function esconderTudo(){

document.getElementById('login').classList.add('hidden');
document.getElementById('cadastro').classList.add('hidden');
document.getElementById('lista').classList.add('hidden');

}

window.onload = function(){

if(TOKEN && USER){

mostrarLista();

}else{

mostrarLogin();

}

var bmsInput = document.getElementById('bms-code');

if(bmsInput){

bmsInput.oninput = function(e){

if(!e.target.value.startsWith('SL')){

e.target.value = 'SL';

}

e.target.value =
'SL' +
e.target.value
.slice(2)
.replace(/[^0-9]/g,'')
.slice(0,12);

};

}

};

function mostrarLogin(){

esconderTudo();

document.getElementById('login').classList.remove('hidden');

}

function mostrarCadastro(){

esconderTudo();

document.getElementById('cadastro').classList.remove('hidden');

}

function login(){

document.getElementById('erro').classList.add('hidden');

var email = document.getElementById('email').value.trim();

var senha = document.getElementById('senha').value;

if(!email || !senha){

var e = document.getElementById('erro');

e.textContent = 'Preencha e-mail e senha';

e.classList.remove('hidden');

return;

}

fetch(API + '?action=login_user',{

method:'POST',

headers:{
'Content-Type':'application/json'
},

body:JSON.stringify({
email:email,
senha:senha
})

})

.then(r=>r.json())

.then(d=>{

if(d.ok){

TOKEN = d.token;

USER = {
nome:d.nome,
email:d.email
};

localStorage.setItem('bms_token', TOKEN);

localStorage.setItem('bms_user', JSON.stringify(USER));

mostrarLista();

}else{

var e = document.getElementById('erro');

e.textContent = d.error || 'Erro no login';

e.classList.remove('hidden');

}

});

}

function cadastrar(){

var nome = document.getElementById('cad-nome').value.trim();

var email = document.getElementById('cad-email').value.trim();

var senha = document.getElementById('cad-senha').value;

fetch(API + '?action=register',{

method:'POST',

headers:{
'Content-Type':'application/json'
},

body:JSON.stringify({
nome:nome,
email:email,
senha:senha
})

})

.then(r=>r.json())

.then(d=>{

if(d.ok){

alert('Conta criada!');

mostrarLogin();

}else{

var e = document.getElementById('erro-cad');

e.textContent = d.error;

e.classList.remove('hidden');

}

});

}

function mostrarLista(){

esconderTudo();

document.getElementById('lista').classList.remove('hidden');

document.getElementById('user-nome').textContent =
USER ? USER.nome : 'Usuário';

carregarLista();

}

function carregarLista(){

fetch(API + '?action=user_bms',{

headers:{
'Authorization':'Bearer '+TOKEN
}

})

.then(r=>r.json())

.then(lista=>{

var el = document.getElementById('bms-list');

if(!lista || !lista.length){

el.innerHTML =
'<p style="grid-column:1/-1;text-align:center;color:#888;padding:30px">Nenhuma BMS cadastrada</p>';

return;

}

var html = '';

lista.forEach(b=>{

html += `
<div class="bms-item">

<h3>${b.nome}</h3>

<p>${b.code}</p>

<span class="status ${b.online ? 'on':'off'}">
${b.online ? 'ONLINE':'OFFLINE'}
</span>

<p style="font-size:28px;color:#00ffff;font-weight:800">
${b.voltage ? b.voltage.toFixed(2) : '0.00'}V
</p>

<button onclick="abrirDash('${b.code}')">
ABRIR DASHBOARD
</button>

<button class="del"
onclick="removerBms('${b.code}','${b.nome}')">
REMOVER
</button>

</div>
`;

});

el.innerHTML = html;

});

}

function removerBms(code,nome){

const confirmar = confirm(

`Remover ${nome || code} ?

A BMS será desvinculada da sua conta e ficará disponível novamente.

Deseja continuar?`

);

if(!confirmar) return;

fetch(API+`?action=remove_bms&code=${code}`,{

method:'DELETE',

headers:{
'Authorization':'Bearer '+TOKEN
}

})

.then(r=>r.json())

.then(d=>{

if(d.ok){

alert('BMS removida com sucesso!');

carregarLista();

}else{

alert('Erro: '+d.error);

}

})

.catch(()=>{

alert('Erro de conexão');

});

}

function addBms(){

var code = document.getElementById('bms-code').value.trim();

var nome = document.getElementById('bms-nome').value.trim();

if(!code || code.length !== 14){

alert('Código inválido');

return;

}

fetch(API + '?action=add_bms',{

method:'POST',

headers:{
'Content-Type':'application/json',
'Authorization':'Bearer '+TOKEN
},

body:JSON.stringify({
code:code,
nome:nome || code
})

})

.then(r=>r.json())

.then(d=>{

if(d.ok){

alert('BMS adicionada!');

document.getElementById('bms-code').value = '';

document.getElementById('bms-nome').value = '';

carregarLista();

}else{

alert(d.error);

}

});

}

function abrirDash(code){

localStorage.setItem('bms_codigo_ativo', code);

location.href = 'dashboard.html';

}

function sair(){

localStorage.removeItem('bms_token');

localStorage.removeItem('bms_user');

localStorage.removeItem('bms_codigo_ativo');

location.reload();

}

</script>

</body>
</html>
