<!-- BLOCO PARA ADICIONAR NO CARD DO DISPOSITIVO -->
<div id="lastOnline" class="last-online" style="display:none"></div>

<style>
.last-online{
  margin-top:6px;
  text-align:center;
  font-size:13px;
  color:#7A869A;
  font-weight:500;
}
</style>

<script>
function atualizarUltimoOnline(dispositivo){
  const el = document.getElementById('lastOnline');

  if(dispositivo.online){
    el.style.display = 'none';
    return;
  }

  el.style.display = 'block';
  el.innerHTML =
    `Último online: ${dispositivo.tempo_relativo} (${dispositivo.data_formatada})`;
}
</script>
