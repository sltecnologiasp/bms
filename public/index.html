<script>
var API = '/api/bms';
var TOKEN = localStorage.getItem('bms_token');
var USER = null;
var IS_ADMIN = false;
var CODIGO = localStorage.getItem('bms_codigo_ativo');
var INT = null;

try{USER = JSON.parse(localStorage.getItem('bms_user')||'null');}catch(e){}

function esconderTudo(){
  document.getElementById('login').classList.add('hidden');
  document.getElementById('cadastro').classList.add('hidden');
  document.getElementById('lista').classList.add('hidden');
  document.getElementById('dash').classList.add('hidden');
  document.getElementById('admin').classList.add('hidden');
}

window.onload = function(){
  // TRAVA DE SEGURANÇA PRA /admin
  if(window.location.pathname === '/admin'){
    if(!TOKEN ||!USER){
      location.href = '/';
      return;
    }
    IS_ADMIN = USER.is_admin || false;
    if(!IS_ADMIN){
      alert('Acesso negado');
      location.href = '/';
      return;
    }
    esconderTudo();
    document.getElementById('admin').classList.remove('hidden');
    carregarAdminLista();
    return;
  }

  // FLUXO NORMAL
  if(TOKEN && USER){
    IS_ADMIN = USER.is_admin || false;
    if(CODIGO){
      abrirDash(CODIGO);
    }else{
      mostrarLista();
    }
  }else{
    esconderTudo();
    document.getElementById('login').classList.remove('hidden');
  }

  var bmsInput = document.getElementById('bms-code');
  if(bmsInput){
    bmsInput.oninput = function(e){
      if(!e.target.value.startsWith('SL')) e.target.value = 'SL';
      e.target.value = 'SL' + e.target.value.slice(2).replace(/[^0-9]/g,'').slice(0,8);
    };
  }

  var admInput = document.getElementById('adm-code');
  if(admInput){
    admInput.oninput = function(e){
      if(!e.target.value.startsWith('SL')) e.target.value = 'SL';
      e.target.value = 'SL' + e.target.value.slice(2).replace(/[^0-9]/g,'').slice(0,8);
    };
  }
};

function mostrarLogin(){
  localStorage.removeItem('bms_codigo_ativo');
  esconderTudo();
  document.getElementById('login').classList.remove('hidden');
}

function mostrarCadastro(){
  esconderTudo();
  document.getElementById('cadastro').classList.remove('hidden');
}

function login(){
  document.getElementById('erro').classList.add('hidden');
  var email = document.getElementById('email').value.trim();
  var senha = document.getElementById('senha').value;
  if(!email ||!senha){
    var e = document.getElementById('erro');
    e.textContent = 'Preenche e-mail e senha';
    e.classList.remove('hidden');
    return;
  }
  fetch(API + '?action=login_user', {
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({email:email,senha:senha})
  })
.then(function(r){return r.json();})
.then(function(d){
    if(d.ok && d.token){
      TOKEN = d.token;
      USER = {nome:d.nome,email:d.email,is_admin:d.is_admin};
      IS_ADMIN = d.is_admin || false;
      localStorage.setItem('bms_token', TOKEN);
      localStorage.setItem('bms_user', JSON.stringify(USER));
      mostrarLista();
    }else{
      var e = document.getElementById('erro');
      e.textContent = d.error || 'Erro ao fazer login';
      e.classList.remove('hidden');
    }
  })
.catch(function(e){
    var er = document.getElementById('erro');
    er.textContent = 'Erro: ' + e.message;
    er.classList.remove('hidden');
  });
}

function cadastrar(){
  var nome = document.getElementById('cad-nome').value.trim();
  var email = document.getElementById('cad-email').value.trim();
  var senha = document.getElementById('cad-senha').value;
  var e = document.getElementById('erro-cad');
  e.classList.add('hidden');
  if(!nome ||!email ||!senha){
    e.textContent = 'Preenche todos os campos';
    e.classList.remove('hidden');
    return;
  }
  fetch(API + '?action=register', {
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({nome:nome,email:email,senha:senha})
  })
.then(function(r){return r.json();})
.then(function(d){
    if(d.ok){
      alert('Conta criada! Faz login');
      mostrarLogin();
      document.getElementById('email').value = email;
      document.getElementById('senha').value = senha;
    }else{
      e.textContent = 'Erro: ' + d.error;
      e.classList.remove('hidden');
    }
  })
.catch(function(e2){
    e.textContent = 'Erro: ' + e2.message;
    e.classList.remove('hidden');
  });
}

function mostrarLista(){
  localStorage.removeItem('bms_codigo_ativo');
  esconderTudo();
  document.getElementById('lista').classList.remove('hidden');
  document.getElementById('user-nome').textContent = USER? USER.nome : 'Usuário';
  carregarLista();

  // Botão admin
  if(IS_ADMIN &&!document.getElementById('btn-admin')){
    var wrap = document.getElementById('admin-btn-wrap');
    var btn = document.createElement('button');
    btn.id = 'btn-admin';
    btn.className = 'btn-sec';
    btn.textContent = '⚙ PAINEL ADMIN';
    btn.onclick = mostrarAdmin;
    btn.style.marginTop = '12px';
    wrap.appendChild(btn);
  }
}

function carregarLista(){
  fetch(API + '?action=user_bms', {
    headers:{'Authorization':'Bearer '+TOKEN}
  })
.then(function(r){
    if(r.status === 401){sair();return;}
    return r.json();
  })
.then(function(lista){
    var el = document.getElementById('bms-list');
    if(!lista ||!lista.length){
      el.innerHTML = '<p style="grid-column:1/-1;text-align:center;color:#666;padding:40px">Nenhuma BMS adicionada ainda</p>';
      return;
    }
    var html = '';
    for(var i=0;i<lista.length;i++){
      var b = lista[i];
      html += '<div class="bms-item" onclick="abrirDash(\''+b.code+'\')">';
      html += '<h3>'+b.nome+'</h3>';
      html += '<p>Código: '+b.code+'</p>';
      html += '<p style="margin-top:0"><span class="status '+(b.online?'on':'off')+'" style="padding:6px 12px;font-size:12px">'+(b.online?'Online':'Offline')+'</span></p>';
      if(b.voltage) html += '<p style="margin-top:0;color:#00ffff">'+b.voltage.toFixed(1)+'V</p>';
      html += '</div>';
    }
    el.innerHTML = html;
  });
}

function addBms(){
  var code = document.getElementById('bms-code').value.trim();
  var nome = document.getElementById('bms-nome').value.trim();

  if(!code || code.length!== 10){
    alert('Código inválido. Use SL + 8 números');
    return;
  }

  fetch(API + '?action=user_bms', {
    headers:{'Authorization':'Bearer '+TOKEN}
  })
.then(function(r){return r.json();})
.then(function(lista){
    var jaExiste = lista && lista.some(function(b){return b.code === code});
    if(jaExiste){
      alert('Essa BMS já está adicionada na sua conta!');
      document.getElementById('bms-code').value = '';
      document.getElementById('bms-nome').value = '';
      return;
    }

    fetch(API + '?action=add_bms', {
      method:'POST',
      headers:{'Content-Type':'application/json','Authorization':'Bearer '+TOKEN},
      body:JSON.stringify({code:code,nome:nome || code})
    })
.then(function(r){return r.json();})
.then(function(d){
      if(d.ok){
        alert('BMS adicionada!');
        document.getElementById('bms-code').value = '';
        document.getElementById('bms-nome').value = '';
        carregarLista();
      }else{
        if(d.error === 'not_found'){
          alert('BMS não encontrada no sistema. Verifique o código ou fale com o suporte.');
        }else if(d.error === 'already_claimed'){
          alert('Essa BMS já está vinculada a outra conta.');
        }else{
          alert('Erro: ' + d.error);
        }
        document.getElementById('bms-code').value = '';
        document.getElementById('bms-nome').value = '';
      }
    });
  });
}

function abrirDash(code){
  CODIGO = code;
  localStorage.setItem('bms_codigo_ativo', code);
  esconderTudo();
  document.getElementById('dash').classList.remove('hidden');
  document.getElementById('bms-titulo').textContent = code;
  atualizar();
  INT = setInterval(atualizar, 3000);
}

function voltar(){
  clearInterval(INT);
  localStorage.removeItem('bms_codigo_ativo');
  mostrarLista();
}

// === PAINEL ADMIN ===

function mostrarAdmin(){
  esconderTudo();
  document.getElementById('admin').classList.remove('hidden');
  carregarAdminLista();
}

function carregarAdminLista(){
  fetch(API + '?action=admin_list_master', {
    headers:{'Authorization':'Bearer '+TOKEN}
  })
.then(r=>r.json())
.then(lista=>{
    var el = document.getElementById('admin-list');
    if(!lista ||!lista.length){
      el.innerHTML = '<p style="text-align:center;color:#666;padding:20px">Nenhuma BMS cadastrada</p>';
      return;
    }
    var html = '';
    for(var i=0;i<lista.length;i++){
      var b = lista[i];
      var status = b.user_id?
        `<span class="badge badge-orange">Vinculada: ${b.dono_nome || b.dono_email}</span>` :
        `<span class="badge badge-green">Disponível</span>`;

      html += `<div class="bms-item" style="cursor:default">
        <h3>${b.code}</h3>
        <p>Modelo: ${b.modelo || '--'}</p>
        <p>Serial: ${b.serial || '--'}</p>
        <p>${status}</p>
        <div style="display:flex;gap:8px;margin-top:12px;width:100%">
          ${b.user_id? `<button style="padding:10px;font-size:14px;flex:1" onclick="adminUnlink('${b.code}')">Desvincular</button>` : ''}
          <button class="btn-danger" style="padding:10px;font-size:14px;flex:1" onclick="adminDelete('${b.code}')">Excluir</button>
        </div>
      </div>`;
    }
    el.innerHTML = html;
  });
}

function adminAddBms(){
  var code = document.getElementById('adm-code').value.trim();
  var serial = document.getElementById('adm-serial').value.trim();
  var modelo = document.getElementById('adm-modelo').value.trim();
  var e = document.getElementById('erro-adm');
  e.classList.add('hidden');

  if(!code || code.length!== 10){
    e.textContent = 'Código inválido. Use SL + 8 números';
    e.classList.remove('hidden');
    return;
  }

  fetch(API + '?action=admin_add_master', {
    method:'POST',
    headers:{'Content-Type':'application/json','Authorization':'Bearer '+TOKEN},
    body:JSON.stringify({code:code,serial:serial,modelo:modelo})
  })
.then(r=>r.json())
.then(d=>{
    if(d.ok){
      alert('BMS cadastrada no sistema!');
      document.getElementById('adm-code').value = '';
      document.getElementById('adm-serial').value = '';
      document.getElementById('adm-modelo').value = '';
      carregarAdminLista();
    }else{
      e.textContent = d.error === 'duplicate'? 'Essa BMS já existe' : 'Erro: ' + d.error;
      e.classList.remove('hidden');
    }
  });
}

function adminUnlink(code){
  if(!confirm('Desvincular '+code+' do usuário?')) return;
  fetch(API + '?action=admin_unlink_bms', {
    method:'POST',
    headers:{'Content-Type':'application/json','Authorization':'Bearer '+TOKEN},
    body:JSON.stringify({code:code})
  })
.then(r=>r.json())
.then(d=>{
    if(d.ok) carregarAdminLista();
  });
}

function adminDelete(code){
  if(!confirm('EXCLUIR '+code+' do sistema? Isso é irreversível!')) return;
  fetch(API + '?action=admin_delete_master', {
    method:'POST',
    headers:{'Content-Type':'application/json','Authorization':'Bearer '+TOKEN},
    body:JSON.stringify({code:code})
  })
.then(r=>r.json())
.then(d=>{
    if(d.ok) carregarAdminLista();
  });
}

// === DASHBOARD ===

function renderCelulas(cels){
  if(!cels || cels.length === 0){
    document.getElementById('celulas').innerHTML = '<div style="grid-column:1/-1;opacity:.4;padding:20px">Sem dados das células</div>';
    return;
  }
  var vals = [];
  for(var i=0;i<cels.length;i++){
    var v = parseFloat(cels[i]);
    if(v > 0) vals.push(v);
  }
  if(vals.length === 0) return;
  var min = Math.min.apply(null, vals);
  var max = Math.max.apply(null, vals);
  var dif = max - min;
  document.getElementById('celMin').textContent = min.toFixed(3)+'V';
  document.getElementById('celMax').textContent = max.toFixed(3)+'V';
  document.getElementById('celDif').textContent = dif.toFixed(3)+'V';
  document.getElementById('celTot').textContent = cels.length;
  var html = '';
  for(var i=0;i<cels.length;i++){
    var val = parseFloat(cels[i]);
    var cls = 'ok';
    if(val < 3.2 || val > 4.2) cls = 'crit';
    else if(val < 3.4 || val > 4.15) cls = 'warn';
    html += '<div class="cell '+cls+'"><div class="cell-num">C'+(i+1)+'</div><div class="cell-val">'+val.toFixed(3)+'</div></div>';
  }
  document.getElementById('celulas').innerHTML = html;
}

function atualizarGauge(soc){
  var gauge = document.getElementById('socGauge');
  var valor = document.getElementById('socValor');
  var bar = document.getElementById('socBar');
  var txt = document.getElementById('socBarTxt');
  var deg = soc * 3.6;
  valor.textContent = soc + '%';
  txt.textContent = soc + '%';
  bar.style.width = soc + '%';
  gauge.style.background = 'conic-gradient(#00ff88 0deg,#00ffff '+deg+'deg,rgba(255,255,255,.08) '+deg+'deg)';
}

function atualizar(){
  if(!CODIGO) return;
  fetch(API+'?action=data&code='+CODIGO, {
    headers:{'Authorization':'Bearer '+TOKEN}
  })
.then(function(r){
    if(r.status === 401){sair();return;}
    if(!r.ok) return;
    return r.json();
  })
.then(function(d){
    if(!d) return;
    document.getElementById('soc').textContent = (d.soc?d.soc.toFixed(0):0)+'%';
    document.getElementById('volt').textContent = (d.voltage?d.voltage.toFixed(2):0)+'V';
    document.getElementById('corr').textContent = (d.current?d.current.toFixed(1):0)+'A';
    document.getElementById('temp').textContent = (d.temp?d.temp.toFixed(1):0)+'°C';
    var st = document.getElementById('status');
    st.textContent = d.online?'Online':'Offline';
    st.className = 'status ' + (d.online?'on':'off');
    renderCelulas(d.cells);
    atualizarGauge(parseInt(d.soc || 0));
  });
}

function sair(){
  clearInterval(INT);
  localStorage.removeItem('bms_token');
  localStorage.removeItem('bms_user');
  localStorage.removeItem('bms_codigo_ativo');
  location.href = '/';
}
</script>
