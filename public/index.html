<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>TESTE BMS</title>
</head>
<body style="background:#000;color:#0f0;font-family:monospace;padding:20px">

<h1>SMART BMS - TESTE</h1>

<input id="email" type="email" placeholder="email" style="width:100%;padding:15px;margin:10px 0;background:#111;color:#0f0;border:1px solid #0f0">
<input id="senha" type="password" placeholder="senha" style="width:100%;padding:15px;margin:10px 0;background:#111;color:#0f0;border:1px solid #0f0">

<button onclick="testarLogin()" style="width:100%;padding:20px;background:#0f0;color:#000;border:none;font-size:18px;font-weight:bold">ENTRAR</button>

<button onclick="testarCadastro()" style="width:100%;padding:20px;background:#00f;color:#fff;border:none;font-size:18px;font-weight:bold;margin-top:10px">CADASTRAR</button>

<div id="saida" style="margin-top:20px;padding:15px;background:#111;border:1px solid #0f0;min-height:200px;white-space:pre-wrap"></div>

<script>
function log(t){
  document.getElementById('saida').innerHTML += t + '\n';
}

log('PAGINA CARREGOU');

function testarLogin(){
  log('BOTAO ENTRAR CLICADO');
  var e = document.getElementById('email').value;
  var s = document.getElementById('senha').value;
  log('Email: ' + e);
  log('Senha: ' + s);
  
  fetch('/api/bms?action=login_user', {
    method: 'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({email:e,senha:s})
  })
  .then(function(r){
    log('Status: ' + r.status);
    return r.text();
  })
  .then(function(t){
    log('Resposta: ' + t);
  })
  .catch(function(err){
    log('ERRO: ' + err.message);
  });
}

function testarCadastro(){
  log('BOTAO CADASTRAR CLICADO');
  var e = document.getElementById('email').value;
  var s = document.getElementById('senha').value;
  
  fetch('/api/bms?action=register', {
    method: 'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({nome:'Teste',email:e,senha:s})
  })
  .then(function(r){
    log('Status Cadastro: ' + r.status);
    return r.text();
  })
  .then(function(t){
    log('Resposta Cadastro: ' + t);
  })
  .catch(function(err){
    log('ERRO CADASTRO: ' + err.message);
  });
}
</script>

</body>
</html>
