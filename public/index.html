<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SMART BMS - Monitoramento</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: sans-serif; }
    body { background: #05070d; color: #fff; min-height: 100vh; display: flex; flex-direction: column; }
    .container { width: 100%; max-width: 480px; margin: auto; padding: 20px; }
    .card { background: #0b0f19; border: 1px solid rgba(0,255,255,0.05); border-radius: 16px; padding: 24px; margin-bottom: 16px; box-shadow: 0 8px 32px rgba(0,0,0,0.4); }
    h1 { color: #00ffff; text-align: center; font-size: 28px; font-weight: 800; letter-spacing: 1px; margin-bottom: 6px; text-transform: uppercase; }
    .subtitle { text-align: center; color: #4a5568; font-size: 13px; margin-bottom: 24px; }
    label { display: block; color: #4a5568; font-size: 11px; font-weight: 700; margin-bottom: 6px; letter-spacing: 0.5px; }
    input { width: 100%; background: rgba(0,0,0,0.2); border: 1px solid rgba(255,255,255,0.05); padding: 14px; border-radius: 12px; color: #fff; font-size: 14px; margin-bottom: 16px; outline: none; transition: all 0.2s; }
    input:focus { border-color: #00ffff; box-shadow: 0 0 10px rgba(0,255,255,0.1); }
    
    /* Container para alinhar o olho da senha perfeitamente */
    .password-container { position: relative; width: 100%; }
    .password-container input { width: 100%; padding-right: 45px; }
    .toggle-password { position: absolute; right: 14px; top: 14px; cursor: pointer; opacity: 0.5; font-size: 16px; user-select: none; transition: opacity 0.2s; }
    .toggle-password:hover { opacity: 1; }

    button { width: 100%; background: linear-gradient(90deg, #0080ff, #00ffff); color: #fff; border: none; padding: 14px; border-radius: 12px; font-size: 14px; font-weight: 700; cursor: pointer; margin-top: 8px; transition: all 0.2s; box-shadow: 0 4px 15px rgba(0,255,255,0.2); }
    
    /* Estilo dos botões secundários original restaurado */
    button.sec { background: transparent !important; border: 1px solid rgba(0,255,255,0.15) !important; color: #00ffff !important; box-shadow: none !important; margin-top: 12px; }
    button.sec:hover { background: rgba(0,255,255,0.03) !important; border-color: #00ffff !important; }
    
    button.del { background: rgba(255,68,68,0.1); color: #ff4444; border: 1px solid rgba(255,68,68,0.2); padding: 6px 12px; font-size: 11px; border-radius: 8px; width: auto; margin: 0; box-shadow: none; }
    .msg { color: #ff4444; background: rgba(255,68,68,0.1); border: 1px solid rgba(255,68,68,0.2); padding: 12px; border-radius: 10px; font-size: 13px; text-align: center; margin-bottom: 16px; }
    .hidden { display: none !important; }
    
    .bms-item { display: flex; align-items: center; justify-content: space-between; background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.05); padding: 16px; border-radius: 12px; margin-bottom: 12px; cursor: pointer; transition: all 0.2s; }
    .bms-item:hover { border-color: rgba(0,255,255,0.2); background: rgba(0,255,255,0.01); }
    .bms-item h3 { font-size: 14px; font-weight: 600; color: #fff; margin-bottom: 2px; }
    .bms-item p { font-size: 12px; color: #4a5568; font-family: monospace; }
    
    .status-dot { font-size: 11px; font-weight: 600; padding: 4px 8px; border-radius: 6px; }
    .status-dot.on { background: rgba(0,255,136,0.1); color: #00ff88; }
    .status-dot.off { background: rgba(74,85,104,0.1); color: #4a5568; }
    
    .status-badge { display: inline-block; padding: 4px 10px; border-radius: 6px; font-size: 11px; font-weight: 700; text-transform: uppercase; }
    .status-badge.on { background: #00ff88; color: #05070d; }
    .status-badge.off { background: #4a5568; color: #fff; }
    
    .grid-dados { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 20px; }
    .dado-box { background: rgba(0,0,0,0.2); border: 1px solid rgba(255,255,255,0.03); padding: 14px; border-radius: 12px; text-align: center; }
    .dado-box div { font-size: 11px; color: #4a5568; font-weight: 600; text-transform: uppercase; margin-bottom: 4px; }
    .dado-box span { font-size: 20px; font-weight: 800; color: #fff; font-family: monospace; }
    
    .gauge-wrapper { display: flex; justify-content: center; margin: 20px 0; }
    .gauge { width: 140px; height: 140px; border-radius: 50%; display: flex; align-items: center; justify-content: center; position: relative; padding: 8px; }
    .gauge-internal { width: 100%; height: 100%; background: #0b0f19; border-radius: 50%; display: flex; flex-direction: column; align-items: center; justify-content: center; }
    .gauge-internal span { font-size: 26px; font-weight: 800; color: #00ffff; font-family: monospace; }
    .gauge-internal div { font-size: 9px; color: #4a5568; font-weight: 600; margin-top: 2px; }
    
    .bar-container { background: rgba(0,0,0,0.3); border-radius: 8px; height: 16px; width: 100%; position: relative; overflow: hidden; border: 1px solid rgba(255,255,255,0.03); margin-bottom: 20px; }
    .bar-fill { height: 100%; background: linear-gradient(90deg, #0080ff, #00ffff); width: 0%; transition: width 0.5s; }
    .bar-text { position: absolute; width: 100%; text-align: center; font-size: 10px; font-weight: 700; color: #fff; line-height: 14px; font-family: monospace; }
    
    .cells-header { display: flex; justify-content: space-between; align-items: center; padding-bottom: 8px; border-bottom: 1px solid rgba(255,255,255,0.05); margin-bottom: 12px; font-size: 12px; color: #4a5568; }
    .cells-header span { color: #fff; font-weight: 600; }
    .grid-cells { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; }
    .cell { background: rgba(0,0,0,0.2); border: 1px solid rgba(255,255,255,0.03); border-radius: 8px; padding: 6px 4px; text-align: center; }
    .cell-num { font-size: 9px; color: #4a5568; font-weight: 600; margin-bottom: 2px; }
    .cell-val { font-size: 11px; font-family: monospace; font-weight: 700; color: #fff; }
    .cell.warn { border-color: rgba(255,170,0,0.3); background: rgba(255,170,0,0.02); }
    .cell.warn .cell-val { color: #ffaa00; }
    .cell.crit { border-color: rgba(255,68,68,0.3); background: rgba(255,68,68,0.02); }
    .cell.crit .cell-val { color: #ff4444; }
    .cell.ok { border-color: rgba(0,255,136,0.15); }
    .cell.ok .cell-val { color: #00ff88; }
  </style>
</head>
<body>
  <div class="container">

    <div id="login" class="card">
      <h1>Smart BMS</h1>
      <div class="subtitle">Monitoramento de Baterias</div>
      <div id="erro" class="msg hidden"></div>
      
      <label>E-MAIL</label>
      <input type="text" id="email" placeholder="seu@email.com">
      
      <label>SENHA</label>
      <input type="password" id="senha" placeholder="********">
      
      <button onclick="realizarLogin()">ENTRAR</button>
      <button class="sec" onclick="mostrarCadastro()">CRIAR CONTA DE CLIENTE</button>
    </div>

    <div id="cadastro" class="card hidden">
      <h1>Smart BMS</h1>
      <div class="subtitle">Crie sua Conta de Monitoramento</div>
      <div id="erro-cad" class="msg hidden"></div>
      
      <label>NOME</label>
      <input type="text" id="cad-nome" placeholder="Seu nome">
      
      <label>E-MAIL</label>
      <input type="text" id="cad-email" placeholder="seu@email.com">
      
      <label>SENHA</label>
      <div class="password-container">
        <input type="password" id="cad-senha" placeholder="********">
        <span class="toggle-password" onclick="togglePasswordVisibility('cad-senha', this)">👁️‍🗨️</span>
      </div>
      
      <label>CONFIRMAR SENHA</label>
      <div class="password-container">
        <input type="password" id="cad-confirmar-senha" placeholder="********">
        <span class="toggle-password" onclick="togglePasswordVisibility('cad-confirmar-senha', this)">👁️‍🗨️</span>
      </div>
      
      <button id="btn-cadastrar" onclick="cadastrar()">CADASTRAR</button>
      <button class="sec" onclick="mostrarLogin()">VOLTAR</button>
    </div>

    <div id="lista" class="card hidden">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px">
        <div>
          <div style="font-size:12px;color:#4a5568;font-weight:600">Olá,</div>
          <h2 id="user-nome" style="color:#fff;font-size:18px;font-weight:700">Usuário</h2>
        </div>
        <button class="del" onclick="sair()">Sair 🚪</button>
      </div>
      <hr style="border:0;border-top:1px solid rgba(255,255,255,0.05);margin-bottom:20px">
      
      <label>ADICIONAR NOVO MÓDULO</label>
      <input type="text" id="bms-code" placeholder="Código SL (Ex: SL012345678901)" maxlength="14">
      <input type="text" id="bms-nome" placeholder="Nome personalizado (Ex: Bateria Nobreak)">
      <button onclick="addBms()">VINCULAR HARDWARE</button>
      
      <label style="margin-top:24px;margin-bottom:12px">MEUS DISPOSITIVOS</label>
      <div id="bms-list" style="max-height:300px;overflow-y:auto"></div>
    </div>

    <div id="dash" class="card hidden">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
        <button class="del" onclick="voltar()" style="background:rgba(255,255,255,0.05);color:#fff;border-color:rgba(255,255,255,0.1)">← Voltar</button>
        <span id="status" class="status-badge off">Offline</span>
      </div>
      <h2 id="bms-titulo" style="text-align:center;font-family:monospace;color:#00ffff;font-size:22px;margin-bottom:12px">SL000000000000</h2>
      
      <div class="gauge-wrapper">
        <div id="socGauge" class="gauge">
          <div class="gauge-internal">
            <span id="socValor">0%</span>
            <div>BATERIA</div>
          </div>
        </div>
      </div>
      
      <div class="bar-container">
        <div id="socBar" class="bar-fill"></div>
        <div id="socBarTxt" class="bar-text">0%</div>
      </div>
      
      <div class="grid-dados">
        <div class="dado-box"><div>Tensão</div><span id="volt">0.00V</span></div>
        <div class="dado-box"><div>Corrente</div><span id="corr">0.0A</span></div>
        <div class="dado-box"><div>SOC</div><span id="soc">0%</span></div>
        <div class="dado-box"><div>Temperatura</div><span id="temp">0.0°C</span></div>
      </div>
      
      <div class="cells-header">
        <div>Mín: <span id="celMin">0.000V</span> | Máx: <span id="celMax">0.000V</span></div>
        <div>Dif: <span id="celDif">0.000V</span> | Células: <span id="celTot">0</span></div>
      </div>
      <div id="celulas" class="grid-cells"></div>
    </div>

  </div>
    <script>
    var API = '/api/bms'; 
    var TOKEN = localStorage.getItem('bms_token') || '';
    var USER = JSON.parse(localStorage.getItem('bms_user') || 'null');
    var CODIGO = localStorage.getItem('bms_codigo_ativo') || '';
    var INT = null;

    // Inicialização automática do sistema
    if (TOKEN) {
      if (CODIGO) { abrirDash(CODIGO); } else { mostrarLista(); }
    }

    function esconderTudo() {
      document.getElementById('login').classList.add('hidden');
      document.getElementById('cadastro').classList.add('hidden');
      document.getElementById('lista').classList.add('hidden');
      document.getElementById('dash').classList.add('hidden');
    }

    function mostrarLogin() { esconderTudo(); document.getElementById('login').classList.remove('hidden'); }
    function mostrarCadastro() { esconderTudo(); document.getElementById('cadastro').classList.remove('hidden'); }

    // CORREÇÃO DEFINITIVA DA FUNÇÃO DE LOGIN
    function realizarLogin() {
      var email = document.getElementById('email').value.trim();
      var senha = document.getElementById('senha').value;
      var e = document.getElementById('erro');
      if (e) e.classList.add('hidden');
      
      if (!email || !senha) { 
        if (e) { e.textContent = 'Preencha todos os campos'; e.classList.remove('hidden'); } 
        return; 
      }
      
      fetch(API + '?action=login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email: email, senha: senha })
      })
      .then(function(r) { return r.json(); })
      .then(function(d) {
        if (d && d.ok) {
          TOKEN = d.token; 
          USER = d.user;
          localStorage.setItem('bms_token', d.token);
          localStorage.setItem('bms_user', JSON.stringify(d.user));
          mostrarLista();
        } else { 
          if (e) { 
            e.textContent = (d && d.error) ? d.error : 'Não autorizado'; 
            e.classList.remove('hidden'); 
          } else {
            alert(d.error || 'Não autorizado');
          }
        }
      })
      .catch(function(err) { 
        if (e) { 
          e.textContent = 'Erro de rede: ' + err.message; 
          e.classList.remove('hidden'); 
        } 
      });
    }

    // FUNÇÃO AUXILIAR: Alterna a visibilidade do olho de forma independente
    function togglePasswordVisibility(inputId, iconEl) {
      var input = document.getElementById(inputId);
      if (!input) return;
      if (input.type === "password") {
        input.type = "text";
        iconEl.textContent = "👁️"; 
        iconEl.style.opacity = "1";
      } else {
        input.type = "password";
        iconEl.textContent = "👁️‍🗨️"; 
        iconEl.style.opacity = "0.5";
      }
    }

    function cadastrar() {
      var btn = document.getElementById('btn-cadastrar');
      if (btn && btn.disabled) return; 

      var nome = document.getElementById('cad-nome').value.trim();
      var email = document.getElementById('cad-email').value.trim();
      var senha = document.getElementById('cad-senha').value;
      var confirmarSenha = document.getElementById('cad-confirmar-senha').value;
      var e = document.getElementById('erro-cad');
      
      if (e) e.classList.add('hidden');
      
      if (!nome || !email || !senha || !confirmarSenha) {
        if (e) { e.textContent = 'Preencha todos os campos'; e.classList.remove('hidden'); } else { alert('Preencha todos os campos'); }
        return;
      }
      
      if (senha !== confirmarSenha) {
        if (e) { e.textContent = 'As senhas não coincidem!'; e.classList.remove('hidden'); } else { alert('As senhas não coincidem!'); }
        return;
      }

      if (btn) {
        btn.disabled = true;
        btn.style.opacity = '0.5';
        btn.style.cursor = 'not-allowed';
        var tempoRestante = 60;
        btn.textContent = 'AGUARDE ' + tempoRestante + 's';
        
        window.cadTimer = setInterval(function() {
          tempoRestante--;
          btn.textContent = 'AGUARDE ' + tempoRestante + 's';
          
          if (tempoRestante <= 0) {
            clearInterval(window.cadTimer);
            btn.disabled = false;
            btn.textContent = 'CADASTRAR';
            btn.style.opacity = '1';
            btn.style.cursor = 'pointer';
          }
        }, 1000);
      }

      function liberarBotao() {
        if (window.cadTimer) clearInterval(window.cadTimer);
        if (btn) {
          btn.disabled = false;
          btn.textContent = 'CADASTRAR';
          btn.style.opacity = '1';
          btn.style.cursor = 'pointer';
        }
      }

      fetch(API + '?action=register', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ nome: nome, email: email, senha: senha })
      })
      .then(function(r) { return r.json(); })
      .then(function(d) {
        if (d.ok) {
          alert('Conta criada! Verifique seu e-mail para ativar.');
          mostrarLogin();
          if (document.getElementById('email')) document.getElementById('email').value = email;
          if (document.getElementById('senha')) document.getElementById('senha').value = senha;
        } else {
          liberarBotao();
          if (e) { e.textContent = 'Erro: ' + d.error; e.classList.remove('hidden'); } else { alert('Erro: ' + d.error); }
        }
      })
      .catch(function(e2) {
        liberarBotao();
        if (e) { e.textContent = 'Erro: ' + e2.message; e.classList.remove('hidden'); } else { alert('Erro: ' + e2.message); }
      });
    }  

    function mostrarLista() {
      clearInterval(INT);
      localStorage.removeItem('bms_codigo_ativo');
      esconderTudo();
      var listaEl = document.getElementById('lista');
      if (listaEl) listaEl.classList.remove('hidden');
      
      var nomeEl = document.getElementById('user-nome');
      if (nomeEl) nomeEl.textContent = USER ? USER.nome : 'Usuário';
      
      carregarLista();
      INT = setInterval(carregarLista, 3000);
    }

    function carregarLista() {
      fetch(API + '?action=user_bms', { headers: { 'Authorization': 'Bearer ' + TOKEN } })
      .then(function(r) {
        if (r && r.status === 401) { sair(); return; }
        return r ? r.json() : [];
      })
      .then(function(lista) {
        var el = document.getElementById('bms-list');
        if (!el) return;
        if (!lista || !lista.length) {
          el.innerHTML = '<p style="grid-column:1/-1;text-align:center;color:#4a5568;padding:30px;font-size:14px">Nenhuma BMS monitorada</p>';
          return;
        }
        var html = '';
        for (var i = 0; i < lista.length; i++) {
          var b = lista[i];
          html += '<div class="bms-item" onclick="abrirDash(\'' + b.code + '\')">';
          html += '<div><h3>' + b.nome + '</h3><p>' + b.code + '</p></div>';
          html += '<span class="status-dot ' + (b.online ? 'on' : 'off') + '">' + (b.online ? 'Online' : 'Offline') + '</span>';
          html += '<button class="del" onclick="event.stopPropagation();removerBms(\'' + b.code + '\',\'' + b.nome + '\')">🗑️</button>';
          html += '</div>';
        }
        el.innerHTML = html;
      }).catch(function(err) { console.error(err); });
    }

    function removerBms(code, nome) {
      if (!confirm(`Remover ${nome || code} da sua conta?\n\nA BMS ficará disponível para outros usuários.`)) return;
      fetch(API + `?action=remove_bms&code=${code}`, {
        method: 'DELETE',
        headers: { 'Authorization': 'Bearer ' + TOKEN }
      })
      .then(function(r) { return r.json(); })
      .then(function(d) { if (d.ok) { carregarLista(); } else { alert('Erro: ' + d.error); } });
    }

    function addBms() {
      var code = document.getElementById('bms-code').value.trim();
      var nome = document.getElementById('bms-nome').value.trim();
      if (!code || code.length !== 14) { alert('Código inválido. Use SL + 12 números'); return; }

      fetch(API + '?action=add_bms', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + TOKEN },
        body: JSON.stringify({ code: code, nome: nome || code })
      })
      .then(function(r) { return r.json(); })
      .then(function(d) {
        document.getElementById('bms-code').value = '';
        document.getElementById('bms-nome').value = '';
        if (d.ok) { carregarLista(); } else { alert('Erro: ' + d.error); }
      });
    }

    function abrirDash(code) {
      clearInterval(INT);
      CODIGO = code;
      localStorage.setItem('bms_codigo_ativo', code);
      esconderTudo();
      document.getElementById('dash').classList.remove('hidden');
      document.getElementById('bms-titulo').textContent = code;
      atualizar();
      INT = setInterval(atualizar, 3000);
    }

    function voltar() { clearInterval(INT); localStorage.removeItem('bms_codigo_ativo'); mostrarLista(); }

    function renderCelulas(cels) {
      var celulasContainer = document.getElementById('celulas');
      if (!celulasContainer) return;
      if (!cels || cels.length === 0) {
        celulasContainer.innerHTML = '<div style="grid-column:1/-1;text-align:center;opacity:.3;padding:10px;font-size:13px">Sem dados das células</div>';
        document.getElementById('celMin').textContent = '0.000V';
        document.getElementById('celMax').textContent = '0.000V';
        document.getElementById('celDif').textContent = '0.000V';
        document.getElementById('celTot').textContent = '0';
        return;
      }
      var vals = [];
      for (var i = 0; i < cels.length; i++) {
        var v = parseFloat(cels[i]);
        if (v > 0) vals.push(v);
      }
      if (vals.length === 0) {
        document.getElementById('celMin').textContent = '0.000V';
        document.getElementById('celMax').textContent = '0.000V';
        document.getElementById('celDif').textContent = '0.000V';
        document.getElementById('celTot').textContent = '0';
        return;
      }
      var min = Math.min.apply(null, vals);
      var max = Math.max.apply(null, vals);
      var dif = max - min;
      document.getElementById('celMin').textContent = min.toFixed(3) + 'V';
      document.getElementById('celMax').textContent = max.toFixed(3) + 'V';
      document.getElementById('celDif').textContent = dif.toFixed(3) + 'V';
      document.getElementById('celTot').textContent = cels.length;
      var html = '';
      for (var i = 0; i < cels.length; i++) {
        var val = parseFloat(cels[i]);
        var cls = 'ok';
        if (val < 3.2 || val > 4.2) cls = 'crit';
        else if (val < 3.4 || val > 4.15) cls = 'warn';
        html += '<div class="cell ' + cls + '"><div class="cell-num">C' + (i + 1) + '</div><div class="cell-val">' + val.toFixed(3) + '</div></div>';
      }
      celulasContainer.innerHTML = html;
    }

    function atualizarGauge(soc) {
      var gauge = document.getElementById('socGauge');
      var valor = document.getElementById('socValor');
      var bar = document.getElementById('socBar');
      var txt = document.getElementById('socBarTxt');
      if (!gauge || !valor || !bar || !txt) return;
      var deg = Math.min(Math.max(soc, 0), 100) * 3.6;
      valor.textContent = soc + '%';
      txt.textContent = soc + '%';
      bar.style.width = soc + '%';
      gauge.style.background = 'conic-gradient(#00ff88 0deg,#00ffff ' + deg + 'deg,rgba(255,255,255,.08) ' + deg + 'deg)';
    }

    function atualizar() {
      if (!CODIGO) return;
      fetch(API + '?action=data&code=' + CODIGO, { headers: { 'Authorization': 'Bearer ' + TOKEN } })
      .then(function(r) {
        if (r && r.status === 401) { sair(); return; }
        if (!r || !r.ok) return;
        return r.json();
      })
      .then(function(d) {
        if (!d) return;
        var st = document.getElementById('status');
        if (st) {
          st.textContent = d.online ? 'Online' : 'Offline';
          st.className = 'status-badge ' + (d.online ? 'on' : 'off');
        }
        
        if (!d.online) {
          if (document.getElementById('soc')) document.getElementById('soc').textContent = '0%';
          if (document.getElementById('volt')) document.getElementById('volt').textContent = '0.00V';
          if (document.getElementById('corr')) document.getElementById('corr').textContent = '0.0A';
          if (document.getElementById('temp')) document.getElementById('temp').textContent = '0.0°C';
          atualizarGauge(0);
          renderCelulas([]);
        } else {
          if (document.getElementById('soc')) document.getElementById('soc').textContent = (d.soc ? d.soc.toFixed(0) : 0) + '%';
          if (document.getElementById('volt')) document.getElementById('volt').textContent = (d.voltage ? d.voltage.toFixed(2) : 0) + 'V';
          if (document.getElementById('corr')) document.getElementById('corr').textContent = (d.current ? d.current.toFixed(1) : 0) + 'A';
          if (document.getElementById('temp')) document.getElementById('temp').textContent = (d.temp ? d.temp.toFixed(1) : 0) + '°C';
          renderCelulas(d.cells);
          atualizarGauge(parseInt(d.soc || 0));
        }
      }).catch(function(err) { console.error(err); });
    }

    function sair() {
      clearInterval(INT);
      localStorage.removeItem('bms_token');
      localStorage.removeItem('bms_user');
      localStorage.removeItem('bms_codigo_ativo');
      location.reload();
    }
  </script>
</body>
</html>
