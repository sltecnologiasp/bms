<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>SMART BMS</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#05070d;color:#fff;font-family:sans-serif;min-height:100vh;padding:8px}
.hidden{display:none!important}
.tela{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center}
.title{font-size:40px;font-weight:900;margin-bottom:20px;color:#00ffff;text-align:center}
.card{background:rgba(10,15,25,.9);border:1px solid #00ffff;border-radius:16px;padding:16px;width:100%;max-width:500px}
input,button{width:100%;padding:18px;border-radius:12px;border:none;margin-top:12px;font-size:16px}
input{background:#000;color:#fff;border:1px solid #00ffff}
button{background:#00ffff;color:#000;font-weight:700;cursor:pointer}
.btn-sec{background:transparent;border:1px solid #00ffff;color:#00ffff}
.erro{background:rgba(255,0,0,.1);border:2px solid #ff4444;padding:12px;margin-top:12px;color:#ff4444}
.sucesso{background:rgba(0,255,0,.1);border:2px solid #00ff88;padding:12px;margin-top:12px;color:#00ff88}
.link{margin-top:16px;text-align:center;color:#00ffff;cursor:pointer}
.bms-item{background:rgba(0,255,255,.05);border:1px solid #00ffff;border-radius:12px;padding:16px;margin:8px 0}
</style>
</head>
<body>

<div id="login" class="tela">
<div class="title">SMART BMS</div>
<div class="card">
<input id="email" type="email" placeholder="seu@email.com">
<input id="senha" type="password" placeholder="Senha">
<button onclick="login()">ENTRAR</button>
<p class="link" onclick="mostrar('cadastro')">Criar conta</p>
<div id="erro" class="erro hidden"></div>
</div>
</div>

<div id="cadastro" class="tela hidden">
<div class="title">CADASTRO</div>
<div class="card">
<input id="cad-nome" placeholder="Nome">
<input id="cad-email" type="email" placeholder="Email">
<input id="cad-senha" type="password" placeholder="Senha">
<button onclick="cadastrar()">CADASTRAR</button>
<button class="btn-sec" onclick="mostrar('login')">VOLTAR</button>
<div id="erro-cad" class="erro hidden"></div>
</div>
</div>

<div id="verify" class="tela hidden">
<div class="title">CONFIRMAR EMAIL</div>
<div class="card">
<p style="text-align:center">Código enviado para:<br><span id="verify-email" style="color:#00ffff"></span></p>
<input id="verify-code" placeholder="000000" maxlength="6">
<button onclick="verifyEmail()">CONFIRMAR</button>
<button class="btn-sec" onclick="reenviar()">REENVIAR</button>
<p class="link" onclick="mostrar('login')">Voltar</p>
<div id="erro-verify" class="erro hidden"></div>
<div id="sucesso-verify" class="sucesso hidden"></div>
</div>
</div>

<div id="lista" class="tela hidden" style="justify-content:flex-start;padding-top:20px">
<div class="title" style="font-size:28px">SMART BMS</div>
<p style="text-align:center;margin-bottom:16px">Olá, <span id="user-nome">--</span></p>
<div class="card">
<input id="bms-code" placeholder="SL000000000000" maxlength="14">
<input id="bms-nome" placeholder="Nome da BMS">
<button onclick="addBms()">ADICIONAR BMS</button>
</div>
<div class="card" style="margin-top:12px">
<h3 style="text-align:center;margin-bottom:12px">Minhas BMS</h3>
<div id="bms-list"></div>
</div>
<button class="btn-sec" onclick="sair()" style="margin-top:20px">SAIR</button>
</div>

<div id="dash" class="tela hidden" style="justify-content:flex-start;padding-top:20px">
<div class="title" style="font-size:24px">DASHBOARD</div>
<div class="card">
<h2 style="text-align:center">SOC: <span id="soc">0</span>%</h2>
<p style="text-align:center;margin-top:8px">Tensão: <span id="volt">0</span>V</p>
<p style="text-align:center">Status: <span id="status">Offline</span></p>
<p style="text-align:center">BMS: <span id="bms-titulo">--</span></p>
</div>
<button class="btn-sec" onclick="voltar()" style="margin-top:20px">← VOLTAR</button>
</div>

<script>
var API = '/api/bms';
var TOKEN = localStorage.getItem('bms_token');
var USER = null;
var CODIGO = localStorage.getItem('bms_codigo_ativo');
var INT = null;
var PENDING_EMAIL = localStorage.getItem('pending_email');

try{USER = JSON.parse(localStorage.getItem('bms_user')||'null');}catch(e){}

function mostrar(tela){
  document.getElementById('login').classList.add('hidden');
  document.getElementById('cadastro').classList.add('hidden');
  document.getElementById('verify').classList.add('hidden');
  document.getElementById('lista').classList.add('hidden');
  document.getElementById('dash').classList.add('hidden');
  document.getElementById(tela).classList.remove('hidden');
}

window.onload = function(){
  if(TOKEN && USER){
    if(CODIGO){
      abrirDash(CODIGO);
    }else{
      mostrarLista();
    }
  }else if(PENDING_EMAIL){
    mostrarVerify(PENDING_EMAIL);
  }else{
    mostrar('login');
  }
};

function login(){
  var email = document.getElementById('email').value.trim();
  var senha = document.getElementById('senha').value;
  var e = document.getElementById('erro');
  e.classList.add('hidden');
  if(!email ||!senha){
    e.textContent = 'Preenche email e senha';
    e.classList.remove('hidden');
    return;
  }
  fetch(API+'?action=login_user',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({email:email,senha:senha})
  }).then(function(r){return r.json()}).then(function(d){
    if(d.ok && d.token){
      TOKEN = d.token;
      USER = {nome:d.nome,email:d.email};
      localStorage.setItem('bms_token',TOKEN);
      localStorage.setItem('bms_user',JSON.stringify(USER));
      localStorage.removeItem('pending_email');
      mostrarLista();
    }else if(d.need_verify){
      mostrarVerify(d.email);
    }else{
      e.textContent = d.error || 'Erro';
      e.classList.remove('hidden');
    }
  });
}

function cadastrar(){
  var nome = document.getElementById('cad-nome').value.trim();
  var email = document.getElementById('cad-email').value.trim();
  var senha = document.getElementById('cad-senha').value;
  var e = document.getElementById('erro-cad');
  e.classList.add('hidden');
  if(!nome ||!email ||!senha){
    e.textContent = 'Preenche tudo';
    e.classList.remove('hidden');
    return;
  }
  fetch(API+'?action=register',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({nome:nome,email:email,senha:senha})
  }).then(function(r){return r.json()}).then(function(d){
    if(d.ok && d.need_verify){
      mostrarVerify(d.email);
    }else{
      e.textContent = d.error || 'Erro';
      e.classList.remove('hidden');
    }
  });
}

function mostrarVerify(email){
  localStorage.setItem('pending_email',email);
  mostrar('verify');
  document.getElementById('verify-email').textContent = email;
  document.getElementById('verify-code').value = '';
}

function verifyEmail(){
  var code = document.getElementById('verify-code').value;
  var email = localStorage.getItem('pending_email');
  var e = document.getElementById('erro-verify');
  var s = document.getElementById('sucesso-verify');
  e.classList.add('hidden');
  s.classList.add('hidden');
  if(!code || code.length!== 6){
    e.textContent = 'Código de 6 dígitos';
    e.classList.remove('hidden');
    return;
  }
  fetch(API+'?action=verify_email',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({email:email,code:code})
  }).then(function(r){return r.json()}).then(function(d){
    if(d.ok){
      TOKEN = d.token;
      USER = {nome:d.nome,email:d.email};
      localStorage.setItem('bms_token',TOKEN);
      localStorage.setItem('bms_user',JSON.stringify(USER));
      localStorage.removeItem('pending_email');
      s.textContent = 'Confirmado!';
      s.classList.remove('hidden');
      setTimeout(mostrarLista,1500);
    }else{
      e.textContent = d.error;
      e.classList.remove('hidden');
    }
  });
}

function reenviar(){
  var email = localStorage.getItem('pending_email');
  fetch(API+'?action=resend_code',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({email:email})
  }).then(function(r){return r.json()}).then(function(d){
    alert(d.ok? 'Código reenviado!' : 'Erro: '+d.error);
  });
}

function mostrarLista(){
  localStorage.removeItem('bms_codigo_ativo');
  mostrar('lista');
  document.getElementById('user-nome').textContent = USER?USER.nome:'Usuário';
  carregarLista();
}

function carregarLista(){
  fetch(API+'?action=user_bms',{headers:{'Authorization':'Bearer '+TOKEN}})
 .then(function(r){
    if(r.status===401){sair();return;}
    return r.json();
  }).then(function(lista){
    var el = document.getElementById('bms-list');
    if(!lista ||!lista.length){
      el.innerHTML = '<p style="text-align:center;color:#666;padding:20px">Nenhuma BMS</p>';
      return;
    }
    var html = '';
    for(var i=0;i<lista.length;i++){
      var b = lista[i];
      html += '<div class="bms-item" onclick="abrirDash(\''+b.code+'\')">';
      html += '<h3>'+b.nome+'</h3>';
      html += '<p>'+b.code+'</p>';
      html += '<p>'+(b.online?'Online':'Offline')+'</p>';
      html += '</div>';
    }
    el.innerHTML = html;
  });
}

function addBms(){
  var code = document.getElementById('bms-code').value.trim();
  var nome = document.getElementById('bms-nome').value.trim();
  if(!code || code.length!== 14){
    alert('Código inválido');
    return;
  }
  fetch(API+'?action=add_bms',{
    method:'POST',
    headers:{'Content-Type':'application/json','Authorization':'Bearer '+TOKEN},
    body:JSON.stringify({code:code,nome:nome||code})
  }).then(function(r){return r.json()}).then(function(d){
    if(d.ok){
      alert('Adicionada!');
      document.getElementById('bms-code').value = '';
      document.getElementById('bms-nome').value = '';
      carregarLista();
    }else{
      alert('Erro: '+d.error);
    }
  });
}

function abrirDash(code){
  CODIGO = code;
  localStorage.setItem('bms_codigo_ativo',code);
  mostrar('dash');
  document.getElementById('bms-titulo').textContent = code;
  atualizar();
  INT = setInterval(atualizar,3000);
}

function voltar(){
  clearInterval(INT);
  localStorage.removeItem('bms_codigo_ativo');
  mostrarLista();
}

function atualizar(){
  if(!CODIGO) return;
  fetch(API+'?action=data&code='+CODIGO,{headers:{'Authorization':'Bearer '+TOKEN}})
 .then(function(r){
    if(r.status===401){sair();return;}
    return r.json();
  }).then(function(d){
    if(!d) return;
    document.getElementById('soc').textContent = (d.soc?d.soc.toFixed(0):0);
    document.getElementById('volt').textContent = (d.voltage?d.voltage.toFixed(2):0);
    document.getElementById('status').textContent = d.online?'Online':'Offline';
  });
}

function sair(){
  clearInterval(INT);
  localStorage.clear();
  location.reload();
}
</script>
</body>
</html>
