<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel SMART BMS</title>
    <!-- Incluindo a biblioteca oficial Paho MQTT via CDN -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/paho-mqtt/1.0.1/mqttws31.min.js" type="text/javascript"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        body {
            background-color: #0f172a;
            color: #f8fafc;
            padding: 20px;
            min-height: 100vh;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 20px;
            border-bottom: 1px solid #334155;
            margin-bottom: 30px;
        }
        h1 {
            font-size: 24px;
            color: #38bdf8;
        }
        .status-badge {
            padding: 8px 16px;
            border-radius: 20px;
            font-weight: bold;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .offline {
            background-color: #ef4444;
            color: white;
        }
        .online {
            background-color: #22c55e;
            color: white;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .card {
            background-color: #1e293b;
            border: 1px solid #334155;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }
        .card-title {
            font-size: 14px;
            color: #94a3b8;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 10px;
        }
        .card-value {
            font-size: 36px;
            font-weight: bold;
            color: #f1f5f9;
        }
        .unit {
            font-size: 18px;
            font-weight: normal;
            color: #38bdf8;
            margin-left: 4px;
        }
        .cells-container {
            background-color: #1e293b;
            border: 1px solid #334155;
            border-radius: 12px;
            padding: 20px;
        }
        .cells-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
            gap: 12px;
            margin-top: 15px;
        }
        .cell-box {
            background-color: #0f172a;
            border: 1px solid #475569;
            border-radius: 6px;
            padding: 10px;
            text-align: center;
        }
        .cell-name {
            font-size: 11px;
            color: #94a3b8;
            margin-bottom: 4px;
        }
        .cell-value {
            font-size: 16px;
            font-weight: bold;
            color: #34d399;
        }
        .info-row {
            display: flex;
            justify-content: space-between;
            margin-top: 10px;
            font-size: 14px;
            color: #cbd5e1;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div>
                <h1>SMART BMS - Telemetria</h1>
                <p style="color: #94a3b8; font-size: 14px; margin-top: 4px;">ID Placa: <span id="placa-id" style="color: #38bdf8; font-weight: bold;">SL659434242541</span></p>
            </div>
            <div id="status-conexao" class="status-badge offline">OFFLINE</div>
        </header>

        <main>
            <div class="grid">
                <!-- CARD SOC -->
                <div class="card">
                    <div class="card-title">Carga da Bateria (SOC)</div>
                    <div class="card-value"><span id="val-soc">0.0</span><span class="unit">%</span></div>
                </div>
                <!-- CARD TENSÃO -->
                <div class="card">
                    <div class="card-title">Tensão Total</div>
                    <div class="card-value"><span id="val-tensao">0.00</span><span class="unit">V</span></div>
                </div>
                <!-- CARD CORRENTE -->
                <div class="card">
                    <div class="card-title">Corrente</div>
                    <div class="card-value"><span id="val-corrente">0.0</span><span class="unit">A</span></div>
                </div>
                <!-- CARD TEMPERATURA -->
                <div class="card">
                    <div class="card-title">Temperatura</div>
                    <div class="card-value"><span id="val-temp">0.0</span><span class="unit">°C</span></div>
                </div>
            </div>

            <div class="grid">
                <!-- CARD INVERSOR POTENCIA -->
                <div class="card">
                    <div class="card-title">Potência Inversor</div>
                    <div class="card-value"><span id="val-potencia">0</span><span class="unit">W</span></div>
                </div>
                <!-- CARD AC VOLTAGE -->
                <div class="card">
                    <div class="card-title">Tensão AC</div>
                    <div class="card-value"><span id="val-vac">0.0</span><span class="unit">V</span></div>
                </div>
                <!-- CARD FREQUENCIA -->
                <div class="card">
                    <div class="card-title">Frequência</div>
                    <div class="card-value"><span id="val-freq">0.0</span><span class="unit">Hz</span></div>
                </div>
                <!-- CARD GERACAO -->
                <div class="card">
                    <div class="card-title">Geração do Dia</div>
                    <div class="card-value"><span id="val-geracao">0.00</span><span class="unit">kWh</span></div>
                </div>
            </div>

            <!-- TELA DE CÉLULAS -->
            <div class="cells-container">
                <div class="card-title" style="margin-bottom: 5px;">Tensão das Células Individuais</div>
                <div class="cells-grid" id="grid-celulas">
                    <!-- Gerado dinamicamente via JS -->
                </div>
            </div>
        </main>
    </div>

    <script>
        // CONFIGURAÇÕES DO BROKER PRIVADO HIVEMQ
        const hostMqtt = "965bd6abd6f54692b84d710cab8327b4.s1.eu.hivemq.cloud";
        const portaMqtt = 8884; // Porta WebSocket com TLS obrigatória para navegador
        const userMqtt = "sl_bms_prod";
        const passMqtt = "SLtech2026@Bms";
        const bmsCode = "SL659434242541";
        const topico = "sl_bms/" + bmsCode + "/telemetria";

        // Cria id aleatório de conexão para evitar conflito
        const clientId = "web_bms_" + Math.floor(Math.random() * 10000);

        // Inicializa o cliente MQTT Paho
        const client = new Paho.MQTT.Client(hostMqtt, Number(portaMqtt), clientId);

        // Callbacks
        client.onConnectionLost = onConnectionLost;
        client.onMessageArrived = onMessageArrived;

        // Opções de conexão segura
        const connectOptions = {
            userName: userMqtt,
            password: passMqtt,
            useSSL: true,
            timeout: 3,
            keepAliveInterval: 60,
            onSuccess: onConnect,
            onFailure: onFailure
        };

        // Conecta ao servidor
        console.log("Tentando conectar ao HiveMQ Privado...");
        client.connect(connectOptions);

        function onConnect() {
            console.log("Conectado com Sucesso ao MQTT!");
            const badge = document.getElementById("status-conexao");
            badge.textContent = "ONLINE";
            badge.className = "status-badge online";
            
            // Se inscreve no tópico da sua placa
            client.subscribe(topico);
            console.log("Inscrito no tópico: " + topico);
        }

        function onFailure(error) {
            console.log("Falha na conexão: ", error);
            setTimeout(() => {
                client.connect(connectOptions);
            }, 5000);
        }

        function onConnectionLost(responseObject) {
            console.log("Conexão perdida!");
            const badge = document.getElementById("status-conexao");
            badge.textContent = "OFFLINE";
            badge.className = "status-badge offline";
            
            if (responseObject.errorCode !== 0) {
                console.log("Erro: " + responseObject.errorMessage);
            }
            // Tenta reconectar após 5 segundos
            setTimeout(() => {
                client.connect(connectOptions);
            }, 5000);
        }

        function onMessageArrived(message) {
            console.log("Dados recebidos!");
            try {
                const data = JSON.parse(message.payloadString);
                
                // Atualiza elementos do painel principal
                document.getElementById("val-soc").textContent = data.soc.toFixed(1);
                document.getElementById("val-tensao").textContent = data.voltage.toFixed(2);
                document.getElementById("val-corrente").textContent = data.current.toFixed(1);
                document.getElementById("val-temp").textContent = data.temp.toFixed(1);
                
                document.getElementById("val-potencia").textContent = Math.round(data.inv_potencia);
                document.getElementById("val-vac").textContent = data.inv_tensao_ac.toFixed(1);
                document.getElementById("val-freq").textContent = data.inv_frequencia.toFixed(1);
                document.getElementById("val-geracao").textContent = data.inv_geracao_dia.toFixed(2);

                // Atualiza as células
                if(data.cells && data.cells.length > 0) {
                    const gridCelulas = document.getElementById("grid-celulas");
                    gridCelulas.innerHTML = ""; // Limpa anterior
                    
                    data.cells.forEach((val, index) => {
                        const box = document.createElement("div");
                        box.className = "cell-box";
                        box.innerHTML = `
                            <div class="cell-name">Célula ${index + 1}</div>
                            <div class="cell-value">${val.toFixed(3)}V</div>
                        `;
                        gridCelulas.appendChild(box);
                    });
                }
            } catch (e) {
                console.log("Erro ao processar JSON: ", e);
            }
        }
    </script>
</body>
</html>
