<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Monitor BMS</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a0f;color:#fff;font-family:system-ui;padding:0;text-align:center}
h1{text-align:center;font-size:32px;font-weight:900;padding:20px;background:linear-gradient(90deg,#00ffff,#0080ff);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.card{background:rgba(255,255,255,.03);border:1px solid rgba(0,255,255,.3);border-radius:16px;padding:20px;margin:16px}
input,button{width:100%;max-width:600px;padding:16px;margin:8px auto;border-radius:12px;border:1px solid rgba(0,255,255,.3);background:rgba(0,0,0,.4);color:#fff;font-size:16px;text-align:center;display:block}
button{background:linear-gradient(90deg,#0080ff,#00ffff);cursor:pointer;font-weight:700;border:none}
.hidden{display:none}
.label{opacity:.7;font-size:12px;text-transform:uppercase;text-align:center;letter-spacing:2px;margin-bottom:8px}
.val{font-size:48px;font-weight:700;margin:12px 0;text-align:center}
.unit{font-size:16px;opacity:.6}
.status{display:inline-block;padding:8px 24px;border-radius:20px;font-size:14px;font-weight:700;margin:12px 0}
.on{background:rgba(0,255,136,.15);color:#00ff88;border:1px solid rgba(0,255,136,.4)}
.off{background:rgba(255,68,68,.15);color:#ff4444;border:1px solid rgba(255,68,68,.4)}
.cells{display:grid;grid-template-columns:repeat(auto-fill,minmax(85px,1fr));gap:10px;margin-top:16px}
.cell{background:rgba(0,0,0,.4);border:1px solid rgba(0,255,255,.2);border-radius:12px;padding:12px;text-align:center}
.cell-num{opacity:.5;font-size:10px}
.cell-val{font-weight:700;font-size:14px;margin-top:4px}
.loading{width:20px;height:20px;border:3px solid rgba(0,255,255,.2);border-top-color:#00ffff;border-radius:50%;animation:spin 1s linear infinite;margin:0 auto}
@keyframes spin{to{transform:rotate(360deg)}}
.logout{background:rgba(255,68,68,.1);border:1px solid rgba(255,68,68,.4);max-width:500px;margin:40px auto}
.row{display:grid;grid-template-columns:1fr 1fr;gap:16px;max-width:632px;margin:0 auto}
.row .card{margin:8px}
@media(max-width:600px){.row{grid-template-columns:1fr}.row .card{margin:16px}}
</style>
</head>
<body>
<div id="login">
  <h1>BMS MONITOR</h1>
  <div class="card">
    <div class="label">Código de Acesso</div>
    <input id="code" placeholder="SL82576655" maxlength="10">
    <button onclick="login()">Conectar BMS</button>
    <p id="error" style="color:#ff4444;margin-top:12px;display:none"></p>
  </div>
</div>

<div id="dash" class="hidden">
  <h1>BMS MONITOR</h1>
  <div class="card">
    <div class="label">Código</div>
    <div class="val" style="font-size:24px" id="codeVal"></div>
    <div class="status off" id="status">Offline</div>
  </div>

  <div class="row">
    <div class="card">
      <div class="label">SOC</div>
      <div class="val" id="soc">--<span class="unit">%</span></div>
    </div>
    <div class="card">
      <div class="label">Tensão</div>
      <div class="val" id="voltage">--<span class="unit">V</span></div>
    </div>
  </div>

  <div class="row">
    <div class="card">
      <div class="label">Corrente</div>
      <div class="val" id="current">--<span class="unit">A</span></div>
    </div>
    <div class="card">
      <div class="label">Temperatura</div>
      <div class="val" id="temp">--<span class="unit">°C</span></div>
    </div>
  </div>

  <div class="card">
    <div class="label">Células</div>
    <div id="cells" class="cells"></div>
  </div>
  
  <button class="logout" onclick="logout()">Sair</button>
</div>

<script>
const API = '/api/bms';
let token = sessionStorage.getItem('bms_token');
let interval;

if(token) loadDash();

document.getElementById('code').oninput = e => {
  if(!e.target.value.startsWith('SL')) e.target.value = 'SL';
  e.target.value = 'SL' + e.target.value.slice(2).replace(/[^0-9]/g,'').slice(0,8);
};

async function login(){
  const code = document.getElementById('code').value;
  const errorEl = document.getElementById('error');
  errorEl.style.display='none';
  if(code.length !== 10) return showError('Código deve ter 10 caracteres');
  try{
    const r = await fetch(API+'?action=login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({code})});
    const d = await r.json();
    if(d.ok){
      token = d.token;
      sessionStorage.setItem('bms_token', token);
      loadDash();
    }else showError(d.error);
  }catch(e){showError('Erro de conexão')}
}

function showError(msg){
  const el = document.getElementById('error');
  el.textContent = msg;
  el.style.display = 'block';
}

function loadDash(){
  document.getElementById('login').classList.add('hidden');
  document.getElementById('dash').classList.remove('hidden');
  load();
  interval = setInterval(load, 3000);
}

function logout(){
  sessionStorage.removeItem('bms_token');
  clearInterval(interval);
  location.reload();
}

async function load(){
  try{
    const r = await fetch(API+'?action=dados',{headers:{'Authorization':'Bearer '+token}});
    if(r.status===401){logout();return;}
    const d = await r.json();
    if(d.error){logout();return;}
    update(d);
  }catch(e){console.error(e)}
}

function update(d){
  document.getElementById('codeVal').textContent = d.code;
  document.getElementById('soc').innerHTML = (d.soc||0).toFixed(0)+'<span class="unit">%</span>';
  document.getElementById('voltage').innerHTML = (d.voltage||0).toFixed(2)+'<span class="unit">V</span>';
  document.getElementById('current').innerHTML = (d.current||0).toFixed(1)+'<span class="unit">A</span>';
  document.getElementById('temp').innerHTML = (d.temp||0).toFixed(1)+'<span class="unit">°C</span>';
  const st = document.getElementById('status');
  st.textContent = d.online?'Online':'Offline';
  st.className = 'status '+(d.online?'on':'off');
  
  const cellsEl = document.getElementById('cells');
  if(d.cells && d.cells.length){
    cellsEl.innerHTML = d.cells.map((v,i)=>{
      const val = parseFloat(v);
      let cls = '';
      if(val < 3.2 || val > 4.2) cls = 'style="border-color:#ff4444;background:rgba(255,68,68,.08)"';
      else if(val < 3.4 || val > 4.15) cls = 'style="border-color:#ffaa00;background:rgba(255,170,0,.08)"';
      return `<div class="cell" ${cls}><div class="cell-num">Célula ${i+1}</div><div class="cell-val">${val.toFixed(3)}V</div></div>`;
    }).join('');
  }else{
    cellsEl.innerHTML = '<div style="grid-column:1/-1;opacity:.5;text-align:center">Sem dados</div>';
  }
}
</script>
</body>
</html>
