<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>SMART BMS 3D</title>

<link rel="manifest" href="manifest.json">

<meta name="theme-color" content="#00ffff">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

:root{

--bg:#05070d;
--cyan:#00ffff;
--blue:#0080ff;
--green:#00ff88;
--red:#ff4444;
--orange:#ffaa00;

}

body{

background:
radial-gradient(circle at top,#0b1220,#05070d);

color:#fff;

font-family:system-ui;

min-height:100vh;

overflow-x:hidden;

perspective:1600px;

position:relative;

}

/* =========================================
CYBER GRID
========================================= */

.cyber-grid{

position:fixed;
inset:0;

background-image:

linear-gradient(
rgba(0,255,255,.04) 1px,
transparent 1px
),

linear-gradient(
90deg,
rgba(0,255,255,.04) 1px,
transparent 1px
);

background-size:40px 40px;

transform:
perspective(1200px)
rotateX(75deg);

transform-origin:center top;

animation:gridMove 8s linear infinite;

opacity:.35;

pointer-events:none;

z-index:0;

}

@keyframes gridMove{

0%{

transform:
perspective(1200px)
rotateX(75deg)
translateY(0);

}

100%{

transform:
perspective(1200px)
rotateX(75deg)
translateY(40px);

}

}

/* =========================================
PARTICLES
========================================= */

.particle{

position:absolute;

border-radius:50%;

background:#00ffff;

opacity:.25;

pointer-events:none;

animation:floatParticle linear infinite;

}

@keyframes floatParticle{

0%{

transform:
translateY(100vh)
scale(0);

opacity:0;

}

20%{
opacity:.4;
}

100%{

transform:
translateY(-200px)
scale(1);

opacity:0;

}

}

/* =========================================
CENTER
========================================= */

.center{

width:100%;

display:flex;

justify-content:center;

align-items:center;

padding:20px;

position:relative;

z-index:2;

}

/* =========================================
LOGIN
========================================= */

#login{

min-height:100vh;

display:flex;

flex-direction:column;

justify-content:center;

align-items:center;

}

/* =========================================
DASH
========================================= */

#dash{

width:100%;

max-width:1400px;

margin:auto;

padding:20px;

}

/* =========================================
TITLE
========================================= */

.title{

font-size:52px;

font-weight:900;

letter-spacing:4px;

margin-bottom:30px;

text-transform:uppercase;

background:

linear-gradient(
90deg,
#00ffff,
#0080ff,
#00ffff
);

background-size:200% auto;

-webkit-background-clip:text;
-webkit-text-fill-color:transparent;

animation:titleFlow 5s linear infinite;

filter:drop-shadow(
0 0 25px rgba(0,255,255,.5)
);

text-align:center;

}

@keyframes titleFlow{

0%{
background-position:0%;
}

100%{
background-position:200%;
}

}

/* =========================================
CARDS
========================================= */

.card{

position:relative;

overflow:hidden;

background:
rgba(255,255,255,.04);

border:
1px solid rgba(0,255,255,.2);

border-radius:24px;

padding:24px;

backdrop-filter:blur(20px);

box-shadow:

0 0 30px rgba(0,255,255,.08);

transform-style:preserve-3d;

transition:
all .25s ease;

}

.card:hover{

transform:

rotateX(6deg)
rotateY(-6deg)
translateY(-8px)
scale(1.02);

box-shadow:

0 40px 80px rgba(0,255,255,.18);

}

.card::before{

content:'';

position:absolute;

inset:0;

background:

linear-gradient(
135deg,
rgba(0,255,255,.08),
transparent,
rgba(0,128,255,.08)
);

pointer-events:none;

}

/* =========================================
INPUTS
========================================= */

input,
button{

width:100%;

max-width:500px;

padding:18px;

margin-top:14px;

border-radius:16px;

border:
1px solid rgba(0,255,255,.2);

background:
rgba(0,0,0,.35);

color:#fff;

font-size:18px;

text-align:center;

outline:none;

}

button{

cursor:pointer;

font-weight:700;

background:

linear-gradient(
90deg,
#0080ff,
#00ffff
);

border:none;

box-shadow:

0 0 30px rgba(0,255,255,.3);

}

/* =========================================
GRID
========================================= */

.grid{

display:grid;

grid-template-columns:
repeat(auto-fit,minmax(250px,1fr));

gap:20px;

margin-top:20px;

}

/* =========================================
VALUES
========================================= */

.value{

font-size:46px;

font-weight:900;

margin-top:12px;

text-shadow:

0 0 20px currentColor,
0 0 40px currentColor;

}

.label{

opacity:.7;

font-size:12px;

letter-spacing:3px;

text-transform:uppercase;

}

/* =========================================
STATUS
========================================= */

.status{

display:inline-block;

padding:10px 24px;

border-radius:30px;

font-weight:700;

margin-top:16px;

animation:pulseGlow 2s infinite;

}

.on{

background:
rgba(0,255,136,.15);

border:
1px solid rgba(0,255,136,.35);

color:#00ff88;

}

.off{

background:
rgba(255,68,68,.15);

border:
1px solid rgba(255,68,68,.35);

color:#ff4444;

}

@keyframes pulseGlow{

0%{
box-shadow:0 0 10px currentColor;
}

50%{
box-shadow:0 0 30px currentColor;
}

100%{
box-shadow:0 0 10px currentColor;
}

}

/* =========================================
CELLS
========================================= */

.cells{

display:grid;

grid-template-columns:
repeat(auto-fill,minmax(90px,1fr));

gap:12px;

margin-top:20px;

}

.cell{

background:
rgba(0,0,0,.35);

border:
1px solid rgba(0,255,255,.15);

border-radius:18px;

padding:14px;

transition:.25s;

}

.cell:hover{

transform:
translateY(-5px)
scale(1.05);

box-shadow:
0 0 20px rgba(0,255,255,.2);

}

.cell-num{

opacity:.5;

font-size:11px;

}

.cell-val{

font-size:18px;

font-weight:700;

margin-top:6px;

}

/* =========================================
CHART
========================================= */

.chart-card{

margin-top:24px;

height:420px;

}

/* =========================================
HIDDEN
========================================= */

.hidden{
display:none;
}

@media(max-width:768px){

.title{
font-size:38px;
}

.value{
font-size:34px;
}

.chart-card{
height:300px;
}

}

</style>

</head>

<body>

<div class="cyber-grid"></div>

<!-- LOGIN -->

<div id="login" class="center">

<div>

<div class="title">
SMART BMS
</div>

<div class="card">

<div class="label">
Código da BMS
</div>

<input
id="code"
placeholder="SL00000000"
maxlength="10">

<button onclick="login()">
ENTRAR
</button>

<p
id="error"
style="margin-top:14px;color:#ff4444;display:none">
</p>

</div>

</div>

</div>

<!-- DASH -->

<div
id="dash"
class="hidden">

<div class="title">
SMART BMS
</div>

<div class="card">

<div
class="label"
id="bmsName">

BMS

</div>

<div>

<span
id="connStatus"
class="status off">

OFFLINE

</span>

</div>

</div>

<div class="grid">

<div class="card">

<div class="label">
SOC
</div>

<div
class="value"
style="color:#00ff88"
id="soc">

0%

</div>

</div>

<div class="card">

<div class="label">
TENSÃO
</div>

<div
class="value"
style="color:#00ffff"
id="voltage">

0V

</div>

</div>

<div class="card">

<div class="label">
CORRENTE
</div>

<div
class="value"
style="color:#ffaa00"
id="current">

0A

</div>

</div>

<div class="card">

<div class="label">
TEMPERATURA
</div>

<div
class="value"
style="color:#ff4444"
id="temp">

0°C

</div>

</div>

</div>

<div class="card chart-card">

<canvas id="cellChart"></canvas>

</div>

<div class="card">

<div class="label">
CÉLULAS
</div>

<div
id="cells"
class="cells">
</div>

</div>

</div>

<script>

/* =========================================
PWA
========================================= */

if('serviceWorker' in navigator){

navigator.serviceWorker
.register('/service-worker.js');

}

/* =========================================
PARTICLES
========================================= */

function createParticles(){

setInterval(()=>{

const p =
document.createElement('div');

p.className='particle';

const size =
Math.random()*5+2;

p.style.width=size+'px';

p.style.height=size+'px';

p.style.left=
Math.random()*100+'%';

p.style.animationDuration=
(Math.random()*10+8)+'s';

document.body.appendChild(p);

setTimeout(()=>{
p.remove();
},20000);

},200);

}

createParticles();

/* =========================================
3D PARALLAX
========================================= */

document.addEventListener('mousemove', e=>{

const x =
(window.innerWidth/2 - e.clientX)/40;

const y =
(window.innerHeight/2 - e.clientY)/40;

document
.querySelectorAll('.card')
.forEach(card=>{

card.style.transform=`

rotateY(${x}deg)
rotateX(${-y}deg)

`;

});

});

/* =========================================
CHART
========================================= */

const ctx =
document
.getElementById('cellChart')
.getContext('2d');

const chart =
new Chart(ctx,{

type:'line',

data:{

labels:[],

datasets:[{

label:'Cells',

data:[],

borderColor:'#00ffff',

backgroundColor:
'rgba(0,255,255,.08)',

fill:true,

tension:.4,

borderWidth:3

}]

},

options:{

responsive:true,

maintainAspectRatio:false,

plugins:{

legend:{

labels:{
color:'#fff'
}

}

},

scales:{

x:{

ticks:{
color:'#aaa'
},

grid:{
color:'rgba(255,255,255,.05)'
}

},

y:{

ticks:{
color:'#aaa'
},

grid:{
color:'rgba(255,255,255,.05)'
}

}

}

}

});

/* =========================================
API
========================================= */

const API='/api/bms';

let token=
localStorage.getItem('bms_token');

let interval;

/* =========================================
AUTO LOGIN
========================================= */

if(token){

showDash();

}

/* =========================================
INPUT MASK
========================================= */

document
.getElementById('code')
.oninput = e=>{

if(!e.target.value.startsWith('SL'))
e.target.value='SL';

e.target.value=
'SL'+
e.target.value
.slice(2)
.replace(/[^0-9]/g,'')
.slice(0,8);

};

/* =========================================
LOGIN
========================================= */

async function login(){

const code =
document
.getElementById('code')
.value.trim();

const errorEl =
document
.getElementById('error');

errorEl.style.display='none';

try{

const r =
await fetch(
API+'?action=login',
{
method:'POST',
headers:{
'Content-Type':'application/json'
},
body:JSON.stringify({code})
}
);

const d =
await r.json();

if(d.ok){

token=d.token;

localStorage
.setItem('bms_token',token);

showDash();

}else{

errorEl.textContent=
d.error;

errorEl.style.display='block';

}

}catch(e){

errorEl.textContent=
'Erro de conexão';

errorEl.style.display='block';

}

}

/* =========================================
SHOW DASH
========================================= */

function showDash(){

document
.getElementById('login')
.classList.add('hidden');

document
.getElementById('dash')
.classList.remove('hidden');

update();

interval=
setInterval(update,3000);

}

/* =========================================
RENDER CELLS
========================================= */

function renderCells(cells){

if(!cells) return;

document
.getElementById('cells')
.innerHTML=

cells.map((v,i)=>{

const val =
parseFloat(v);

return `

<div class="cell">

<div class="cell-num">
C${i+1}
</div>

<div class="cell-val">
${val.toFixed(3)}V
</div>

</div>

`;

}).join('');

}

/* =========================================
UPDATE
========================================= */

async function update(){

try{

const r =
await fetch(
API+'?action=data',
{
headers:{
'Authorization':
'Bearer '+token
}
}
);

if(r.status===401){

logout();
return;

}

const d =
await r.json();

document
.getElementById('bmsName')
.textContent=
d.nome || d.code;

document
.getElementById('soc')
.textContent=
(d.soc?.toFixed(0)||0)+'%';

document
.getElementById('voltage')
.textContent=
(d.voltage?.toFixed(2)||0)+'V';

document
.getElementById('current')
.textContent=
(d.current?.toFixed(1)||0)+'A';

document
.getElementById('temp')
.textContent=
(d.temp?.toFixed(1)||0)+'°C';

document
.getElementById('connStatus')
.textContent=
d.online
?'ONLINE'
:'OFFLINE';

document
.getElementById('connStatus')
.className=
'status '+
(d.online?'on':'off');

renderCells(d.cells);

/* chart */

chart.data.labels=
d.cells.map((_,i)=>'C'+(i+1));

chart.data.datasets[0].data=
d.cells;

chart.update();

/* alerts */

smartAlerts(d);

}catch(e){

document
.getElementById('connStatus')
.textContent='ERRO';

}

/* =========================================
SMART ALERTS
========================================= */

function smartAlerts(data){

if(!data.cells) return;

const vals =
data.cells.map(v=>parseFloat(v));

const min =
Math.min(...vals);

const max =
Math.max(...vals);

const diff =
max-min;

if(diff > 0.080){

showAlert(
'⚠️ Diferença crítica: '
+ diff.toFixed(3)+'V'
);

}

if(data.temp > 60){

showAlert(
'🔥 Temperatura crítica'
);

}

}

/* =========================================
SHOW ALERT
========================================= */

function showAlert(msg){

const old =
document
.getElementById('alert');

if(old) old.remove();

const div =
document.createElement('div');

div.id='alert';

div.style.cssText=`

position:fixed;

top:30px;
right:30px;

padding:18px 24px;

border-radius:18px;

background:
rgba(255,68,68,.15);

border:
1px solid rgba(255,68,68,.35);

backdrop-filter:blur(20px);

box-shadow:
0 0 40px rgba(255,68,68,.3);

z-index:99999;

font-weight:700;

`;

div.innerHTML=msg;

document.body.appendChild(div);

setTimeout(()=>{
div.remove();
},5000);

}

}

/* =========================================
LOGOUT
========================================= */

function logout(){

clearInterval(interval);

localStorage
.removeItem('bms_token');

location.reload();

}

</script>

</body>
</html>
