<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Dashboard BMS</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:system-ui,sans-serif;
  background:#05070d;
  color:#fff;
  padding:20px;
  background-image:
    radial-gradient(circle at 20% 50%, rgba(0,255,255,.05) 0%, transparent 50%),
    radial-gradient(circle at 80% 20%, rgba(0,255,255,.03) 0%, transparent 50%);
}
.container{max-width:1200px;margin:0 auto}
.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:20px;
}
.header h1{color:#00ffff;font-size:28px;text-shadow:0 0 20px rgba(0,255,255,.6)}
.btn{
  padding:12px 24px;
  background:rgba(0,255,255,.1);
  border:2px solid #00ffff;
  border-radius:12px;
  color:#00ffff;
  text-decoration:none;
  font-weight:600;
}
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:20px;
  margin-bottom:20px;
}
.card{
  background:rgba(0,255,255,.05);
  border:2px solid rgba(0,255,255,.3);
  border-radius:20px;
  padding:20px;
  backdrop-filter:blur(10px);
}
.card h3{
  color:#aaa;
  font-size:14px;
  margin-bottom:8px;
  text-transform:uppercase;
}
.card .value{
  font-size:32px;
  font-weight:900;
  color:#00ffff;
  text-shadow:0 0 20px rgba(0,255,255,.6);
}
.card .unit{font-size:18px;color:#666;margin-left:4px}
.gauge-card{
  grid-column:span 2;
  text-align:center;
}
.gauge{
  width:200px;
  height:200px;
  margin:20px auto;
  position:relative;
}
.gauge svg{transform:rotate(-90deg)}
.gauge-text{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  font-size:42px;
  font-weight:900;
  color:#00ffff;
  text-shadow:0 0 20px rgba(0,255,255,.8);
}
.status-dot{
  display:inline-block;
  width:12px;
  height:12px;
  border-radius:50%;
  margin-right:8px;
  animation:pulse 2s infinite;
}
.status-dot.online{background:#0f0;box-shadow:0 0 10px #0f0}
.status-dot.offline{background:#f44}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
.cells-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(100px,1fr));
  gap:12px;
}
.cell{
  background:rgba(0,0,0,.4);
  border:1px solid rgba(0,255,255,.3);
  border-radius:8px;
  padding:12px;
  text-align:center;
}
.cell .num{color:#666;font-size:11px}
.cell .volt{color:#00ffff;font-size:18px;font-weight:700}
.chart-container{height:300px}
.hidden{display:none}
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1 id="bms-title">Carregando...</h1>
    <a href="/" class="btn">← Voltar</a>
  </div>

  <div id="offline-msg" class="card hidden" style="text-align:center;background:rgba(255,0,0,.1);border-color:#f44">
    <h3 style="color:#f44">BMS OFFLINE</h3>
    <p style="color:#aaa">Sem comunicação com o dispositivo</p>
  </div>

  <div id="dashboard">
    <div class="grid">
      <div class="card">
        <h3>Status</h3>
        <div class="value">
          <span class="status-dot offline" id="status-dot"></span>
          <span id="status-text">Offline</span>
        </div>
      </div>
      <div class="card">
        <h3>Tensão Total</h3>
        <div class="value"><span id="voltage">0.00</span><span class="unit">V</span></div>
      </div>
      <div class="card">
        <h3>Corrente</h3>
        <div class="value"><span id="current">0.00</span><span class="unit">A</span></div>
      </div>
      <div class="card">
        <h3>Temperatura</h3>
        <div class="value"><span id="temp">0.0</span><span class="unit">°C</span></div>
      </div>
    </div>

    <div class="grid">
      <div class="card gauge-card">
        <h3>Estado de Carga - SOC</h3>
        <div class="gauge">
          <svg width="200" height="200">
            <circle cx="100" cy="100" r="90" stroke="rgba(0,255,255,.1)" stroke-width="15" fill="none"/>
            <circle id="gauge-circle" cx="100" cy="100" r="90" stroke="#00ffff" stroke-width="15" fill="none"
              stroke-dasharray="565.48" stroke-dashoffset="565.48" stroke-linecap="round"
              style="filter:drop-shadow(0 0 10px #00ffff);transition:stroke-dashoffset 1s"/>
          </svg>
          <div class="gauge-text"><span id="soc">0</span>%</div>
        </div>
      </div>
      <div class="card">
        <h3>Gráfico Tensão</h3>
        <div class="chart-container"><canvas id="chart"></canvas></div>
      </div>
    </div>

    <div class="card">
      <h3>Tensão das Células</h3>
      <div id="cells" class="cells-grid"></div>
    </div>
  </div>
</div>

<script>
const API = '/api/bms';
const params = new URLSearchParams(location.search);
const code = params.get('code');
const token = localStorage.getItem('bms_token');

if(!code || !token){
  location.href = '/';
}

document.getElementById('bms-title').textContent = code;

const chart = new Chart(document.getElementById('chart'), {
  type: 'line',
  data: {
    labels: [],
    datasets: [{
      label: 'Tensão (V)',
      data: [],
      borderColor: '#00ffff',
      backgroundColor: 'rgba(0,255,255,.1)',
      tension: 0.4,
      fill: true
    }]
  },
  options: {
    responsive: true,
    maintainAspectRatio: false,
    plugins: { legend: { display: false } },
    scales: {
      x: { display: false },
      y: { 
        grid: { color: 'rgba(0,255,255,.1)' },
        ticks: { color: '#666' }
      }
    }
  }
});

function updateGauge(soc){
  const circle = document.getElementById('gauge-circle');
  const offset = 565.48 - (565.48 * soc / 100);
  circle.style.strokeDashoffset = offset;
  document.getElementById('soc').textContent = soc;
}

async function updateData(){
  try{
    const r = await fetch(`${API}?action=data&code=${code}`, {
      headers: { 'Authorization': 'Bearer ' + token }
    });
    
    if(r.status === 401 || r.status === 403){
      location.href = '/';
      return;
    }
    
    const d = await r.json();
    
    if(!r.ok){
      document.getElementById('offline-msg').classList.remove('hidden');
      document.getElementById('dashboard').classList.add('hidden');
      return;
    }

    document.getElementById('offline-msg').classList.add('hidden');
    document.getElementById('dashboard').classList.remove('hidden');

    const online = d.online;
    document.getElementById('status-dot').className = `status-dot ${online ? 'online' : 'offline'}`;
    document.getElementById('status-text').textContent = online ? 'Online' : 'Offline';
    document.getElementById('voltage').textContent = (d.voltage || 0).toFixed(2);
    document.getElementById('current').textContent = (d.current || 0).toFixed(2);
    document.getElementById('temp').textContent = (d.temp || 0).toFixed(1);
    
    updateGauge(d.soc || 0);

    // Chart
    const now = new Date().toLocaleTimeString();
    chart.data.labels.push(now);
    chart.data.datasets[0].data.push(d.voltage || 0);
    if(chart.data.labels.length > 20){
      chart.data.labels.shift();
      chart.data.datasets[0].data.shift();
    }
    chart.update('none');

    // Cells
    const cells = d.cells || [];
    document.getElementById('cells').innerHTML = cells.map((v,i) => `
      <div class="cell">
        <div class="num">Célula ${i+1}</div>
        <div class="volt">${v.toFixed(3)}V</div>
      </div>
    `).join('');

  }catch(e){
    console.error(e);
  }
}

updateData();
setInterval(updateData, 3000);
</script>
</body>
</html>
