<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>SMART BMS</title>

<link rel="manifest" href="/manifest.json">

<meta name="theme-color" content="#00ffff">

<link rel="icon" href="/icon-192.png">

<link rel="apple-touch-icon" href="/icon-192.png">

<meta name="apple-mobile-web-app-capable" content="yes">

<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

:root{
--bg:#05070d;
--cyan:#00ffff;
--blue:#0080ff;
--green:#00ff88;
--red:#ff4444;
--orange:#ffaa00;
}

body{

font-family:'Inter',sans-serif;

background:
radial-gradient(circle at top,
rgba(0,255,255,.12),
transparent 40%),

radial-gradient(circle at bottom,
rgba(0,128,255,.08),
transparent 40%),

var(--bg);

color:#fff;

overflow-x:hidden;

min-height:100vh;

position:relative;

}

body::before{

content:'';

position:fixed;

inset:0;

background-image:
linear-gradient(
rgba(255,255,255,.03) 1px,
transparent 1px),

linear-gradient(
90deg,
rgba(255,255,255,.03) 1px,
transparent 1px);

background-size:40px 40px;

mask-image:
radial-gradient(circle at center,
black,
transparent 90%);

pointer-events:none;

z-index:0;

}

#particles{

position:fixed;

inset:0;

overflow:hidden;

z-index:0;

pointer-events:none;

}

.particle{

position:absolute;

background:var(--cyan);

border-radius:50%;

opacity:.25;

animation:float linear infinite;

box-shadow:
0 0 12px var(--cyan),
0 0 24px var(--cyan);

}

@keyframes float{

0%{
transform:
translateY(100vh)
scale(0);
opacity:0;
}

10%{
opacity:.3;
}

100%{
transform:
translateY(-100px)
scale(1.3);
opacity:0;
}

}

#login,
#dash{

position:relative;

z-index:1;

width:100%;

min-height:100vh;

display:flex;

flex-direction:column;

justify-content:center;

align-items:center;

padding:20px;

}

.title{

font-size:clamp(42px,8vw,74px);

font-weight:900;

margin-bottom:30px;

letter-spacing:3px;

background:
linear-gradient(
90deg,
var(--cyan),
var(--blue));

-webkit-background-clip:text;
-webkit-text-fill-color:transparent;

text-shadow:
0 0 30px rgba(0,255,255,.4);

animation:pulse 3s infinite;

}

@keyframes pulse{

0%,100%{
filter:brightness(1);
}

50%{
filter:brightness(1.3);
}

}

.card{

background:
rgba(255,255,255,.04);

backdrop-filter:blur(24px);

border:
1px solid rgba(255,255,255,.08);

border-radius:28px;

padding:24px;

width:100%;

position:relative;

overflow:hidden;

box-shadow:
0 0 30px rgba(0,255,255,.08),
inset 0 0 40px rgba(255,255,255,.02);

transition:.35s ease;

}

.card:hover{

transform:
translateY(-4px)
scale(1.01);

box-shadow:
0 0 40px rgba(0,255,255,.15),
0 0 80px rgba(0,255,255,.08);

}

#login .card{
max-width:520px;
}

#dash{
max-width:1450px;
margin:auto;
}

.grid{

display:grid;

grid-template-columns:repeat(2,1fr);

gap:18px;

width:100%;

max-width:900px;

margin:20px auto;

}

.grid .card{

height:190px;

display:flex;

flex-direction:column;

justify-content:center;

align-items:center;

}

.label{

font-size:12px;

letter-spacing:2px;

opacity:.6;

text-transform:uppercase;

}

.value{

font-size:clamp(40px,5vw,58px);

font-weight:800;

margin-top:12px;

text-shadow:
0 0 25px currentColor;

}

input,
button{

width:100%;

max-width:500px;

padding:18px;

border-radius:18px;

border:none;

outline:none;

margin-top:16px;

font-size:18px;

transition:.25s;

}

input{

background:
rgba(0,0,0,.35);

color:#fff;

font-family:monospace;

letter-spacing:2px;

border:
1px solid rgba(0,255,255,.2);

box-shadow:
0 0 20px rgba(0,255,255,.05);

}

input:focus{

border-color:var(--cyan);

box-shadow:
0 0 25px rgba(0,255,255,.2);

}

button{

background:
linear-gradient(
90deg,
var(--blue),
var(--cyan));

color:#fff;

font-weight:700;

cursor:pointer;

box-shadow:
0 0 30px rgba(0,255,255,.25);

}

button:hover{

transform:
translateY(-2px)
scale(1.02);

box-shadow:
0 0 45px rgba(0,255,255,.4);

}

.status{

display:inline-flex;

align-items:center;

gap:10px;

padding:14px 26px;

border-radius:999px;

font-weight:700;

margin-top:14px;

}

.on{

background:
rgba(0,255,136,.12);

color:var(--green);

border:
1px solid rgba(0,255,136,.3);

box-shadow:
0 0 25px rgba(0,255,136,.2);

}

.off{

background:
rgba(255,68,68,.12);

color:var(--red);

border:
1px solid rgba(255,68,68,.3);

box-shadow:
0 0 25px rgba(255,68,68,.2);

}

.gauge-wrap{

width:100%;
max-width:1200px;

margin:20px auto;

}

.gauge-card{
padding:40px;
}

.gauge{

width:240px;
height:240px;

margin:auto;

border-radius:50%;

background:
conic-gradient(
#00ff88 0deg,
#00ffff 180deg,
rgba(255,255,255,.08) 180deg
);

position:relative;

box-shadow:
0 0 40px rgba(0,255,255,.2),
0 0 80px rgba(0,255,255,.08);

}

.gauge::before{

content:'';

position:absolute;

inset:18px;

border-radius:50%;

background:#05070d;

}

.gauge-inner{

position:absolute;

inset:0;

display:flex;

flex-direction:column;

justify-content:center;

align-items:center;

z-index:2;

}

.gauge-value{

font-size:58px;

font-weight:900;

color:#00ff88;

text-shadow:
0 0 20px #00ff88;

}

.gauge-label{

opacity:.6;

letter-spacing:2px;

font-size:12px;

}

.bar-wrap{
margin-top:24px;
}

.bar-label{

display:flex;

justify-content:space-between;

margin-bottom:10px;

font-size:14px;

opacity:.7;

}

.bar{

height:16px;

background:
rgba(255,255,255,.06);

border-radius:999px;

overflow:hidden;

}

.bar-fill{

height:100%;
width:0%;

border-radius:999px;

background:
linear-gradient(
90deg,
#00ff88,
#00ffff
);

transition:1s;

}

.chart-card{

width:100%;
max-width:1200px;

margin:20px auto;

padding:30px;

}

canvas{
width:100%!important;
height:320px!important;
}

.cells{

display:grid;

grid-template-columns:
repeat(auto-fill,minmax(95px,1fr));

gap:12px;

margin-top:24px;

}

.cell{

background:
rgba(0,0,0,.28);

border-radius:18px;

padding:14px;

border:
1px solid rgba(255,255,255,.05);

}

.cell-num{
font-size:11px;
opacity:.5;
margin-bottom:6px;
}

.cell-val{
font-size:20px;
font-weight:700;
}

.cell.ok{
border-color:rgba(0,255,136,.25);
}

.cell.warn{
border-color:rgba(255,170,0,.25);
}

.cell.crit{
border-color:rgba(255,68,68,.25);
}

.logout{

margin-top:40px;

background:
rgba(255,68,68,.08);

border:
1px solid rgba(255,68,68,.2);

}

.hidden{
display:none!important;
}

@media(max-width:700px){

.grid{
grid-template-columns:1fr;
}

}

</style>

</head>

<body>

<div id="particles"></div>

<div id="login">

<div class="title">
SMART BMS
</div>

<div class="card">

<div class="label">
Código da BMS
</div>

<input
id="code"
placeholder="SL00000000"
maxlength="10"
>

<button onclick="login()">
Entrar
</button>

<p
id="error"
style="
color:#ff4444;
margin-top:12px;
display:none;
">
</p>

</div>

</div>

<div id="dash" class="hidden">

<div class="title">
SMART BMS
</div>

<div class="gauge-wrap">

<div class="card gauge-card">

<div class="gauge" id="socGauge">

<div class="gauge-inner">

<div class="gauge-value" id="socGaugeValue">
0%
</div>

<div class="gauge-label">
STATE OF CHARGE
</div>

</div>

</div>

<div class="bar-wrap">

<div class="bar-label">

<span>Bateria</span>

<span id="socBarText">
0%
</span>

</div>

<div class="bar">
<div class="bar-fill" id="socBar"></div>
</div>

</div>

</div>

</div>

<div class="card" style="max-width:1200px">

<div class="label" id="bmsName">
BMS
</div>

<div style="margin-top:16px">

<span id="connStatus" class="status off">
Offline
</span>

</div>

</div>

<div class="grid">

<div class="card">
<div class="label">SOC</div>
<div class="value" id="soc" style="color:#00ff88">0%</div>
</div>

<div class="card">
<div class="label">Tensão</div>
<div class="value" id="voltage" style="color:#00ffff">0V</div>
</div>

<div class="card">
<div class="label">Corrente</div>
<div class="value" id="current" style="color:#ffaa00">0A</div>
</div>

<div class="card">
<div class="label">Temperatura</div>
<div class="value" id="temp" style="color:#ff4444">0°C</div>
</div>

</div>

<button class="logout" onclick="logout()">
Sair do Painel
</button>

</div>

<script>

function createParticles(){

const container =
document.getElementById('particles');

setInterval(() => {

const p =
document.createElement('div');

p.className = 'particle';

const size =
Math.random() * 4 + 1;

p.style.width = size + 'px';
p.style.height = size + 'px';

p.style.left =
Math.random() * 100 + '%';

p.style.animationDuration =
(Math.random() * 10 + 10) + 's';

container.appendChild(p);

setTimeout(() => p.remove(),20000);

},300);

}

createParticles();

const API = '/api/bms';

let interval;

if(localStorage.getItem('bms_token')){
showDash();
}

document.getElementById('code').oninput = e => {

if(!e.target.value.startsWith('SL')){
e.target.value = 'SL';
}

e.target.value =
'SL' +
e.target.value
.slice(2)
.replace(/[^0-9]/g,'')
.slice(0,8);

};

async function login(){

const code =
document.getElementById('code')
.value
.trim();

const errorEl =
document.getElementById('error');

errorEl.style.display='none';

try{

const r = await fetch(
API + '?action=login',
{
method:'POST',
headers:{
'Content-Type':'application/json'
},
body:JSON.stringify({code})
}
);

const d = await r.json();

if(d.ok && d.token){

localStorage.setItem(
'bms_token',
d.token
);

showDash();

}else{

errorEl.textContent =
d.error || 'BMS não encontrada';

errorEl.style.display='block';

}

}catch(e){

errorEl.textContent =
'Erro de conexão';

errorEl.style.display='block';

}

}

function showDash(){

document
.getElementById('login')
.classList
.add('hidden');

document
.getElementById('dash')
.classList
.remove('hidden');

update();

interval =
setInterval(update,3000);

}

async function update(){

const token =
localStorage.getItem('bms_token');

try{

const r = await fetch(
API + '?action=data',
{
headers:{
'Authorization':'Bearer '+token
}
}
);

if(r.status===401){
logout();
return;
}

const d = await r.json();

document.getElementById('bmsName').textContent =
d.nome || d.code;

document.getElementById('soc').textContent =
(d.soc?.toFixed(0)||0)+'%';

document.getElementById('voltage').textContent =
(d.voltage?.toFixed(2)||0)+'V';

document.getElementById('current').textContent =
(d.current?.toFixed(1)||0)+'A';

document.getElementById('temp').textContent =
(d.temp?.toFixed(1)||0)+'°C';

document.getElementById('connStatus').textContent =
d.online ? 'Online' : 'Offline';

document.getElementById('connStatus').className =
'status ' + (d.online ? 'on' : 'off');

updateGauge(
parseInt(d.soc || 0)
);

}catch(e){

document.getElementById('connStatus').textContent =
'Erro';

document.getElementById('connStatus').className =
'status off';

}

}

function updateGauge(soc){

const gauge =
document.getElementById('socGauge');

const value =
document.getElementById('socGaugeValue');

const bar =
document.getElementById('socBar');

const text =
document.getElementById('socBarText');

const deg = soc * 3.6;

value.textContent = soc + '%';

text.textContent = soc + '%';

bar.style.width = soc + '%';

gauge.style.background = `
conic-gradient(
#00ff88 0deg,
#00ffff ${deg}deg,
rgba(255,255,255,.08) ${deg}deg
)
`;

}

function logout(){

clearInterval(interval);

localStorage.removeItem('bms_token');

document
.getElementById('dash')
.classList
.add('hidden');

document
.getElementById('login')
.classList
.remove('hidden');

document.getElementById('code').value='';

}

if ('serviceWorker' in navigator) {

window.addEventListener('load', async () => {

try {

await navigator.serviceWorker.register('/service-worker.js');

console.log('PWA ativo');

} catch (e) {

console.log(e);

}

});

}

</script>

</body>
</html>
