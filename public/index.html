<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>TESTE</title>
<style>
body{background:#05070d;color:#fff;font-family:sans-serif;padding:20px}
button{width:100%;padding:20px;background:#00ffff;border:none;border-radius:10px;font-size:18px;margin:10px 0}
.hidden{display:none}
</style>
</head>
<body>

<div id="login">
<h1>LOGIN</h1>
<button onclick="mostrarCadastro()">CADASTRAR</button>
</div>

<div id="cadastro" class="hidden">
<h1>CADASTRO</h1>
<button onclick="mostrarLogin()">VOLTAR</button>
</div>

<script>
function mostrarCadastro(){
  document.getElementById('login').classList.add('hidden');
  document.getElementById('cadastro').classList.remove('hidden');
}
function mostrarLogin(){
  document.getElementById('cadastro').classList.add('hidden');
  document.getElementById('login').classList.remove('hidden');
}
</script>
</body>
</html>
