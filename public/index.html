<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Smart BMS</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a0f;color:#fff;font-family:system-ui;padding:0;text-align:center}
h1{text-align:center;font-size:32px;font-weight:900;padding:20px;background:linear-gradient(90deg,#00ffff,#0080ff);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.card{background:rgba(255,255,255,.03);border:1px solid rgba(0,255,255,.3);border-radius:16px;padding:20px;margin:16px}
input,button{width:100%;max-width:600px;padding:16px;margin:8px auto;border-radius:12px;border:1px solid rgba(0,255,255,.3);background:rgba(0,0,0,.4);color:#fff;font-size:16px;text-align:center;display:block}
button{background:linear-gradient(90deg,#0080ff,#00ffff);cursor:pointer;font-weight:700;border:none}
button.logout{background:rgba(255,68,68,.1);border:1px solid rgba(255,68,68,.4);max-width:500px;margin:40px auto}
button.view{background:rgba(0,255,255,.1);border:1px solid rgba(0,255,255,.4);padding:10px;margin-top:12px}
.status{display:inline-block;padding:6px 16px;border-radius:12px;font-size:13px;font-weight:700}
.on{background:rgba(0,255,136,.15);color:#00ff88;border:1px solid rgba(0,255,136,.4)}
.off{background:rgba(255,68,.15);color:#ff4444;border:1px solid rgba(255,68,68,.4)}
.val{font-size:32px;font-weight:700;margin:12px 0;text-align:center}
.hidden{display:none}
.label{opacity:.7;font-size:12px;text-transform:uppercase;text-align:center;letter-spacing:2px;margin-bottom:8px}
.cells{display:grid;grid-template-columns:repeat(auto-fill,minmax(85px,1fr));gap:10px;margin-top:16px}
.cell{background:rgba(0,0,0,.4);border:1px solid rgba(0,255,255,.2);border-radius:12px;padding:12px;text-align:center}
.cell-num{opacity:.5;font-size:10px}
.cell-val{font-weight:700;font-size:14px;margin-top:4px}
.modal{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.95);z-index:999;overflow-y:auto;padding:20px}
.modal.active{display:block}
.modal-content{max-width:1200px;margin:40px auto;background:#0a0a0f;border:1px solid rgba(0,255,255,.3);border-radius:20px;padding:30px}
.modal-close{float:right;background:rgba(255,68,68,.1);border:1px solid rgba(255,68,68,.4);color:#fff;padding:10px 20px;border-radius:8px;cursor:pointer}
</style>
</head>
<body>
<div id="login">
  <h1>SMART BMS</h1>
  <div class="card">
    <div class="label">Acesso Cliente</div>
    <input id="code" placeholder="SL82576655" maxlength="10">
    <button onclick="login()">Entrar</button>
    <p id="error" style="color:#ff4444;margin-top:12px;display:none"></p>
  </div>
</div>
<div id="painel" class="hidden">
  <h1>MINHA BMS</h1>
  <div class="card">
    <div id="bmsCode" style="font-size:24px;font-weight:700;margin-bottom:8px"></div>
    <div id="bmsStatus" class="status"></div>
    <div id="bmsSoc" class="val" style="color:#00ff88"></div>
    <div id="bmsInfo" style="font-size:16px;opacity:.8"></div>
    <div id="bmsUpdate" style="font-size:12px;opacity:.5;margin-top:8px"></div>
    <button class="view" onclick="viewCells()">Ver Células</button>
  </div>
  <button class="logout" onclick="logout()">Sair</button>
</div>
<div id="modal" class="modal">
  <div class="modal-content">
    <button class="modal-close" onclick="closeModal()">Fechar</button>
    <h2 id="modalTitle"></h2>
    <div id="modalCells" class="cells"></div>
  </div>
</div>
<script>
const API = '/api/bms';
let bmsCode = sessionStorage.getItem('bms_code');
let updateInterval = null;
let currentBms = null;
if(bmsCode) loadPainel();
document.getElementById('code').oninput = e => {
  if(!e.target.value.startsWith('SL')) e.target.value = 'SL';
  e.target.value = 'SL' + e.target.value.slice(2).replace(/[^0-9]/g,'').slice(0,8);
};
async function login(){
  const code = document.getElementById('code').value;
  const errorEl = document.getElementById('error');
  errorEl.style.display='none';
  if(code.length !== 10){
    errorEl.textContent = 'Código deve ter 10 caracteres';
    errorEl.style.display='block';
    return;
  }
  try{
    const r = await fetch(API+`?action=get&code=${code}`);
    const d = await r.json();
    if(d.ok){
      bmsCode = code;
      sessionStorage.setItem('bms_code', bmsCode);
      loadPainel();
    }else{
      errorEl.textContent = d.error || 'BMS não encontrada';
      errorEl.style.display='block';
    }
  }catch(e){
    errorEl.textContent = 'Erro de conexão';
    errorEl.style.display='block';
  }
}
function loadPainel(){
  document.getElementById('login').classList.add('hidden');
  document.getElementById('painel').classList.remove('hidden');
  updateData();
  updateInterval = setInterval(updateData, 5000);
}
function logout(){
  clearInterval(updateInterval);
  sessionStorage.removeItem('bms_code');
  location.reload();
}
async function updateData(){
  try{
    const r = await fetch(API+`?action=get&code=${bmsCode}`);
    const d = await r.json();
    if(!d.ok){logout();return;}
    currentBms = d.bms;
    document.getElementById('bmsCode').textContent = currentBms.code;
    document.getElementById('bmsStatus').className = `status ${currentBms.online?'on':'off'}`;
    document.getElementById('bmsStatus').textContent = currentBms.online?'Online':'Offline';
    document.getElementById('bmsSoc').textContent = `${currentBms.soc?.toFixed(0)||0}%`;
    document.getElementById('bmsInfo').textContent = `${currentBms.voltage?.toFixed(2)||0}V | ${currentBms.current?.toFixed(1)||0}A | ${currentBms.temp?.toFixed(1)||0}°C`;
    document.getElementById('bmsUpdate').textContent = currentBms.last_update?new Date(currentBms.last_update).toLocaleString('pt-BR'):'Nunca';
  }catch(e){console.error(e)}
}
function viewCells(){
  if(!currentBms ||!currentBms.cells) return;
  document.getElementById('modalTitle').textContent = `${currentBms.code} - ${currentBms.cells.length} Células`;
  document.getElementById('modalCells').innerHTML = currentBms.cells.map((v,i)=>{
    const val = parseFloat(v);
    let cls = '';
    if(val < 3.2 || val > 4.2) cls = 'style="border-color:#ff4444;background:rgba(255,68,68,.08)"';
    else if(val < 3.4 || val > 4.15) cls = 'style="border-color:#ffaa00;background:rgba(255,170,0,.08)"';
    return `<div class="cell" ${cls}><div class="cell-num">Célula ${i+1}</div><div class="cell-val">${val.toFixed(3)}V</div></div>`;
  }).join('');
  document.getElementById('modal').classList.add('active');
}
function closeModal(){
  document.getElementById('modal').classList.remove('active');
}
</script>
</body>
</html>
