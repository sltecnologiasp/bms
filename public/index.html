<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>SMART BMS</title>
<style>
body{background:#05070d;color:#fff;font-family:system-ui;padding:20px}
.card{background:rgba(255,255,255,.05);border:1px solid #00ffff;padding:20px;border-radius:12px;max-width:500px;margin:20px auto}
input,button{width:100%;padding:16px;margin:8px 0;border-radius:8px;border:1px solid #00ffff;background:#000;color:#fff;font-size:16px}
button{background:#00ffff;color:#000;font-weight:700}
#err{background:#ff0000;color:#fff;padding:12px;margin-top:12px;font-size:14px;white-space:pre-wrap;word-break:break-all;display:none}
#log{background:#000;border:1px solid #00ff00;padding:12px;margin-top:12px;font-size:12px;white-space:pre-wrap;word-break:break-all;max-height:200px;overflow-y:auto}
.error{color:#ff4444;margin-top:8px;text-align:center}
.success{color:#00ff88;margin-top:8px;text-align:center}
.hidden{display:none}
.title{font-size:32px;font-weight:900;text-align:center;margin-bottom:20px;color:#00ffff}
.bms-item{background:rgba(0,0,0,.4);border:1px solid #00ffff;padding:12px;margin:8px 0;border-radius:8px;cursor:pointer}
.header{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px}
</style>
</head>
<body>

<div id="login" class="card">
  <div class="title">SMART BMS</div>
  <input id="email" placeholder="E-mail" value="teste@teste.com">
  <input id="senha" type="password" placeholder="Senha" value="123456">
  <button onclick="login()">Entrar</button>
  <div class="link" onclick="showCad()" style="color:#00ffff;text-align:center;margin-top:12px;cursor:pointer">Cadastrar</div>
  <div id="msg"></div>
</div>

<div id="cadastro" class="card hidden">
  <div class="title">SMART BMS</div>
  <input id="cnome" placeholder="Nome">
  <input id="cemail" placeholder="E-mail">
  <input id="csenha" type="password" placeholder="Senha">
  <input id="csenha2" type="password" placeholder="Confirmar Senha">
  <button onclick="cadastrar()">Criar Conta</button>
  <div class="link" onclick="showLogin()" style="color:#00ffff;text-align:center;margin-top:12px;cursor:pointer">Voltar</div>
  <div id="cmsg"></div>
</div>

<div id="painel" class="card hidden">
  <div class="header">
    <div>Olá, <span id="nome"></span></div>
    <button onclick="sair()" style="width:auto;padding:8px 16px;background:#ff4444">Sair</button>
  </div>
  <div style="font-size:11px;opacity:.6;margin-bottom:8px">ADICIONAR BMS</div>
  <input id="code" placeholder="SL82576655" maxlength="10">
  <input id="bnome" placeholder="Nome da BMS">
  <button onclick="add()">Adicionar</button>
  <div id="amsg"></div>
  <div style="font-size:11px;opacity:.6;margin:20px 0 8px">MINHAS BMS</div>
  <div id="lista"></div>
</div>

<div id="dash" class="card hidden">
  <button onclick="voltar()" style="background:rgba(0,255,255,.1);border:1px solid #00ffff;color:#fff">← Voltar</button>
  <div class="title" style="font-size:24px" id="bname">BMS</div>
  <div style="text-align:center;font-size:48px;font-weight:900;color:#00ff88" id="soc">0%</div>
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:20px">
    <div style="background:rgba(0,0,0,.4);padding:12px;border-radius:8px;text-align:center">
      <div style="font-size:10px;opacity:.6">TENSÃO</div>
      <div style="font-size:24px;font-weight:700;color:#00ffff" id="v">0V</div>
    </div>
    <div style="background:rgba(0,0,0,.4);padding:12px;border-radius:8px;text-align:center">
      <div style="font-size:10px;opacity:.6">CORRENTE</div>
      <div style="font-size:24px;font-weight:700;color:#ffaa00" id="c">0A</div>
    </div>
  </div>
</div>

<div id="err"></div>
<div id="log">Console:</div>

<script>
// MOSTRA ERRO NA TELA
window.onerror = function(msg, url, line, col, error) {
  const e = document.getElementById('err');
  e.style.display = 'block';
  e.textContent = 'ERRO JS: ' + msg + '\nLinha: ' + line + '\n' + (error ? error.stack : '');
  return false;
};

function log(t){
  const l = document.getElementById('log');
  l.textContent += '\n' + (typeof t === 'string' ? t : JSON.stringify(t));
  l.scrollTop = l.scrollHeight;
}

const API = '/api/bms';
let token = localStorage.getItem('bms_token');
let bmsAtual = null;
let loop = null;

log('JS Carregado. Token: ' + (token ? 'SIM' : 'NÃO'));

if(token) checkToken();

async function checkToken(){
  log('Checando token...');
  try{
    const r = await fetch(API+'?action=user_bms', {headers:{'Authorization':'Bearer '+token}});
    log('Check status: ' + r.status);
    if(r.ok){
      const u = JSON.parse(localStorage.getItem('bms_user')||'{}');
      showPainel(u.nome);
    } else {
      sair();
    }
  }catch(e){
    log('Erro check: ' + e.message);
    sair();
  }
}

function showLogin(){
  document.getElementById('cadastro').classList.add('hidden');
  document.getElementById('painel').classList.add('hidden');
  document.getElementById('dash').classList.add('hidden');
  document.getElementById('login').classList.remove('hidden');
}

function showCad(){
  document.getElementById('login').classList.add('hidden');
  document.getElementById('cadastro').classList.remove('hidden');
}

async function cadastrar(){
  const nome = document.getElementById('cnome').value;
  const email = document.getElementById('cemail').value;
  const senha = document.getElementById('csenha').value;
  const senha2 = document.getElementById('csenha2').value;
  const m = document.getElementById('cmsg');
  
  if(!nome||!email||!senha){m.innerHTML='<div class="error">Preencha tudo</div>';return}
  if(senha!==senha2){m.innerHTML='<div class="error">Senhas diferentes</div>';return}
  if(senha.length<6){m.innerHTML='<div class="error">Senha min 6 chars</div>';return}
  
  log('Cadastrando: ' + email);
  try{
    const r = await fetch(API+'?action=register',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({nome,email,senha})});
    const d = await r.json();
    log('Resposta cad: ' + JSON.stringify(d));
    if(d.ok){
      m.innerHTML='<div class="success">Conta criada!</div>';
      setTimeout(()=>{showLogin();m.innerHTML=''},1500);
    } else {
      m.innerHTML='<div class="error">'+(d.error||'Erro')+'</div>';
    }
  }catch(e){
    log('Erro cad: ' + e.message);
    m.innerHTML='<div class="error">Erro: '+e.message+'</div>';
  }
}

async function login(){
  const email = document.getElementById('email').value;
  const senha = document.getElementById('senha').value;
  const m = document.getElementById('msg');
  m.innerHTML = '';
  
  log('Tentando login: ' + email);
  
  try{
    const r = await fetch(API+'?action=login_user',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({email,senha})
    });
    log('Login status: ' + r.status);
    const d = await r.json();
    log('Resposta login: ' + JSON.stringify(d));
    
    if(d.ok){
      token = d.token;
      localStorage.setItem('bms_token', token);
      localStorage.setItem('bms_user', JSON.stringify({nome:d.nome,email:d.email}));
      m.innerHTML='<div class="success">Logado!</div>';
      setTimeout(()=>showPainel(d.nome),500);
    } else {
      m.innerHTML='<div class="error">'+(d.error||'Erro')+'</div>';
    }
  }catch(e){
    log('ERRO LOGIN: ' + e.message);
    m.innerHTML='<div class="error">Erro: '+e.message+'</div>';
  }
}

function showPainel(nome){
  document.getElementById('login').classList.add('hidden');
  document.getElementById('cadastro').classList.add('hidden');
  document.getElementById('dash').classList.add('hidden');
  document.getElementById('painel').classList.remove('hidden');
  document.getElementById('nome').textContent = nome||'';
  loadLista();
}

document.getElementById('code').oninput = e => {
  if(!e.target.value.startsWith('SL')) e.target.value='SL';
  e.target.value='SL'+e.target.value.slice(2).replace(/[^0-9]/g,'').slice(0,8);
};

async function add(){
  const code = document.getElementById('code').value;
  const nome = document.getElementById('bnome').value;
  const m = document.getElementById('amsg');
  if(!code||code.length!==10){m.innerHTML='<div class="error">Código inválido</div>';return}
  if(!nome){m.innerHTML='<div class="error">Dê um nome</div>';return}
  
  log('Add BMS: ' + code);
  try{
    const r = await fetch(API+'?action=add_bms',{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+token},body:JSON.stringify({code,nome})});
    const d = await r.json();
    log('Resposta add: ' + JSON.stringify(d));
    if(d.ok){
      m.innerHTML='<div class="success">Adicionada!</div>';
      document.getElementById('code').value='';
      document.getElementById('bnome').value='';
      setTimeout(()=>m.innerHTML='',2000);
      loadLista();
    } else {
      m.innerHTML='<div class="error">'+(d.error||'Erro')+'</div>';
    }
  }catch(e){
    log('Erro add: ' + e.message);
    m.innerHTML='<div class="error">Erro: '+e.message+'</div>';
  }
}

async function loadLista(){
  log('Carregando lista BMS...');
  try{
    const r = await fetch(API+'?action=user_bms',{headers:{'Authorization':'Bearer '+token}});
    log('Lista status: ' + r.status);
    if(r.status===401){sair();return}
    const d = await r.json();
    log('Lista: ' + d.length + ' BMS');
    const l = document.getElementById('lista');
    if(d.length===0){l.innerHTML='<div style="opacity:.4;text-align:center;padding:20px">Nenhuma BMS</div>';return}
    l.innerHTML = d.map(b=>{
      const on = b.online&&(Date.now()-new Date(b.updated_at).getTime()<10000);
      return `<div class="bms-item" onclick="ver('${b.code}','${b.nome}')">
        <div style="font-weight:700">${b.nome}</div>
        <div style="opacity:.6;font-size:12px;font-family:monospace">${b.code}</div>
        <div style="color:${on?'#00ff88':'#ff4444'}">${on?'Online':'Offline'}</div>
      </div>`;
    }).join('');
  }catch(e){
    log('Erro lista: ' + e.message);
  }
}

function ver(code,nome){
  bmsAtual = {code,nome};
  document.getElementById('painel').classList.add('hidden');
  document.getElementById('dash').classList.remove('hidden');
  document.getElementById('bname').textContent = nome;
  atualizar();
  clearInterval(loop);
  loop = setInterval(atualizar,5000);
}

function voltar(){
  clearInterval(loop);
  bmsAtual = null;
  document.getElementById('dash').classList.add('hidden');
  document.getElementById('painel').classList.remove('hidden');
  loadLista();
}

async function atualizar(){
  if(!bmsAtual) return;
  log('Atualizando ' + bmsAtual.code);
  try{
    const r = await fetch(API+'?action=data&code='+bmsAtual.code,{headers:{'Authorization':'Bearer '+token}});
    if(r.status===401){sair();return}
    const d = await r.json();
    log('Dados: SOC='+d.soc);
    document.getElementById('soc').textContent=(d.soc?.toFixed(0)||0)+'%';
    document.getElementById('v').textContent=(d.voltage?.toFixed(2)||0)+'V';
    document.getElementById('c').textContent=(d.current?.toFixed(1)||0)+'A';
  }catch(e){
    log('Erro update: ' + e.message);
  }
}

function sair(){
  clearInterval(loop);
  localStorage.removeItem('bms_token');
  localStorage.removeItem('bms_user');
  token=null;
  location.reload();
}
</script>
</body>
</html>
