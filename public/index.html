<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>SMART BMS</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#05070d;--cyan:#00ffff;--blue:#0080ff;--green:#00ff88;--red:#ff4444;--orange:#ffaa00}
body{font-family:'Inter',sans-serif;background:var(--bg);color:#fff;overflow-x:hidden;min-height:100vh;position:relative}
body::before{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,rgba(255,255,255,.03) 0 1px,transparent 1px 40px),repeating-linear-gradient(90deg,rgba(255,255,255,.03) 0 1px,transparent 1px 40px);opacity:.4;pointer-events:none;z-index:0}
#login,#dash,#lista{position:relative;z-index:1;width:100%;min-height:100vh;display:flex;flex-direction:column;justify-content:center;align-items:center;padding:12px}
.title{font-size:clamp(42px,8vw,74px);font-weight:900;margin-bottom:16px;padding-top:10px;letter-spacing:3px;background:linear-gradient(90deg,var(--cyan),var(--blue));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.card{background:rgba(10,15,25,.92);border:1px solid rgba(0,255,255,.12);border-radius:16px;padding:16px;width:100%;position:relative;box-shadow:0 4px 20px rgba(0,0,0,.4)}
#login .card,#cadastro .card{max-width:520px}
#lista .card,#dash .card{max-width:1450px}
#dash{max-width:1450px;margin:auto;padding-top:8px}
.gauge-wrap{width:100%;max-width:1200px;margin:12px auto}
.gauge-card{padding:30px 30px 40px;min-height:340px}
.gauge{width:240px;height:240px;margin:auto;border-radius:50%;background:conic-gradient(#00ff88 0deg,#00ffff 180deg,rgba(255,255,255,.08) 180deg);position:relative;box-shadow:0 0 30px rgba(0,255,255,.15)}
.gauge::before{content:'';position:absolute;inset:18px;border-radius:50%;background:#05070d}
.gauge-inner{position:absolute;inset:0;display:flex;flex-direction:column;justify-content:center;align-items:center;z-index:2}
.gauge-value{font-size:58px;font-weight:900;color:#00ff88;width:3ch;text-align:center;font-variant-numeric:tabular-nums}
.gauge-label{opacity:.6;letter-spacing:2px;font-size:12px}
.bar-wrap{margin-top:20px}
.bar-label{display:flex;justify-content:space-between;margin-bottom:8px;font-size:14px;opacity:.7}
.bar{height:16px;background:rgba(255,255,255,.06);border-radius:999px;overflow:hidden}
.bar-fill{height:100%;width:0%;border-radius:999px;background:linear-gradient(90deg,#00ff88,#00ffff);transition:width.8s ease}
.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;width:100%;max-width:1300px;margin:12px auto}
.grid .card{width:100%;height:120px;min-width:0;display:flex;flex-direction:column;justify-content:center;align-items:center;padding:14px}
.label{font-size:10px;letter-spacing:1.5px;opacity:.6;text-transform:uppercase}
.value{font-size:30px;font-weight:800;margin-top:8px;line-height:1;width:7ch;text-align:center;font-variant-numeric:tabular-nums}
input,button{width:100%;max-width:500px;padding:18px;border-radius:18px;border:none;outline:none;margin-top:16px;font-size:18px;transition:.2s}
input{background:rgba(0,0,0,.5);color:#fff;font-family:monospace;letter-spacing:2px;border:1px solid rgba(0,255,255,.2)}
input:focus{border-color:var(--cyan);box-shadow:0 0 15px rgba(0,255,255,.2)}
button{background:linear-gradient(90deg,var(--blue),var(--cyan));color:#fff;font-weight:700;cursor:pointer;box-shadow:0 4px 20px rgba(0,255,255,.25)}
button:active{transform:translateY(0)}
.btn-sec{background:transparent;border:1px solid rgba(0,255,255,.3);color:var(--cyan)}
.status{display:inline-flex;align-items:center;gap:10px;padding:14px 26px;border-radius:999px;font-weight:700;margin-top:14px}
.on{background:rgba(0,255,136,.12);color:var(--green);border:1px solid rgba(0,255,136,.3)}
.off{background:rgba(255,68,68,.12);color:var(--red);border:1px solid rgba(255,68,68,.3)}
.diff{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-top:18px}
.diff-item{padding:12px 8px;border-radius:14px;background:rgba(255,255,255,.03);text-align:center}
.diff-item span{display:block;margin-top:6px;font-size:22px;font-weight:800;width:6ch;margin:auto;text-align:center;font-variant-numeric:tabular-nums}
.cells{display:grid;grid-template-columns:repeat(auto-fill,minmax(95px,1fr));gap:10px;margin-top:20px}
.cell{background:rgba(0,0,0,.4);border-radius:18px;padding:14px;transition:.2s;border:1px solid rgba(255,255,255,.05)}
.cell-num{font-size:11px;opacity:.5;margin-bottom:6px}
.cell-val{font-size:20px;font-weight:700;width:7ch;text-align:center;font-variant-numeric:tabular-nums}
.cell.ok{border-color:rgba(0,255,136,.25)}
.cell.warn{border-color:rgba(255,170,0,.25)}
.cell.crit{border-color:rgba(255,68,68,.25)}
.chart-card{width:100%;max-width:1200px;margin:12px auto;padding:24px;min-height:380px}
.chart-title{margin-bottom:16px;font-size:14px;letter-spacing:2px;opacity:.7;text-transform:uppercase}
canvas{width:100%!important;height:320px!important}
.logout{margin-top:24px;background:rgba(255,68,68,.08);border:1px solid rgba(255,68,68,.2)}
.hidden{display:none!important}
.bms-list{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px;margin-top:20px}
.bms-item{background:rgba(0,255,255,.05);border:1px solid rgba(0,255,255,.2);border-radius:16px;padding:20px;cursor:pointer;transition:.2s}
.bms-item:active{border-color:var(--cyan);transform:scale(0.98)}
.bms-item h3{color:var(--cyan);font-size:20px;margin-bottom:8px}
.bms-item p{color:#888;font-size:13px;margin:4px 0}
.header-bar{width:100%;max-width:1450px;display:flex;justify-content:space-between;align-items:center;margin-bottom:20px}
.user-info{color:#888;font-size:14px}
#error-box{background:rgba(255,0,0,.1);border:2px solid #ff4444;border-radius:12px;padding:16px;margin-top:16px;color:#ff4444;font-size:14px;word-break:break-word}
#debug{background:#000;border:1px solid #0f0;border-radius:8px;padding:12px;margin-top:12px;font-size:11px;color:#0f0;white-space:pre-wrap;word-break:break-all;max-height:200px;overflow-y:auto}
@media(max-width:520px){.title{font-size:38px}.value{font-size:22px}.gauge{width:180px;height:180px}.gauge-value{font-size:44px}.gauge-card{min-height:280px;padding:20px 20px 30px}.grid .card{padding:8px;height:100px}.label{font-size:8px}.diff-item span{font-size:18px}}
</style>
</head>

<body>
<div id="login">
<div class="title">SMART BMS</div>
<div class="card">
<div class="label">E-mail</div>
<input id="email" type="email" placeholder="seu@email.com">
<div class="label" style="margin-top:16px">Senha</div>
<input id="senha" type="password" placeholder="******">
<button onclick="login()">Entrar</button>
<button class="btn-sec" onclick="showCadastro()">Criar Conta</button>
<div id="error-box" class="hidden"></div>
<div id="debug"></div>
</div>
</div>

<div id="cadastro" class="hidden">
<div class="title">SMART BMS</div>
<div class="card">
<div class="label">Nome Completo</div>
<input id="cad-nome" placeholder="Seu nome">
<div class="label" style="margin-top:16px">E-mail</div>
<input id="cad-email" type="email" placeholder="seu@email.com">
<div class="label" style="margin-top:16px">Senha</div>
<input id="cad-senha" type="password" placeholder="******">
<button onclick="cadastrar()">Cadastrar</button>
<button class="btn-sec" onclick="showLogin()">Voltar</button>
<div id="error-cad" class="hidden" style="background:rgba(255,0,0,.1);border:2px solid #ff4444;border-radius:12px;padding:16px;margin-top:16px;color:#ff4444;font-size:14px"></div>
</div>
</div>

<div id="lista" class="hidden">
<div class="header-bar">
  <div class="title" style="font-size:32px;margin:0">SMART BMS</div>
  <div class="user-info">Olá, <span id="user-name">--</span></div>
</div>
<div class="card" style="max-width:1450px">
  <div class="label">Adicionar BMS</div>
  <input id="bms-code" placeholder="SL00000000" maxlength="10" style="margin-top:8px">
  <input id="bms-nome" placeholder="Nome da BMS (opcional)" style="margin-top:12px">
  <button onclick="addBms()">Adicionar BMS</button>
</div>
<div class="card" style="max-width:1450px;margin-top:16px">
  <div class="label">Minhas BMS</div>
  <div id="bms-list" class="bms-list"></div>
</div>
<button class="logout" onclick="logout()">Sair</button>
</div>

<div id="dash" class="hidden">
<div class="header-bar">
  <div class="title" style="font-size:32px;margin:0" id="bms-title">--</div>
  <button class="btn-sec" onclick="voltarLista()" style="max-width:150px;margin:0">← Voltar</button>
</div>
<div class="gauge-wrap">
<div class="card gauge-card">
<div class="gauge" id="socGauge">
<div class="gauge-inner">
<div class="gauge-value" id="socGaugeValue">0%</div>
<div class="gauge-label">STATE OF CHARGE</div>
</div>
</div>
<div class="bar-wrap">
<div class="bar-label">
<span>Bateria</span>
<span id="socBarText">0%</span>
</div>
<div class="bar"><div class="bar-fill" id="socBar"></div></div>
</div>
</div>
</div>
<div class="card" style="max-width:1200px;margin:12px auto">
<div class="label">Status</div>
<div style="margin-top:12px">
<span id="connStatus" class="status off">Offline</span>
</div>
</div>
<div class="grid">
<div class="card">
<div class="label">SOC</div>
<div class="value" id="soc" style="color:#00ff88">0%</div>
</div>
<div class="card">
<div class="label">Tensão</div>
<div class="value" id="voltage" style="color:#00ffff">0V</div>
</div>
<div class="card">
<div class="label">Corrente</div>
<div class="value" id="current" style="color:#ffaa00">0A</div>
</div>
<div class="card">
<div class="label">Temperatura</div>
<div class="value" id="temp" style="color:#ff4444">0°C</div>
</div>
</div>
<div class="card chart-card">
<div class="chart-title">Realtime Monitor</div>
<canvas id="mainChart"></canvas>
</div>
<div class="card" style="max-width:1200px;margin:12px auto">
<div class="label">Células - Tensão Individual</div>
<div class="diff">
<div class="diff-item">Min<div><span id="cellMin" style="color:#00ff88">0.00V</span></div></div>
<div class="diff-item">Max<div><span id="cellMax" style="color:#ffaa00">0.00V</span></div></div>
<div class="diff-item">Diferença<div><span id="cellDiff" style="color:#ff4444">0.00V</span></div></div>
<div class="diff-item">Total<div><span id="cellCount" style="color:#00ffff">0</span></div></div>
</div>
<div id="cells" class="cells"></div>
</div>
</div>

<script>
const API = '/api/bms';
let interval;
let chart;
let currentCode = null;
let token = localStorage.getItem('bms_token');
let userData = JSON.parse(localStorage.getItem('bms_user')||'null');

function log(msg){
  const d = document.getElementById('debug');
  if(d) {
    d.textContent += msg + '\n';
    d.scrollTop = d.scrollHeight;
  }
}

function showError(msg){
  const e = document.getElementById('error-box');
  e.textContent = msg;
  e.classList.remove('hidden');
}

if(token && userData){
  log('Token encontrado, carregando lista...');
  showLista();
}

document.getElementById('bms-code').oninput = e => {
  if(!e.target.value.startsWith('SL')) e.target.value = 'SL';
  e.target.value = 'SL' + e.target.value.slice(2).replace(/[^0-9]/g,'').slice(0,8);
};

function showLogin(){
  document.getElementById('cadastro').classList.add('hidden');
  document.getElementById('login').classList.remove('hidden');
}

function showCadastro(){
  document.getElementById('login').classList.add('hidden');
  document.getElementById('cadastro').classList.remove('hidden');
}

async function login(){
  const email = document.getElementById('email').value.trim();
  const senha = document.getElementById('senha').value;
  document.getElementById('error-box').classList.add('hidden');

  log('Tentando login: ' + email);

  if(!email ||!senha){
    showError('Preenche e-mail e senha');
    return;
  }

  try{
    log('Chamando API: ' + API + '?action=login_user');
    const r = await fetch(API + '?action=login_user', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({email, senha})
    });
    log('Status: ' + r.status);
    const d = await r.json();
    log('Resposta: ' + JSON.stringify(d));
    
    if(d.ok && d.token){
      token = d.token;
      userData = {nome: d.nome, email: d.email};
      localStorage.setItem('bms_token', token);
      localStorage.setItem('bms_user', JSON.stringify(userData));
      log('Login OK, abrindo lista...');
      showLista();
    }else{
      showError(d.error || 'Erro ao fazer login');
    }
  }catch(e){
    log('ERRO: ' + e.message);
    showError('Erro de conexão: ' + e.message);
  }
}

async function cadastrar(){
  const nome = document.getElementById('cad-nome').value.trim();
  const email = document.getElementById('cad-email').value.trim();
  const senha = document.getElementById('cad-senha').value;
  const e = document.getElementById('error-cad');
  e.classList.add('hidden');

  if(!nome ||!email ||!senha){
    e.textContent = 'Preenche todos os campos';
    e.classList.remove('hidden');
    return;
  }

  try{
    const r = await fetch(API + '?action=register', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({nome, email, senha})
    });
    const d = await r.json();
    if(d.ok){
      alert('Conta criada! Faz login agora');
      showLogin();
      document.getElementById('email').value = email;
      document.getElementById('senha').value = senha;
    }else{
      e.textContent = 'Erro: ' + d.error;
      e.classList.remove('hidden');
    }
  }catch(e2){
    e.textContent = 'Erro: ' + e2.message;
    e.classList.remove('hidden');
  }
}

async function showLista(){
  document.getElementById('login').classList.add('hidden');
  document.getElementById('cadastro').classList.add('hidden');
  document.getElementById('dash').classList.add('hidden');
  document.getElementById('lista').classList.remove('hidden');
  document.getElementById('user-name').textContent = userData?.nome || 'Usuário';
  await carregarLista();
}

async function carregarLista(){
  try{
    const r = await fetch(API + '?action=user_bms', {
      headers:{'Authorization':'Bearer '+token}
    });
    if(r.status===401){ logout(); return; }
    const lista = await r.json();
    const el = document.getElementById('bms-list');
    if(!lista.length){
      el.innerHTML = '<p style="grid-column:1/-1;text-align:center;color:#666;padding:40px">Nenhuma BMS adicionada ainda</p>';
      return;
    }
    el.innerHTML = lista.map(b => `
      <div class="bms-item" onclick="abrirDash('${b.code}')">
        <h3>${b.nome}</h3>
        <p>Código: ${b.code}</p>
        <p style="margin-top:8px">
          <span class="status ${b.online?'on':'off'}" style="padding:6px 12px;font-size:12px">
            ${b.online?'Online':'Offline'}
          </span>
        </p>
        ${b.voltage?`<p style="margin-top:8px;color:#00ffff">${b.voltage.toFixed(1)}V</p>`:''}
      </div>
    `).join('');
  }catch(e){
    console.error(e);
  }
}

async function addBms(){
  const code = document.getElementById('bms-code').value.trim();
  const nome = document.getElementById('bms-nome').value.trim();
  if(!code || code.length!== 10){
    alert('Código inválido. Use SL + 8 números');
    return;
  }
  try{
    const r = await fetch(API + '?action=add_bms', {
      method:'POST',
      headers:{'Content-Type':'application/json','Authorization':'Bearer '+token},
      body:JSON.stringify({code, nome: nome || code})
    });
    const d = await r.json();
    if(d.ok){
      alert('BMS adicionada!');
      document.getElementById('bms-code').value = '';
      document.getElementById('bms-nome').value = '';
      carregarLista();
    }else{
      alert('Erro: ' + d.error);
    }
  }catch(e){
    alert('Erro: ' + e.message);
  }
}

function abrirDash(code){
  currentCode = code;
  document.getElementById('lista').classList.add('hidden');
  document.getElementById('dash').classList.remove('hidden');
  document.getElementById('bms-title').textContent = code;
  initChart();
  update();
  interval = setInterval(update, 3000);
}

function voltarLista(){
  clearInterval(interval);
  document.getElementById('dash').classList.add('hidden');
  showLista();
}

function renderCells(cells){
  if(!cells || cells.length === 0){
    document.getElementById('cells').innerHTML = '<div style="grid-column:1/-1;opacity:.4;padding:20px">Sem dados das células</div>';
    return;
  }
  const vals = cells.map(c => parseFloat(c)).filter(v => v > 0);
  if(vals.length === 0) return;
  const min = Math.min(...vals);
  const max = Math.max(...vals);
  const diff = max - min;
  document.getElementById('cellMin').textContent = min.toFixed(3)+'V';
  document.getElementById('cellMax').textContent = max.toFixed(3)+'V';
  document.getElementById('cellDiff').textContent = diff.toFixed(3)+'V';
  document.getElementById('cellCount').textContent = cells.length;
  document.getElementById('cells').innerHTML = cells.map((v,i)=>{
    const val = parseFloat(v);
    let cls = 'ok';
    if(val < 3.2 || val > 4.2) cls = 'crit';
    else if(val < 3.4 || val > 4.15) cls = 'warn';
    return `<div class="cell ${cls}"><div class="cell-num">C${i+1}</div><div class="cell-val">${val.toFixed(3)}</div></div>`;
  }).join('');
}

const voltageHistory = [];
const currentHistory = [];
const labelsHistory = [];

function initChart(){
  if(chart) chart.destroy();
  const ctx = document.getElementById('mainChart').getContext('2d');
  chart = new Chart(ctx, {
    type:'line',
    data:{
      labels:labelsHistory,
      datasets:[
        {label:'Tensão',data:voltageHistory,borderColor:'#00ffff',backgroundColor:'rgba(0,255,255,.08)',tension:.4,fill:true,borderWidth:2},
        {label:'Corrente',data:currentHistory,borderColor:'#ffaa00',backgroundColor:'rgba(255,170,0,.08)',tension:.4,fill:true,borderWidth:2}
      ]
    },
    options:{
      responsive:true,maintainAspectRatio:false,animation:false,elements:{point:{radius:0}},
      plugins:{legend:{labels:{color:'#ffffff'}}},
      scales:{
        x:{ticks:{color:'#aaa'},grid:{color:'rgba(255,255,255,.05)'}},
        y:{ticks:{color:'#aaa'},grid:{color:'rgba(255,255,255,.05)'}}
      }
    }
  });
}

function updateGauge(soc){
  const gauge = document.getElementById('socGauge');
  const value = document.getElementById('socGaugeValue');
  const bar = document.getElementById('socBar');
  const text = document.getElementById('socBarText');
  const deg = soc * 3.6;
  value.textContent = soc + '%';
  text.textContent = soc + '%';
  bar.style.width = soc + '%';
  gauge.style.background = `conic-gradient(#00ff88 0deg,#00ffff ${deg}deg,rgba(255,255,255,.08) ${deg}deg)`;
}

async function update(){
  if(!currentCode) return;
  try{
    const r = await fetch(`${API}?action=data&code=${currentCode}`, {
      headers:{'Authorization':'Bearer '+token}
    });
    if(r.status===401){ logout(); return; }
    if(!r.ok) return;
    const d = await r.json();
    document.getElementById('soc').textContent = (d.soc?.toFixed(0)||0)+'%';
    document.getElementById('voltage').textContent = (d.voltage?.toFixed(2)||0)+'V';
    document.getElementById('current').textContent = (d.current?.toFixed(1)||0)+'A';
    document.getElementById('temp').textContent = (d.temp?.toFixed(1)||0)+'°C';
    const connEl = document.getElementById('connStatus');
    connEl.textContent = d.online?'Online':'Offline';
    connEl.className = 'status ' + (d.online?'on':'off');
    renderCells(d.cells);
    updateGauge(parseInt(d.soc || 0));
    const now = new Date().toLocaleTimeString('pt-BR', {hour:'2-digit', minute:'2-digit', second:'2-digit'});
    labelsHistory.push(now);
    voltageHistory.push(d.voltage || 0);
    currentHistory.push(d.current || 0);
    if(labelsHistory.length > 15){
      labelsHistory.shift();
      voltageHistory.shift();
      currentHistory.shift();
    }
    if(chart) chart.update('none');
  }
