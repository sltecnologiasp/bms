<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>SMART BMS - Teste</title>
<style>
body{background:#05070d;color:#fff;font-family:system-ui;padding:20px;text-align:center}
h1{color:#00ffff;font-size:32px;margin-bottom:20px}
.card{background:rgba(255,255,255,.05);border:1px solid #00ffff;padding:20px;border-radius:12px;max-width:500px;margin:20px auto}
input,button{width:100%;padding:16px;margin:8px 0;border-radius:8px;border:1px solid #00ffff;background:#000;color:#fff;font-size:16px}
button{background:#00ffff;color:#000;font-weight:700;cursor:pointer}
#debug{background:#000;border:1px solid #00ff00;padding:12px;margin-top:20px;font-size:12px;text-align:left;white-space:pre-wrap;word-break:break-all}
.hidden{display:none}
</style>
</head>
<body>
<h1>SMART BMS</h1>

<div id="login" class="card">
  <h2>Login</h2>
  <input id="email" placeholder="E-mail" value="teste@teste.com">
  <input id="senha" type="password" placeholder="Senha" value="123456">
  <button onclick="login()">Entrar</button>
  <button onclick="cadastrar()" style="background:#000;color:#00ffff;margin-top:8px">Criar Conta</button>
</div>

<div id="painel" class="card hidden">
  <h2 id="bemvindo"></h2>
  <button onclick="logout()" style="background:#ff4444">Sair</button>
  <h3 style="margin-top:20px">Minhas BMS</h3>
  <div id="lista"></div>
</div>

<div id="debug">Console: Iniciando...</div>

<script>
const API = '/api/bms';
let token = localStorage.getItem('token');

function log(t){
  document.getElementById('debug').textContent += '\n' + t;
}

log('JS carregado');
if(token){ log('Token encontrado'); showPainel(); }

async function cadastrar(){
  const nome = prompt('Nome:');
  const email = prompt('E-mail:');
  const senha = prompt('Senha:');
  if(!nome||!email||!senha)return;
  log('Cadastrando: ' + email);
  const r = await fetch(API+'?action=register',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({nome,email,senha})});
  const d = await r.json();
  log('Cadastro: ' + JSON.stringify(d));
  alert(d.ok ? 'Criado! Faz login' : d.error);
}

async function login(){
  const email = document.getElementById('email').value;
  const senha = document.getElementById('senha').value;
  log('Login: ' + email);
  const r = await fetch(API+'?action=login_user',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email,senha})});
  log('Status: ' + r.status);
  const d = await r.json();
  log('Resposta: ' + JSON.stringify(d));
  if(d.ok){
    token = d.token;
    localStorage.setItem('token', token);
    showPainel();
  }else{
    alert('Erro: ' + d.error);
  }
}

function showPainel(){
  document.getElementById('login').classList.add('hidden');
  document.getElementById('painel').classList.remove('hidden');
  log('Mostrando painel');
  listar();
}

async function listar(){
  log('Listando BMS...');
  const r = await fetch(API+'?action=user_bms',{headers:{'Authorization':'Bearer '+token}});
  log('Status lista: ' + r.status);
  const d = await r.json();
  log('BMS: ' + JSON.stringify(d));
  document.getElementById('lista').innerHTML = d.length ? d.map(b=>`<div style="padding:12px;border:1px solid #00ffff;margin:8px 0;border-radius:8px">${b.code} - ${b.nome}</div>`).join('') : 'Nenhuma BMS';
}

function logout(){
  localStorage.removeItem('token');
  location.reload();
}
</script>
</body>
</html>
