<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>SMART BMS</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box}

:root{
--bg:#05070d;
--cyan:#00ffff;
--blue:#0080ff;
--green:#00ff88;
--red:#ff4444;
--orange:#ffaa00
}

body{
font-family:'Inter',sans-serif;
background:var(--bg);
color:#fff;
min-height:100vh;
width:100%;
overflow-x:hidden
}

#login,#dash,#lista,#cadastro{
position:relative;
z-index:1;
width:100%;
min-height:100vh;
display:flex;
flex-direction:column;
align-items:center;
padding:8px
}

#dash,#lista{
justify-content:flex-start;
padding-top:12px
}

#login,#cadastro{
justify-content:center
}

.title{
font-size:clamp(32px,8vw,74px);
font-weight:900;
margin-bottom:16px;
letter-spacing:3px;
background:linear-gradient(90deg,var(--cyan),var(--blue));
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
text-align:center;
width:100%
}

.card{
background:rgba(10,15,25,.92);
border:1px solid rgba(0,255,255,.12);
border-radius:16px;
padding:12px;
width:100%;
margin-bottom:4px
}

#login.card,#cadastro.card{
max-width:520px
}

.gauge-wrap{
width:100%;
margin:0 0 4px 0
}

.gauge-card{
padding:20px 20px 30px;
min-height:280px
}

.gauge{
width:min(240px,60vw);
height:min(240px,60vw);
margin:auto;
border-radius:50%;
background:conic-gradient(#00ff88 0deg,#00ffff 180deg,rgba(255,255,255,.08) 180deg);
position:relative;
box-shadow:0 0 30px rgba(0,255,255,.15)
}

.gauge::before{
content:'';
position:absolute;
inset:18px;
border-radius:50%;
background:#05070d
}

.gauge-inner{
position:absolute;
inset:0;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
z-index:2
}

.gauge-value{
font-size:clamp(36px,10vw,58px);
font-weight:900;
color:#00ff88;
width:3ch;
text-align:center;
font-variant-numeric:tabular-nums
}

.gauge-label{
opacity:.6;
letter-spacing:2px;
font-size:12px
}

.bar-wrap{
margin-top:20px
}

.bar-label{
display:flex;
justify-content:space-between;
margin-bottom:8px;
font-size:14px;
opacity:.7
}

.bar{
height:16px;
background:rgba(255,255,255,.06);
border-radius:999px;
overflow:hidden
}

.bar-fill{
height:100%;
width:0%;
border-radius:999px;
background:linear-gradient(90deg,#00ff88,#00ffff);
transition:width.8s ease
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(140px,1fr));
gap:4px;
width:100%;
margin:0 0 4px 0
}

.grid.card{
width:100%;
height:110px;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
padding:12px;
margin:0
}

.label{
font-size:10px;
letter-spacing:1.5px;
opacity:.6;
text-transform:uppercase;
text-align:center
}

.value{
font-size:clamp(22px,6vw,30px);
font-weight:800;
margin-top:8px;
line-height:1;
width:100%;
text-align:center;
font-variant-numeric:tabular-nums
}

input,button{
width:100%;
padding:18px;
border-radius:18px;
border:none;
outline:none;
margin-top:16px;
font-size:18px
}

input{
background:rgba(0,0,0,.5);
color:#fff;
font-family:monospace;
letter-spacing:2px;
border:1px solid rgba(0,255,255,.2)
}

input::placeholder{
color:rgba(255,255,255,.3)
}

button{
background:linear-gradient(90deg,var(--blue),var(--cyan));
color:#fff;
font-weight:700;
cursor:pointer
}

.btn-sec{
background:transparent;
border:1px solid rgba(0,255,255,.3);
color:var(--cyan)
}

.status{
display:inline-flex;
align-items:center;
gap:10px;
padding:14px 26px;
border-radius:999px;
font-weight:700
}

.on{
background:rgba(0,255,136,.12);
color:var(--green);
border:1px solid rgba(0,255,136,.3)
}

.off{
background:rgba(255,68,68,.12);
color:var(--red);
border:1px solid rgba(255,68,68,.3)
}

.status-wrap{
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
margin-top:14px
}

.bms-code{
font-size:clamp(18px,4.5vw,24px);
font-weight:700;
margin-top:12px;
letter-spacing:1.5px;
color:#fff;
text-align:center;
opacity:.95
}

.diff{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:4px;
margin-top:18px
}

.diff-item{
padding:12px 8px;
border-radius:14px;
background:rgba(255,255,255,.03);
text-align:center
}

.diff-item span{
display:block;
margin-top:6px;
font-size:clamp(18px,5vw,22px);
font-weight:800;
width:6ch;
margin:auto;
text-align:center;
font-variant-numeric:tabular-nums
}

.cells{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(85px,1fr));
gap:10px;
margin-top:20px
}

.cell{
background:rgba(0,0,0,.4);
border-radius:18px;
padding:14px;
border:1px solid rgba(255,255,255,.05)
}

.cell-num{
font-size:11px;
opacity:.5;
margin-bottom:6px
}

.cell-val{
font-size:clamp(16px,4vw,20px);
font-weight:700;
width:7ch;
text-align:center;
font-variant-numeric:tabular-nums
}

.cell.ok{
border-color:rgba(0,255,136,.25)
}

.cell.warn{
border-color:rgba(255,170,0,.25)
}

.cell.crit{
border-color:rgba(255,68,68,.25)
}

.logout{
margin-top:24px;
background:rgba(255,68,68,.08);
border:1px solid rgba(255,68,68,.2)
}

.hidden{
display:none!important
}

.bms-list{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(260px,1fr));
gap:4px;
margin-top:20px
}

.bms-item{
background:rgba(0,255,255,.05);
border:1px solid rgba(0,255,255,.2);
border-radius:16px;
padding:20px;
text-align:center;
display:flex;
flex-direction:column;
align-items:center;
gap:8px
}

.bms-item:active{
transform:scale(0.98)
}

.bms-item h3{
color:var(--cyan);
font-size:20px;
margin-bottom:0
}

.bms-item p{
color:#888;
font-size:13px;
margin:0;
text-align:center
}
  .bms-item button.del{
background:rgba(255,68,68,.1);
border:1px solid rgba(255,68,68,.4);
padding:6px 16px;
margin-top:12px;
width:auto;
box-shadow:0 0 15px rgba(255,68,68,.2);
border-radius:10px;
color:#fff;
font-weight:600;
font-size:14px;
cursor:pointer
}

.user-info{
color:#888;
font-size:14px;
text-align:center;
margin-bottom:20px
}

.erro{
background:rgba(255,0,0,.1);
border:2px solid #ff4444;
border-radius:12px;
padding:16px;
margin-top:16px;
color:#ff4444;
font-size:14px
}

.link-cadastro{
margin-top:20px;
text-align:center;
color:#fff;
cursor:pointer;
opacity:.8
}

.link-cadastro span{
color:#00ffff;
text-decoration:underline
}

.footer-voltar{
width:100%;
margin-top:24px;
margin-bottom:12px
}

@media(max-width:520px){
.card{padding:12px}
.gauge-card{padding:16px;min-height:240px}
.grid{grid-template-columns:repeat(2,1fr)}
.bms-list{grid-template-columns:1fr}
.diff{grid-template-columns:repeat(2,1fr)}
}
</style>
</head>

<body>

<!-- TODO O HTML QUE VOCÊ JÁ TEM PERMANECE IGUAL -->

<script>
var API='/api/bms';
var TOKEN=localStorage.getItem('bms_token');
var USER=null;
var CODIGO=localStorage.getItem('bms_codigo_ativo');
var INT=null;

try{
USER=JSON.parse(localStorage.getItem('bms_user')||'null');
}catch(e){}

function limparDashboard(){

document.getElementById('soc').textContent='0%';
document.getElementById('volt').textContent='0V';
document.getElementById('corr').textContent='0A';
document.getElementById('temp').textContent='0°C';

document.getElementById('celMin').textContent='0.00V';
document.getElementById('celMax').textContent='0.00V';
document.getElementById('celDif').textContent='0.00V';
document.getElementById('celTot').textContent='0';

document.getElementById('celulas').innerHTML=
'<div style="grid-column:1/-1;opacity:.4;padding:20px;text-align:center">ESP32 Offline</div>';

atualizarGauge(0);
}

function atualizarGauge(soc){

var gauge=document.getElementById('socGauge');
var valor=document.getElementById('socValor');
var bar=document.getElementById('socBar');
var txt=document.getElementById('socBarTxt');

var deg=soc*3.6;

valor.textContent=soc+'%';
txt.textContent=soc+'%';

bar.style.width=soc+'%';

gauge.style.background=
'conic-gradient(#00ff88 0deg,#00ffff '+deg+'deg,rgba(255,255,255,.08) '+deg+'deg)';
}

function renderCelulas(cels){

if(!cels||cels.length===0){

document.getElementById('celulas').innerHTML=
'<div style="grid-column:1/-1;opacity:.4;padding:20px;text-align:center">Sem dados das células</div>';

return;
}

var vals=[];

for(var i=0;i<cels.length;i++){

var v=parseFloat(cels[i]);

if(v>0) vals.push(v);
}

if(vals.length===0) return;

var min=Math.min.apply(null,vals);
var max=Math.max.apply(null,vals);
var dif=max-min;

document.getElementById('celMin').textContent=min.toFixed(3)+'V';
document.getElementById('celMax').textContent=max.toFixed(3)+'V';
document.getElementById('celDif').textContent=dif.toFixed(3)+'V';
document.getElementById('celTot').textContent=cels.length;

var html='';

for(var i=0;i<cels.length;i++){

var val=parseFloat(cels[i]);

var cls='ok';

if(val<3.2||val>4.2) cls='crit';
else if(val<3.4||val>4.15) cls='warn';

html+='<div class="cell '+cls+'">';
html+='<div class="cell-num">C'+(i+1)+'</div>';
html+='<div class="cell-val">'+val.toFixed(3)+'</div>';
html+='</div>';
}

document.getElementById('celulas').innerHTML=html;
}

function atualizar(){

if(!CODIGO) return;

fetch(API+'?action=data&code='+CODIGO,{
headers:{
'Authorization':'Bearer '+TOKEN
}
})

.then(function(r){

if(r.status===401){
sair();
return;
}

if(!r.ok) return;

return r.json();
})

.then(function(d){

if(!d) return;

var st=document.getElementById('status');

if(!d.online){

st.textContent='Offline';
st.className='status off';

limparDashboard();

return;
}

document.getElementById('soc').textContent=
(d.soc?d.soc.toFixed(0):0)+'%';

document.getElementById('volt').textContent=
(d.voltage?d.voltage.toFixed(2):0)+'V';

document.getElementById('corr').textContent=
(d.current?d.current.toFixed(1):0)+'A';

document.getElementById('temp').textContent=
(d.temp?d.temp.toFixed(1):0)+'°C';

st.textContent='Online';
st.className='status on';

renderCelulas(d.cells);

atualizarGauge(parseInt(d.soc||0));
})

.catch(function(){

var st=document.getElementById('status');

st.textContent='Offline';
st.className='status off';

limparDashboard();
});
}
</script>
</body>
</html>
