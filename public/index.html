<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>SMART BMS</title>

<link rel="manifest" href="/manifest.json">

<meta name="theme-color" content="#00ffff">

<link rel="icon" href="/icon-192.png">
<link rel="apple-touch-icon" href="/icon-192.png">

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

/* =========================
RESET
========================= */

*{
margin:0;
padding:0;
box-sizing:border-box;
}

/* =========================
ROOT
========================= */

:root{

--bg:#05070d;

--cyan:#00ffff;
--blue:#0080ff;
--green:#00ff88;
--red:#ff4444;
--orange:#ffaa00;

}

/* =========================
BODY
========================= */

body{

font-family:'Inter',sans-serif;

background:
radial-gradient(circle at top,
rgba(0,255,255,.12),
transparent 40%),

radial-gradient(circle at bottom,
rgba(0,128,255,.08),
transparent 40%),

var(--bg);

color:#fff;

overflow-x:hidden;

min-height:100vh;

position:relative;

}

/* =========================
GRID BACKGROUND
========================= */

body::before{

content:'';

position:fixed;

inset:0;

background-image:

linear-gradient(
rgba(255,255,255,.03) 1px,
transparent 1px),

linear-gradient(
90deg,
rgba(255,255,255,.03) 1px,
transparent 1px);

background-size:40px 40px;

mask-image:
radial-gradient(circle at center,
black,
transparent 90%);

pointer-events:none;

z-index:0;

}

/* =========================
PARTICLES
========================= */

#particles{

position:fixed;
inset:0;
overflow:hidden;
z-index:0;
pointer-events:none;

}

.particle{

position:absolute;

background:var(--cyan);

border-radius:50%;

opacity:.25;

animation:float linear infinite;

box-shadow:
0 0 12px var(--cyan),
0 0 24px var(--cyan);

}

@keyframes float{

0%{
transform:
translateY(100vh)
scale(0);
opacity:0;
}

10%{
opacity:.3;
}

100%{
transform:
translateY(-100px)
scale(1.3);
opacity:0;
}

}

/* =========================
LOGIN / DASH
========================= */

#login,
#dash{

position:relative;

z-index:1;

width:100%;

min-height:100vh;

display:flex;

flex-direction:column;

justify-content:center;

align-items:center;

padding:20px;

}

/* =========================
TITLE
========================= */

.title{

font-size:clamp(42px,8vw,74px);

font-weight:900;

margin-bottom:30px;

letter-spacing:3px;

background:
linear-gradient(
90deg,
var(--cyan),
var(--blue));

-webkit-background-clip:text;
-webkit-text-fill-color:transparent;

text-shadow:
0 0 30px rgba(0,255,255,.4);

animation:pulse 3s infinite;

}

@keyframes pulse{

0%,100%{
filter:brightness(1);
}

50%{
filter:brightness(1.3);
}

}

/* =========================
CARD
========================= */

.card{

background:
rgba(255,255,255,.04);

backdrop-filter:blur(24px);

border:
1px solid rgba(255,255,255,.08);

border-radius:28px;

padding:24px;

width:100%;

position:relative;

overflow:hidden;

box-shadow:

0 0 30px rgba(0,255,255,.08),

inset 0 0 40px rgba(255,255,255,.02);

transition:.35s ease;

}

.card:hover{

transform:
translateY(-4px)
scale(1.01);

box-shadow:

0 0 40px rgba(0,255,255,.15),

0 0 80px rgba(0,255,255,.08);

}

/* =========================
LOGIN CARD
========================= */

#login .card{
max-width:520px;
}

/* =========================
DASH
========================= */

#dash{
max-width:1450px;
margin:auto;
}

/* =========================
GRID CORRIGIDA
========================= */

.grid{

display:grid;

grid-template-columns:
repeat(2,minmax(0,1fr));

gap:18px;

width:100%;

max-width:1200px;

margin:20px auto;

}

.grid .card{

min-height:180px;

display:flex;

flex-direction:column;

justify-content:center;

align-items:center;

}

/* =========================
LABEL
========================= */

.label{

font-size:12px;

letter-spacing:2px;

opacity:.6;

text-transform:uppercase;

}

/* =========================
VALUE
========================= */

.value{

font-size:clamp(40px,5vw,58px);

font-weight:800;

margin-top:12px;

text-shadow:
0 0 25px currentColor;

}

/* =========================
INPUT
========================= */

input,
button{

width:100%;

max-width:500px;

padding:18px;

border-radius:18px;

border:none;

outline:none;

margin-top:16px;

font-size:18px;

transition:.25s;

}

input{

background:
rgba(0,0,0,.35);

color:#fff;

font-family:monospace;

letter-spacing:2px;

border:
1px solid rgba(0,255,255,.2);

}

button{

background:
linear-gradient(
90deg,
var(--blue),
var(--cyan));

color:#fff;

font-weight:700;

cursor:pointer;

box-shadow:
0 0 30px rgba(0,255,255,.25);

}

/* =========================
STATUS
========================= */

.status{

display:inline-flex;

align-items:center;

gap:10px;

padding:14px 26px;

border-radius:999px;

font-weight:700;

margin-top:14px;

}

.on{

background:
rgba(0,255,136,.12);

color:var(--green);

border:
1px solid rgba(0,255,136,.3);

}

.off{

background:
rgba(255,68,68,.12);

color:var(--red);

border:
1px solid rgba(255,68,68,.3);

}

/* =========================
GAUGE
========================= */

.gauge-wrap{

width:100%;
max-width:1200px;
margin:20px auto;

}

.gauge-card{
padding:40px;
}

.gauge{

width:240px;
height:240px;

margin:auto;

border-radius:50%;

background:
conic-gradient(
#00ff88 0deg,
#00ffff 180deg,
rgba(255,255,255,.08) 180deg
);

position:relative;

}

.gauge::before{

content:'';

position:absolute;

inset:18px;

border-radius:50%;

background:#05070d;

}

.gauge-inner{

position:absolute;

inset:0;

display:flex;

flex-direction:column;

justify-content:center;

align-items:center;

z-index:2;

}

.gauge-value{

font-size:58px;

font-weight:900;

color:#00ff88;

}

/* =========================
BAR
========================= */

.bar-wrap{
margin-top:24px;
}

.bar{

height:16px;

background:
rgba(255,255,255,.06);

border-radius:999px;

overflow:hidden;

}

.bar-fill{

height:100%;
width:0%;

border-radius:999px;

background:
linear-gradient(
90deg,
#00ff88,
#00ffff
);

transition:1s;

}

/* =========================
CHART
========================= */

.chart-card{

width:100%;
max-width:1200px;

margin:20px auto;

padding:30px;

}

canvas{

width:100%!important;
height:320px!important;

}

/* =========================
CELLS
========================= */

.cells{

display:grid;

grid-template-columns:
repeat(auto-fill,minmax(95px,1fr));

gap:12px;

margin-top:24px;

}

.cell{

background:
rgba(0,0,0,.28);

border-radius:18px;

padding:14px;

border:
1px solid rgba(255,255,255,.05);

}

.cell-num{

font-size:11px;

opacity:.5;

margin-bottom:6px;

}

.cell-val{

font-size:20px;

font-weight:700;

}

.cell.ok{
border-color:rgba(0,255,136,.25);
}

.cell.warn{
border-color:rgba(255,170,0,.25);
}

.cell.crit{
border-color:rgba(255,68,68,.25);
}

/* =========================
DIFF
========================= */

.diff{

display:flex;

justify-content:center;

flex-wrap:wrap;

gap:24px;

margin-top:20px;

}

.diff-item{

padding:14px 20px;

border-radius:18px;

background:
rgba(255,255,255,.03);

min-width:120px;

}

.diff-item span{

display:block;

margin-top:8px;

font-size:26px;

font-weight:800;

}

/* =========================
LOGOUT
========================= */

.logout{

margin-top:40px;

background:
rgba(255,68,68,.08);

border:
1px solid rgba(255,68,68,.2);

}

/* =========================
HIDDEN
========================= */

.hidden{
display:none!important;
}

/* =========================
RESPONSIVO
========================= */

@media(max-width:768px){

.grid{

grid-template-columns:
repeat(2,minmax(0,1fr));

gap:12px;

padding:0 10px;

}

.grid .card{

min-height:150px;

padding:18px;

}

.value{
font-size:34px;
}

}

@media(max-width:420px){

.grid{
gap:10px;
}

.grid .card{

min-height:135px;

padding:14px;

}

.value{
font-size:28px;
}

.label{

font-size:10px;

letter-spacing:1px;

}

}

</style>

</head>

<body>

<div id="particles"></div>

<!-- LOGIN -->

<div id="login">

<div class="title">
SMART BMS
</div>

<div class="card">

<div class="label">
Código da BMS
</div>

<input
id="code"
placeholder="SL00000000"
maxlength="10"
>

<button onclick="login()">
Entrar
</button>

<p
id="error"
style="color:#ff4444;margin-top:12px;display:none;">
</p>

</div>

</div>

<!-- DASH -->

<div id="dash" class="hidden">

<div class="title">
SMART BMS
</div>

<div class="gauge-wrap">

<div class="card gauge-card">

<div class="gauge" id="socGauge">

<div class="gauge-inner">

<div class="gauge-value" id="socGaugeValue">
0%
</div>

<div class="gauge-label">
STATE OF CHARGE
</div>

</div>

</div>

<div class="bar-wrap">

<div class="bar">

<div class="bar-fill" id="socBar"></div>

</div>

</div>

</div>

</div>

<div class="card" style="max-width:1200px">

<div class="label" id="bmsName">
BMS
</div>

<div style="margin-top:16px">

<span id="connStatus" class="status off">
Offline
</span>

</div>

</div>

<!-- GRID -->

<div class="grid">

<div class="card">
<div class="label">SOC</div>
<div class="value" id="soc" style="color:#00ff88">0%</div>
</div>

<div class="card">
<div class="label">Tensão</div>
<div class="value" id="voltage" style="color:#00ffff">0V</div>
</div>

<div class="card">
<div class="label">Corrente</div>
<div class="value" id="current" style="color:#ffaa00">0A</div>
</div>

<div class="card">
<div class="label">Temperatura</div>
<div class="value" id="temp" style="color:#ff4444">0°C</div>
</div>

</div>

<!-- CHART -->

<div class="card chart-card">

<canvas id="mainChart"></canvas>

</div>

<!-- CELLS -->

<div class="card" style="max-width:1200px">

<div class="label">
Células - Tensão Individual
</div>

<div class="diff">

<div class="diff-item">
Min
<div><span id="cellMin">0.00V</span></div>
</div>

<div class="diff-item">
Max
<div><span id="cellMax">0.00V</span></div>
</div>

<div class="diff-item">
Diferença
<div><span id="cellDiff">0.00V</span></div>
</div>

<div class="diff-item">
Total
<div><span id="cellCount">0</span></div>
</div>

</div>

<div id="cells" class="cells"></div>

</div>

<button class="logout" onclick="logout()">
Sair do Painel
</button>

</div>

<script>

/* PARTICLES */

function createParticles(){

const container =
document.getElementById('particles');

setInterval(()=>{

const p =
document.createElement('div');

p.className='particle';

const size =
Math.random()*4+1;

p.style.width=size+'px';
p.style.height=size+'px';

p.style.left=
Math.random()*100+'%';

p.style.animationDuration=
(Math.random()*10+10)+'s';

container.appendChild(p);

setTimeout(()=>p.remove(),20000);

},300);

}

createParticles();

/* API */

const API='/api/bms';

let interval;

/* AUTO LOGIN */

if(localStorage.getItem('bms_token')){
showDash();
}

/* LOGIN */

async function login(){

const code =
document.getElementById('code')
.value
.trim();

const r = await fetch(
API+'?action=login',
{
method:'POST',
headers:{
'Content-Type':'application/json'
},
body:JSON.stringify({code})
}
);

const d = await r.json();

if(d.ok){

localStorage.setItem(
'bms_token',
d.token
);

showDash();

}

}

/* SHOW DASH */

function showDash(){

document
.getElementById('login')
.classList
.add('hidden');

document
.getElementById('dash')
.classList
.remove('hidden');

update();

interval =
setInterval(update,3000);

}

/* CELLS */

function renderCells(cells){

if(!cells || !cells.length){

document.getElementById('cells').innerHTML =
'<div style="opacity:.5">Sem células</div>';

return;

}

const vals =
cells.map(v=>parseFloat(v));

const min=Math.min(...vals);
const max=Math.max(...vals);
const diff=max-min;

document.getElementById('cellMin').textContent=min.toFixed(3)+'V';
document.getElementById('cellMax').textContent=max.toFixed(3)+'V';
document.getElementById('cellDiff').textContent=diff.toFixed(3)+'V';
document.getElementById('cellCount').textContent=cells.length;

document.getElementById('cells').innerHTML =

cells.map((v,i)=>{

const val=parseFloat(v);

let cls='ok';

if(val<3.2||val>4.2){
cls='crit';
}
else if(val<3.4||val>4.15){
cls='warn';
}

return `
<div class="cell ${cls}">
<div class="cell-num">C${i+1}</div>
<div class="cell-val">${val.toFixed(3)}</div>
</div>
`;

}).join('');

}

/* CHART */

const ctx =
document.getElementById('mainChart');

const chart =
new Chart(ctx,{

type:'line',

data:{
labels:[],
datasets:[
{
label:'Tensão',
data:[],
borderColor:'#00ffff',
tension:.4
},
{
label:'Corrente',
data:[],
borderColor:'#ffaa00',
tension:.4
}
]
},

options:{
responsive:true,
maintainAspectRatio:false
}

});

/* GAUGE */

function updateGauge(soc){

const deg = soc * 3.6;

document.getElementById('socGauge').style.background = `
conic-gradient(
#00ff88 0deg,
#00ffff ${deg}deg,
rgba(255,255,255,.08) ${deg}deg
)
`;

document.getElementById('socGaugeValue').textContent =
soc+'%';

document.getElementById('socBar').style.width =
soc+'%';

}

/* UPDATE */

async function update(){

const token =
localStorage.getItem('bms_token');

const r = await fetch(
API+'?action=data',
{
headers:{
'Authorization':'Bearer '+token
}
}
);

const d = await r.json();

document.getElementById('bmsName').textContent =
d.nome || d.code;

document.getElementById('soc').textContent =
(d.soc||0)+'%';

document.getElementById('voltage').textContent =
(d.voltage||0)+'V';

document.getElementById('current').textContent =
(d.current||0)+'A';

document.getElementById('temp').textContent =
(d.temp||0)+'°C';

document.getElementById('connStatus').textContent =
d.online?'Online':'Offline';

document.getElementById('connStatus').className =
'status '+(d.online?'on':'off');

renderCells(d.cells);

updateGauge(parseInt(d.soc||0));

const now =
new Date().toLocaleTimeString();

chart.data.labels.push(now);

chart.data.datasets[0].data.push(d.voltage||0);
chart.data.datasets[1].data.push(d.current||0);

if(chart.data.labels.length > 20){

chart.data.labels.shift();

chart.data.datasets[0].data.shift();
chart.data.datasets[1].data.shift();

}

chart.update();

}

/* LOGOUT */

function logout(){

clearInterval(interval);

localStorage.removeItem('bms_token');

document
.getElementById('dash')
.classList
.add('hidden');

document
.getElementById('login')
.classList
.remove('hidden');

}

/* PWA */

if('serviceWorker' in navigator){

window.addEventListener('load',()=>{

navigator.serviceWorker
.register('/service-worker.js');

});

}

</script>

</body>
</html>
