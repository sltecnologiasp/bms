<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>SMART BMS</title>
<style>
body{background:#05070d;color:#fff;font-family:system-ui;padding:20px}
.card{background:rgba(255,255,255,.05);border:1px solid #00ffff;padding:20px;border-radius:12px;max-width:400px;margin:20px auto}
input,button{width:100%;padding:16px;margin:8px 0;border-radius:8px;border:1px solid #00ffff;background:#000;color:#fff;font-size:16px}
button{background:#00ffff;color:#000;font-weight:700}
#debug{background:#000;border:1px solid #ff4444;padding:12px;margin-top:20px;font-size:12px;white-space:pre-wrap;word-break:break-all}
.error{color:#ff4444;margin-top:8px}
.success{color:#00ff88;margin-top:8px}
.hidden{display:none}
</style>
</head>
<body>
<div class="card">
  <h2 style="text-align:center">SMART BMS</h2>
  <div id="login">
    <input id="email" placeholder="E-mail" value="teste@teste.com">
    <input id="senha" type="password" placeholder="Senha" value="123456">
    <button onclick="testarLogin()">Entrar</button>
    <div id="msg"></div>
  </div>
  <div id="ok" class="hidden">
    <h3 style="color:#00ff88;text-align:center">LOGADO!</h3>
    <div>Token: <span id="token"></span></div>
    <button onclick="logout()">Sair</button>
  </div>
  <div id="debug">Aguardando clique...</div>
</div>

<script>
const API = '/api/bms';
const debug = (t) => document.getElementById('debug').textContent = typeof t === 'string' ? t : JSON.stringify(t, null, 2);
const msg = (t,ok) => document.getElementById('msg').innerHTML = `<div class="${ok?'success':'error'}">${t}</div>`;

async function testarLogin(){
  const email = document.getElementById('email').value;
  const senha = document.getElementById('senha').value;
  debug('Enviando: ' + JSON.stringify({email, senha}));
  
  try {
    const r = await fetch(API+'?action=login_user', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({email,senha})
    });
    
    debug('Status: ' + r.status + '\nHeaders: ' + JSON.stringify([...r.headers.entries()]));
    
    const txt = await r.text();
    debug('Resposta bruta: ' + txt);
    
    const d = JSON.parse(txt);
    
    if(d.ok){
      msg('Login OK!', true);
      localStorage.setItem('bms_token', d.token);
      document.getElementById('login').classList.add('hidden');
      document.getElementById('ok').classList.remove('hidden');
      document.getElementById('token').textContent = d.token.slice(0,20)+'...';
    } else {
      msg(d.error || 'Erro desconhecido', false);
    }
  } catch(e) {
    debug('ERRO JS: ' + e.message + '\nStack: ' + e.stack);
    msg('Erro: ' + e.message, false);
  }
}

function logout(){
  localStorage.removeItem('bms_token');
  location.reload();
}

// Testa se já tá logado
if(localStorage.getItem('bms_token')){
  document.getElementById('login').classList.add('hidden');
  document.getElementById('ok').classList.remove('hidden');
  document.getElementById('token').textContent = localStorage.getItem('bms_token').slice(0,20)+'...';
  debug('Já tem token salvo');
}
</script>
</body>
</html>
