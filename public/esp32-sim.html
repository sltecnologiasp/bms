<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>ESP32 Simulator</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a0f;color:#fff;font-family:system-ui;padding:20px;text-align:center}
h1{text-align:center;font-size:32px;font-weight:900;padding:20px;background:linear-gradient(90deg,#00ffff,#0080ff);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.card{background:rgba(255,255,255,.03);border:1px solid rgba(0,255,255,.3);border-radius:16px;padding:30px;margin:16px auto;max-width:600px;text-align:center;box-shadow:0 0 20px rgba(0,255,255,.1)}
input,button,select{width:100%;max-width:500px;padding:16px;margin:10px auto;border-radius:12px;border:1px solid rgba(0,255,255,.3);background:rgba(0,0,0,.4);color:#fff;font-size:16px;text-align:center;display:block}
button{background:linear-gradient(90deg,#0080ff,#00ffff);cursor:pointer;font-weight:700;border:none;box-shadow:0 0 25px rgba(0,255,255,.4)}
button.stop{background:rgba(255,68,68,.1);border:1px solid rgba(255,68,68,.4);box-shadow:0 0 20px rgba(255,68,68,.2)}
.label{opacity:.7;font-size:13px;text-transform:uppercase;text-align:center;letter-spacing:2px;margin-bottom:8px}
.status{display:inline-block;padding:6px 16px;border-radius:12px;font-size:13px;font-weight:700;margin:10px 0}
.on{background:rgba(0,255,136,.15);color:#00ff88;border:1px solid rgba(0,255,136,.4)}
.off{background:rgba(255,68,68,.15);color:#ff4444;border:1px solid rgba(255,68,68,.4)}
.log{background:rgba(0,0,0,.6);border:1px solid rgba(0,255,255,.2);border-radius:12px;padding:15px;margin:20px auto;max-width:600px;height:200px;overflow-y:auto;text-align:left;font-family:monospace;font-size:12px}
.log-entry{margin:4px 0;opacity:.8}
.log-entry.ok{color:#00ff88}
.log-entry.err{color:#ff4444}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:15px 0}
.data-item{text-align:center}
.data-item .val{font-size:22px;font-weight:700;margin:5px 0}
.hidden{display:none}
.cells-preview{display:grid;grid-template-columns:repeat(auto-fill,minmax(60px,1fr));gap:6px;margin-top:12px;padding:12px;background:rgba(0,0,0,.3);border-radius:8px;max-height:150px;overflow-y:auto}
.cell-mini{background:rgba(0,255,255,.1);border:1px solid rgba(0,255,255,.3);border-radius:6px;padding:6px;font-size:10px;text-align:center}
.cell-mini .num{opacity:.5;font-size:9px}
.cell-mini .val{font-weight:700;margin-top:2px}
</style>
</head>
<body>
<h1>ESP32 SIMULATOR</h1>

<div class="card">
  <div class="label">Selecionar BMS</div>
  <select id="bmsCode">
    <option value="">Carregando...</option>
  </select>
  <div id="status" class="status off">Parado</div>
</div>

<div class="card">
  <div class="label">Configuração da BMS</div>
  <div class="grid">
    <div class="data-item">
      <div class="label">Número de Células</div>
      <select id="cellCount">
        <option value="13">13 Células - 48V</option>
        <option value="14">14 Células - 52V</option>
        <option value="15">15 Células - 55V</option>
        <option value="16">16 Células - 60V</option>
        <option value="17">17 Células - 63V</option>
        <option value="18">18 Células - 67V</option>
        <option value="19">19 Células - 70V</option>
        <option value="20">20 Células - 74V</option>
        <option value="21">21 Células - 78V</option>
        <option value="22">22 Células - 82V</option>
        <option value="23">23 Células - 85V</option>
        <option value="24">24 Células - 89V</option>
        <option value="4">4 Células - 12V</option>
        <option value="7">7 Células - 24V</option>
        <option value="8">8 Células - 30V</option>
      </select>
    </div>
    <div class="data-item">
      <div class="label">Química</div>
      <select id="chemistry">
        <option value="lifepo4">LiFePO4 - 3.2V</option>
        <option value="liion">Li-ion - 3.7V</option>
        <option value="lto">LTO - 2.4V</option>
      </select>
    </div>
  </div>
</div>

<div class="card">
  <div class="label">Dados Simulados</div>
  <div class="grid">
    <div class="data-item">
      <div class="label">SOC</div>
      <input id="soc" type="number" step="0.1" value="85.5" min="0" max="100">
      <div class="val" style="color:#00ff88" id="socVal">85.5%</div>
    </div>
    <div class="data-item">
      <div class="label">Tensão Total</div>
      <input id="voltage" type="number" step="0.1" value="53.2" min="0" max="100">
      <div class="val" style="color:#00ffff" id="voltageVal">53.2V</div>
    </div>
    <div class="data-item">
      <div class="label">Corrente</div>
      <input id="current" type="number" step="0.1" value="-2.5">
      <div class="val" style="color:#ffaa00" id="currentVal">-2.5A</div>
    </div>
    <div class="data-item">
      <div class="label">Temperatura</div>
      <input id="temp" type="number" step="0.1" value="28.3">
      <div class="val" style="color:#ff4444" id="tempVal">28.3°C</div>
    </div>
  </div>
  
  <div class="label" style="margin-top:20px">Preview das Células</div>
  <div class="cells-preview" id="cellsPreview"></div>
  
  <div class="label" style="margin-top:20px">Modo Automático</div>
  <label style="display:flex;align-items:center;justify-content:center;gap:10px;margin:10px 0">
    <input type="checkbox" id="autoMode" style="width:auto;margin:0">
    <span>Variação automática</span>
  </label>
  <input id="interval" type="number" value="5" min="1" max="60" style="margin-bottom:20px">
  <div style="opacity:.6;font-size:12px;margin-top:-10px">Intervalo em segundos</div>
  
  <button id="startBtn" onclick="startSim()">Iniciar Simulação</button>
  <button id="stopBtn" class="stop hidden" onclick="stopSim()">Parar Simulação</button>
  <button onclick="sendOnce()">Enviar Uma Vez</button>
</div>

<div class="log" id="log">
  <div class="log-entry">Aguardando início...</div>
</div>

<script>
const API = '/api/bms';
let simInterval = null;
let adminToken = 'admin_ok';

const chemistryVoltage = {
  lifepo4: 3.2,
  liion: 3.7,
  lto: 2.4
};

async function loadBMS() {
  const r = await fetch(API + '?action=listar', {
    headers: {'Authorization': 'Bearer ' + adminToken}
  });
  const data = await r.json();
  const select = document.getElementById('bmsCode');
  select.innerHTML = data.map(b => `<option value="${b.code}">${b.code} - ${b.nome || 'Sem nome'}</option>`).join('');
}

function updateDisplay() {
  document.getElementById('socVal').textContent = document.getElementById('soc').value + '%';
  document.getElementById('voltageVal').textContent = document.getElementById('voltage').value + 'V';
  document.getElementById('currentVal').textContent = document.getElementById('current').value + 'A';
  document.getElementById('tempVal').textContent = document.getElementById('temp').value + '°C';
  updateCellsPreview();
}

function updateCellsPreview() {
  const cellCount = parseInt(document.getElementById('cellCount').value);
  const voltage = parseFloat(document.getElementById('voltage').value);
  const chemistry = document.getElementById('chemistry').value;
  const nominalCell = chemistryVoltage[chemistry];
  
  const cells = [];
  const avgCell = voltage / cellCount;
  
  for (let i = 0; i < cellCount; i++) {
    const variation = (Math.random() - 0.5) * 0.03;
    cells.push(avgCell + variation);
  }
  
  document.getElementById('cellsPreview').innerHTML = cells.map((v, i) => 
    `<div class="cell-mini"><div class="num">C${i+1}</div><div class="val">${v.toFixed(3)}V</div></div>`
  ).join('');
}

['soc','voltage','current','temp','cellCount','chemistry'].forEach(id => {
  document.getElementById(id).oninput = updateDisplay;
});

document.getElementById('cellCount').onchange = () => {
  const cellCount = parseInt(document.getElementById('cellCount').value);
  const chemistry = document.getElementById('chemistry').value;
  const nominalCell = chemistryVoltage[chemistry];
  const nominalTotal = (nominalCell * cellCount).toFixed(1);
  document.getElementById('voltage').value = nominalTotal;
  updateDisplay();
};

document.getElementById('chemistry').onchange = () => {
  const cellCount = parseInt(document.getElementById('cellCount').value);
  const chemistry = document.getElementById('chemistry').value;
  const nominalCell = chemistryVoltage[chemistry];
  const nominalTotal = (nominalCell * cellCount).toFixed(1);
  document.getElementById('voltage').value = nominalTotal;
  updateDisplay();
};

function addLog(msg, type = '') {
  const log = document.getElementById('log');
  const time = new Date().toLocaleTimeString();
  log.innerHTML = `<div class="log-entry ${type}">[${time}] ${msg}</div>` + log.innerHTML;
  if (log.children.length > 50) log.removeChild(log.lastChild);
}

async function sendData() {
  const code = document.getElementById('bmsCode').value;
  if (!code) {
    addLog('Selecione uma BMS primeiro', 'err');
    return false;
  }
  
  let soc = parseFloat(document.getElementById('soc').value);
  let voltage = parseFloat(document.getElementById('voltage').value);
  let current = parseFloat(document.getElementById('current').value);
  let temp = parseFloat(document.getElementById('temp').value);
  const cellCount = parseInt(document.getElementById('cellCount').value);
  
  if (document.getElementById('autoMode').checked) {
    soc += (Math.random() - 0.5) * 0.5;
    soc = Math.max(0, Math.min(100, soc));
    voltage += (Math.random() - 0.5) * 0.2;
    voltage = Math.max(0, voltage);
    current += (Math.random() - 0.5) * 1;
    temp += (Math.random() - 0.5) * 0.5;
    
    document.getElementById('soc').value = soc.toFixed(1);
    document.getElementById('voltage').value = voltage.toFixed(1);
    document.getElementById('current').value = current.toFixed(1);
    document.getElementById('temp').value = temp.toFixed(1);
    updateDisplay();
  }
  
  const cells = [];
  const avgCell = voltage / cellCount;
  for (let i = 0; i < cellCount; i++) {
    cells.push(+(avgCell + (Math.random() - 0.5) * 0.03).toFixed(3));
  }
  
  const payload = {
    code, soc, voltage, current, temp,
    online: 1,
    cells
  };
  
  try {
    const r = await fetch(API + '?action=update', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify(payload)
    });
    const d = await r.json();
    if (d.ok) {
      addLog(`Enviado: ${code} | ${cellCount} células | SOC:${soc.toFixed(1)}% V:${voltage.toFixed(1)}V`, 'ok');
      return true;
    } else {
      addLog('Erro: ' + d.error, 'err');
      return false;
    }
  } catch (e) {
    addLog('Erro de conexão: ' + e.message, 'err');
    return false;
  }
}

function sendOnce() {
  sendData();
}

function startSim() {
  const code = document.getElementById('bmsCode').value;
  if (!code) {
    alert('Selecione uma BMS');
    return;
  }
  
  const interval = parseInt(document.getElementById('interval').value) * 1000;
  document.getElementById('status').className = 'status on';
  document.getElementById('status').textContent = 'Enviando';
  document.getElementById('startBtn').classList.add('hidden');
  document.getElementById('stopBtn').classList.remove('hidden');
  
  addLog('Simulação iniciada - Intervalo: ' + interval/1000 + 's', 'ok');
  sendData();
  simInterval = setInterval(sendData, interval);
}

function stopSim() {
  if (simInterval) clearInterval(simInterval);
  simInterval = null;
  document.getElementById('status').className = 'status off';
  document.getElementById('status').textContent = 'Parado';
  document.getElementById('startBtn').classList.remove('hidden');
  document.getElementById('stopBtn').classList.add('hidden');
  addLog('Simulação parada', 'err');
}

updateDisplay();
loadBMS();
</script>
</body>
</html>
