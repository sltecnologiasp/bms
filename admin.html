<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BMS Admin</title>
  <style>
    body { font-family: sans-serif; padding: 20px; background: #111; color: #eee; }
    table { width: 100%; border-collapse: collapse; margin-top: 20px; }
    th, td { border: 1px solid #333; padding: 8px; text-align: left; }
    th { background: #222; }
    input, button { padding: 8px; margin: 4px; background: #222; color: #eee; border: 1px solid #444; }
    .online { color: #0f0; }
    .offline { color: #f00; }
  </style>
</head>
<body>
  <h1>Painel Admin BMS</h1>
  
  <h3>Cadastrar BMS</h3>
  <input id="code" placeholder="SL12345678" maxlength="10">
  <input id="nome" placeholder="Nome/Local">
  <button onclick="cadastrar()">Cadastrar</button>
  
  <h3>BMS Cadastradas</h3>
  <button onclick="carregar()">Atualizar Lista</button>
  <table id="tabela">
    <thead>
      <tr>
        <th>Code</th><th>Nome</th><th>SOC</th><th>V</th><th>A</th><th>°C</th><th>Status</th><th>Update</th><th>Ações</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>

<script>
const API = '/api/bms';
const AUTH = 'Bearer admin_ok';

async function cadastrar() {
  const code = document.getElementById('code').value;
  const nome = document.getElementById('nome').value;
  const r = await fetch(`${API}?action=cadastrar`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'Authorization': AUTH },
    body: JSON.stringify({ code, nome })
  });
  const j = await r.json();
  alert(j.ok ? 'Cadastrado!' : j.error);
  if (j.ok) carregar();
}

async function deletar(code) {
  if (!confirm(`Deletar ${code}?`)) return;
  const r = await fetch(`${API}?action=deletar&code=${code}`, {
    method: 'DELETE',
    headers: { 'Authorization': AUTH }
  });
  const j = await r.json();
  if (j.ok) carregar();
}

async function carregar() {
  const r = await fetch(`${API}?action=listar`, {
    headers: { 'Authorization': AUTH }
  });
  const j = await r.json();
  const tbody = document.querySelector('#tabela tbody');
  tbody.innerHTML = '';
  
  j.bms.forEach(b => {
    const tr = document.createElement('tr');
    const lastUpdate = b.last_update ? new Date(b.last_update).toLocaleString() : '-';
    tr.innerHTML = `
      <td>${b.code}</td>
      <td>${b.nome || '-'}</td>
      <td>${b.soc}%</td>
      <td>${b.voltage}V</td>
      <td>${b.current}A</td>
      <td>${b.temp}°C</td>
      <td class="${b.online ? 'online' : 'offline'}">${b.online ? 'Online' : 'Offline'}</td>
      <td>${lastUpdate}</td>
      <td><button onclick="deletar('${b.code}')">Deletar</button></td>
    `;
    tbody.appendChild(tr);
  });
}

carregar();
setInterval(carregar, 5000); // Auto refresh 5s
</script>
</body>
</html>
