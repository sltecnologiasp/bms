<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>BMS Admin</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a0f;color:#fff;font-family:system-ui;min-height:100vh;padding:20px}
.title{text-align:center;font-size:42px;font-weight:900;padding:20px;background:linear-gradient(90deg,#00ffff,#0080ff);-webkit-background-clip:text;-webkit-text-fill-color:transparent;text-shadow:0 0 30px rgba(0,255,255,.3)}
.card{background:rgba(255,255,255,.03);backdrop-filter:blur(16px);border:1px solid rgba(0,255,255,.3);border-radius:16px;padding:30px;margin:16px;box-shadow:0 0 20px rgba(0,255,255,.1)}
input,button{width:100%;padding:16px;border-radius:12px;border:1px solid rgba(0,255,255,.3);background:rgba(0,0,0,.4);color:#fff;font-size:16px;margin:8px 0;font-family:monospace}
button{background:linear-gradient(90deg,#0080ff,#00ffff);cursor:pointer;font-weight:700;border:none;font-family:system-ui;box-shadow:0 0 25px rgba(0,255,255,.4)}
table{width:100%;border-collapse:collapse;margin-top:16px}
th,td{border:1px solid rgba(0,255,255,.2);padding:12px;text-align:left;font-size:14px}
th{background:rgba(0,255,255,.1)}
.online{color:#00ff88;font-weight:700;text-shadow:0 0 10px #00ff88}
.offline{color:#ff4444}
.hidden{display:none}
.label{opacity:.7;font-size:12px;text-transform:uppercase;letter-spacing:2px;margin-bottom:8px}
</style>
</head>
<body>
<div id="login">
  <div class="title">BMS ADMIN</div>
  <div class="card">
    <div class="label">Acesso Restrito</div>
    <input id="user" placeholder="Usuário" value="admin">
    <input id="pass" type="password" placeholder="Senha">
    <button onclick="login()">Entrar</button>
    <p id="error" style="color:#ff4444;margin-top:12px;display:none"></p>
  </div>
</div>
<div id="dash" class="hidden">
  <div class="title">BMS ADMIN</div>
  <div class="card">
    <div class="label">Cadastrar Nova BMS</div>
    <input id="code" placeholder="SL12345678" maxlength="10">
    <input id="nome" placeholder="Nome/Local">
    <button onclick="cadastrar()">Cadastrar</button>
  </div>
  <div class="card">
    <div class="label">BMS Cadastradas</div>
    <button onclick="carregar()">Atualizar Lista</button>
    <table id="tabela">
      <thead><tr><th>Code</th><th>Nome</th><th>SOC</th><th>V</th><th>Status</th><th>Ação</th></tr></thead>
      <tbody></tbody>
    </table>
  </div>
  <button onclick="logout()" style="background:rgba(255,68,68,.1);border:1px solid rgba(255,68,68,.4);margin:16px">Sair</button>
</div>
<script>
const API = '/api/bms';
let token = localStorage.getItem('admin_token');
if(token) showDash();

async function login(){
  const user = document.getElementById('user').value;
  const password = document.getElementById('pass').value;
  const r = await fetch(API+'?action=admin_login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({user,password})});
  const d = await r.json();
  if(d.ok){
    token = d.token;
    localStorage.setItem('admin_token',token);
    showDash();
  }else{
    document.getElementById('error').textContent = d.error;
    document.getElementById('error').style.display='block';
  }
}
function showDash(){
  document.getElementById('login').classList.add('hidden');
  document.getElementById('dash').classList.remove('hidden');
  carregar();
}
async function cadastrar(){
  const code = document.getElementById('code').value;
  const nome = document.getElementById('nome').value;
  const r = await fetch(API+'?action=cadastrar',{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+token},body:JSON.stringify({code,nome})});
  const d = await r.json();
  alert(d.ok?'Cadastrado!':d.error);
  if(d.ok){document.getElementById('code').value='';document.getElementById('nome').value='';carregar();}
}
async function deletar(code){
  if(!confirm(`Deletar ${code}?`))return;
  await fetch(API+'?action=deletar&code='+code,{method:'DELETE',headers:{'Authorization':'Bearer '+token}});
  carregar();
}
async function carregar(){
  const r = await fetch(API+'?action=listar',{headers:{'Authorization':'Bearer '+token}});
  const d = await r.json();
  if(!d.ok){logout();return;}
  document.querySelector('#tabela tbody').innerHTML = d.bms.map(b=>`
    <tr>
      <td>${b.code}</td><td>${b.nome||'-'}</td><td>${b.soc}%</td><td>${b.voltage}V</td>
      <td class="${b.online?'online':'offline'}">${b.online?'ON':'OFF'}</td>
      <td><button onclick="deletar('${b.code}')" style="padding:6px">X</button></td>
    </tr>`).join('');
}
function logout(){localStorage.removeItem('admin_token');location.reload();}
setInterval(()=>{if(token)carregar();},5000);
</script>
</body>
</html>
